<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compras y Saldos · TGA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --vw-blue: #001E50;
  --vw-blue-light: #00437A;
  --vw-white: #FFFFFF;
  --vw-grey-1: #F5F5F5;
  --vw-grey-2: #E5E5E5;
  --vw-grey-3: #999999;
  --vw-grey-4: #666666;
  --vw-black: #1A1A1A;
  --green: #10B981;
  --green-soft: #D1FAE5;
  --orange: #F59E0B;
  --orange-soft: #FEF3C7;
  --red: #EF4444;
  --red-soft: #FEE2E2;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,30,80,0.08);
  --shadow-lg: 0 8px 32px rgba(0,30,80,0.12);
  --font: 'DM Sans', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font); background: var(--vw-grey-1); color: var(--vw-black); min-height:100vh; -webkit-font-smoothing: antialiased; }
button { font-family: var(--font); cursor: pointer; border: none; }
a { color: inherit; text-decoration: none; }
.hidden { display: none !important; }

.app-header {
  background: var(--vw-blue);
  color: white;
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.app-header .brand { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.app-header .user-info { display: flex; align-items: center; gap: 12px; font-size: 13px; }
.app-header .user-name { opacity: 0.9; }
.app-header button {
  background: rgba(255,255,255,0.15);
  color: white; padding: 8px 14px;
  border-radius: 6px; font-size: 13px; font-weight: 500;
  transition: background 0.2s;
}
.app-header button:hover { background: rgba(255,255,255,0.25); }

.wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px 60px; }
h2 { font-size: 22px; font-weight: 700; color: var(--vw-blue); margin-bottom: 4px; }
.lead { font-size: 14px; color: var(--vw-grey-4); margin-bottom: 20px; }

.tabs {
  display: flex; gap: 4px; border-bottom: 2px solid var(--vw-grey-2);
  margin-bottom: 20px; overflow-x: auto;
}
.tab {
  padding: 12px 18px; background: transparent;
  font-size: 14px; font-weight: 600; color: var(--vw-grey-4);
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  white-space: nowrap; transition: all 0.15s;
}
.tab:hover { color: var(--vw-blue); }
.tab.active { color: var(--vw-blue); border-bottom-color: var(--vw-blue); }

.panel { display: none; }
.panel.active { display: block; }

.toolbar {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
}
.toolbar .updated { font-size: 12px; color: var(--vw-grey-3); }
.toolbar button.refresh {
  background: var(--vw-blue); color: white;
  padding: 8px 14px; border-radius: 6px;
  font-size: 13px; font-weight: 600;
}
.toolbar button.refresh:hover { background: var(--vw-blue-light); }
.toolbar button.refresh:disabled { opacity: 0.6; cursor: not-allowed; }

.filters {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
}
.filter-btn {
  padding: 7px 14px; background: white; color: var(--vw-grey-4);
  border: 1px solid var(--vw-grey-2); border-radius: 100px;
  font-size: 13px; font-weight: 500;
}
.filter-btn.active {
  background: var(--vw-blue); color: white; border-color: var(--vw-blue);
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px; margin-bottom: 22px;
}
.card {
  background: white; border-radius: var(--radius);
  padding: 18px 18px 16px; box-shadow: var(--shadow);
  position: relative;
}
.card .label {
  font-size: 11px; color: var(--vw-grey-3);
  text-transform: uppercase; letter-spacing: 0.6px;
  font-weight: 600; margin-bottom: 6px;
}
.card .value {
  font-size: 22px; font-weight: 700; color: var(--vw-blue);
  letter-spacing: -0.5px; line-height: 1.1;
}
.card .sub {
  font-size: 12px; color: var(--vw-grey-4); margin-top: 6px;
}
.card.warn .value { color: var(--orange); }
.card.bad .value { color: var(--red); }
.card.good .value { color: var(--green); }
.card.editable .edit {
  position: absolute; top: 12px; right: 12px;
  background: none; padding: 4px; border-radius: 4px;
  color: var(--vw-grey-3); font-size: 13px;
}
.card.editable .edit:hover { background: var(--vw-grey-1); color: var(--vw-blue); }

.table-wrap {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
}
.table-wrap .table-head {
  padding: 14px 18px; border-bottom: 1px solid var(--vw-grey-2);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
}
.table-wrap .table-head h3 {
  font-size: 14px; font-weight: 600; color: var(--vw-blue);
}
.table-wrap .table-head .count {
  font-size: 12px; color: var(--vw-grey-4);
}
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: var(--vw-grey-1); color: var(--vw-grey-4);
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 10px 12px; text-align: left;
  position: sticky; top: 0; z-index: 1;
  border-bottom: 1px solid var(--vw-grey-2);
  white-space: nowrap;
}
thead th.num, tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
tbody tr { border-bottom: 1px solid var(--vw-grey-2); }
tbody tr:hover { background: var(--vw-grey-1); }
tbody td { padding: 10px 12px; vertical-align: top; }
tbody td.serie { font-family: monospace; font-size: 12px; color: var(--vw-grey-4); }
tbody td.importe { font-weight: 600; color: var(--vw-blue); }
tbody td.vence { white-space: nowrap; }
tbody td .pill {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 100px;
  text-transform: uppercase; letter-spacing: 0.4px;
}
.pill.impaga { background: var(--orange-soft); color: #92400E; }
.pill.pagada { background: var(--green-soft); color: #065F46; }
.pill.vencida { background: var(--red-soft); color: #991B1B; }
tfoot td {
  padding: 12px; font-weight: 700; color: var(--vw-blue);
  border-top: 2px solid var(--vw-grey-2);
  background: var(--vw-grey-1);
}

.empty, .loading, .errbox {
  background: white; border-radius: var(--radius);
  padding: 48px 24px; text-align: center;
  box-shadow: var(--shadow);
  color: var(--vw-grey-3);
}
.empty .ico, .loading .ico, .errbox .ico {
  font-size: 36px; margin-bottom: 10px; opacity: 0.6;
}
.errbox { color: var(--red); }
.errbox .ttl { font-weight: 700; margin-bottom: 6px; }
.errbox .det { font-size: 12px; color: var(--vw-grey-4); margin-top: 8px; font-family: monospace; word-break: break-word; }
.loading .spinner {
  width: 28px; height: 28px; border-radius: 50%;
  border: 3px solid var(--vw-grey-2);
  border-top-color: var(--vw-blue);
  animation: spin 0.7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.gate {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--vw-blue) 0%, var(--vw-blue-light) 100%);
  padding: 20px;
}
.gate-box {
  background: white; border-radius: var(--radius);
  padding: 36px 28px; max-width: 380px; width: 100%;
  text-align: center; box-shadow: var(--shadow-lg);
}
.gate-box .logo { font-size: 24px; font-weight: 700; color: var(--vw-blue); margin-bottom: 6px; }
.gate-box .msg { font-size: 14px; color: var(--vw-grey-4); margin-bottom: 22px; }
.gate-box a.btn {
  display: inline-block; padding: 12px 22px;
  background: var(--vw-blue); color: white;
  border-radius: 8px; font-size: 14px; font-weight: 600;
}
.gate-box a.btn:hover { background: var(--vw-blue-light); }

.col-filters {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
  align-items: center;
}
.col-filters input[type="search"], .col-filters select {
  font-family: var(--font); font-size: 13px;
  padding: 7px 12px; border-radius: 8px;
  border: 1px solid var(--vw-grey-2); background: white;
  color: var(--vw-black); outline: none;
  min-width: 0;
}
.col-filters input[type="search"] { flex: 1 1 200px; max-width: 280px; }
.col-filters select { background: white; cursor: pointer; }
.col-filters input[type="search"]:focus, .col-filters select:focus {
  border-color: var(--vw-blue);
}
.col-filters .clear-btn {
  background: transparent; color: var(--vw-grey-4);
  font-size: 12px; padding: 6px 10px; border-radius: 6px;
}
.col-filters .clear-btn:hover { color: var(--red); background: var(--vw-grey-1); }

.selection-bar {
  background: linear-gradient(135deg, var(--vw-blue) 0%, var(--vw-blue-light) 100%);
  color: white; border-radius: var(--radius);
  padding: 14px 18px; margin-bottom: 14px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; flex-wrap: wrap;
  box-shadow: var(--shadow);
}
.selection-bar .sel-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.selection-bar .sel-lbl {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
  opacity: 0.8; font-weight: 600;
}
.selection-bar .sel-val { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.selection-bar .sel-sub { font-size: 12px; opacity: 0.85; }
.selection-bar .sel-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.sel-btn {
  background: rgba(255,255,255,0.18); color: white;
  padding: 9px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 7px;
  transition: background 0.15s;
}
.sel-btn:hover { background: rgba(255,255,255,0.28); }
.sel-btn.ghost { background: transparent; border: 1px solid rgba(255,255,255,0.4); }
.sel-btn.ghost:hover { background: rgba(255,255,255,0.12); }
.sel-btn .cnt-tag {
  background: white; color: var(--vw-blue);
  padding: 1px 7px; border-radius: 100px;
  font-size: 11px; font-weight: 700;
}

tbody tr.row-selected { background: rgba(0,30,80,0.06); }
tbody tr.row-selected:hover { background: rgba(0,30,80,0.10); }
.row-check { width: 16px; height: 16px; cursor: pointer; accent-color: var(--vw-blue); }

tbody tr.sep-row { background: transparent; border: none; }
tbody tr.sep-row td { padding: 4px 0; border: none; }
tbody tr.sep-row + tr td { border-top: none; }
tbody tr.total-row td {
  background: rgba(0,30,80,0.04); font-weight: 700; color: var(--vw-blue);
  border-top: 1px solid var(--vw-grey-2);
}
tbody tr.total-row.neg td { color: var(--red); background: rgba(239,68,68,0.06); }
td.num.neg, td.importe.neg { color: var(--red); }

.bank-section {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 14px;
  overflow: hidden;
}
.bank-section .sec-head {
  padding: 12px 18px; background: var(--vw-blue); color: white;
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px;
}
.bank-section .sec-head h3 {
  font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
  text-transform: uppercase; color: white;
}
.bank-section .sec-amount {
  font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums;
  color: white;
}
.bank-section table tbody tr:first-child td { border-top: none; }
.bank-section table tbody td:first-child { padding-left: 18px; }
.bank-section table tbody td:last-child  { padding-right: 18px; }
.bank-section thead th { padding-left: 18px; padding-right: 18px; }

.fondos-acumulado {
  padding: 18px 22px; background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
  border-top: 1px solid var(--vw-grey-2);
}
.fondos-acumulado .lbl {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
  font-weight: 700; color: #065F46; margin-bottom: 4px;
}
.fondos-acumulado .val {
  font-size: 26px; font-weight: 700; color: #065F46;
  letter-spacing: -0.5px; line-height: 1.1;
}
.fondos-acumulado .sub { font-size: 12px; color: var(--vw-grey-4); margin-top: 4px; }

.fondos-historial { padding: 0; }
.fondos-historial:empty { display: none; }
.fondos-historial .hist-head {
  padding: 14px 22px 8px; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.6px;
  font-weight: 700; color: var(--vw-grey-4);
  border-top: 1px solid var(--vw-grey-2);
  background: var(--vw-grey-1);
}
.fondos-historial .hist-list { list-style: none; padding: 0; margin: 0; }
.fondos-historial .hist-list li {
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: baseline; gap: 12px;
  padding: 10px 22px;
  border-top: 1px solid var(--vw-grey-2);
  font-size: 13px;
}
.fondos-historial .hist-mes { font-weight: 600; color: var(--vw-blue); text-transform: capitalize; }
.fondos-historial .hist-info { font-size: 12px; color: var(--vw-grey-4); }
.fondos-historial .hist-val { font-weight: 700; color: var(--vw-blue); font-variant-numeric: tabular-nums; }

.venc-chip {
  display: inline-block; margin-left: 8px;
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 100px;
  background: var(--vw-grey-1); color: var(--vw-grey-4);
  text-transform: uppercase; letter-spacing: 0.4px;
}
.sub-desc {
  display: inline-block; margin-left: 8px;
  font-size: 11px; color: var(--vw-grey-4); font-style: italic;
}
.personal-item .p-date {
  font-size: 12px; color: var(--vw-grey-3);
  margin-left: 12px; white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.personal-item { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }

.personal-wrap {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
}
.personal-body { padding: 0; }
.personal-header-main {
  padding: 16px 20px; background: var(--vw-blue); color: white;
  font-size: 15px; font-weight: 700; letter-spacing: 0.3px;
  text-transform: uppercase;
}
.personal-subhead {
  padding: 10px 20px 6px;
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--vw-grey-4);
  background: var(--vw-grey-1);
  border-top: 1px solid var(--vw-grey-2);
}
.personal-sep { height: 6px; }
.personal-item {
  padding: 10px 20px; font-size: 13px;
  border-bottom: 1px solid var(--vw-grey-2);
  color: var(--vw-black);
}
.personal-item:last-child { border-bottom: none; }

.vtos-controls {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
  align-items: center; justify-content: space-between;
}
.vtos-controls .group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.vtos-totalbar {
  background: var(--vw-blue); color: white;
  border-radius: var(--radius);
  padding: 16px 18px; margin-bottom: 18px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; flex-wrap: wrap;
  box-shadow: var(--shadow);
}
.vtos-totalbar .lbl {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
  opacity: 0.75; font-weight: 600;
}
.vtos-totalbar .val {
  font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-top: 2px;
}
.vtos-totalbar .sub { font-size: 12px; opacity: 0.8; margin-top: 4px; }
.vtos-totalbar button {
  background: rgba(255,255,255,0.15); color: white;
  padding: 8px 14px; border-radius: 6px;
  font-size: 13px; font-weight: 600;
}
.vtos-totalbar button:hover { background: rgba(255,255,255,0.28); }

.vto-group {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 10px; overflow: hidden;
  border-left: 4px solid var(--vw-grey-2);
  transition: border-color 0.15s;
}
.vto-group.selected { border-left-color: var(--vw-blue); }
.vto-group.vencida { border-left-color: var(--red); }
.vto-group-head {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer;
}
.vto-group-head:hover { background: var(--vw-grey-1); }
.vto-group-head input[type="checkbox"] {
  width: 18px; height: 18px; cursor: pointer; accent-color: var(--vw-blue);
}
.vto-group-head .date-label {
  font-size: 15px; font-weight: 700; color: var(--vw-blue);
  letter-spacing: -0.2px;
  display: flex; align-items: center; gap: 8px;
}
.vto-group-head .date-rel {
  font-size: 11px; padding: 2px 8px; border-radius: 100px;
  background: var(--vw-grey-1); color: var(--vw-grey-4);
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
}
.vto-group-head .date-rel.urgente { background: var(--red-soft); color: #991B1B; }
.vto-group-head .date-rel.pronto { background: var(--orange-soft); color: #92400E; }
.vto-group-head .stats {
  margin-left: auto; display: flex; gap: 18px; align-items: center;
  font-size: 13px;
}
.vto-group-head .stats .cnt { color: var(--vw-grey-4); }
.vto-group-head .stats .amt { font-weight: 700; color: var(--vw-blue); font-variant-numeric: tabular-nums; }
.vto-group-head .toggle { color: var(--vw-grey-3); font-size: 12px; }
.vto-group-body { display: none; border-top: 1px solid var(--vw-grey-2); }
.vto-group.open .vto-group-body { display: block; }
.vto-group-body table { width: 100%; }
.vto-group-body .vendida-tag {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 100px;
  background: var(--green-soft); color: #065F46;
  text-transform: uppercase; letter-spacing: 0.4px;
}

@media (max-width: 600px) {
  .wrap { padding: 16px 12px 40px; }
  .card .value { font-size: 18px; }
  thead th, tbody td { padding: 8px 10px; font-size: 12px; }
  .vto-group-head .stats { gap: 10px; font-size: 12px; }
}

/* ===== Sub-pestañas (dentro de Personal) ===== */
.subtabs {
  display: flex; gap: 4px; margin-bottom: 18px;
  background: var(--vw-grey-2); padding: 4px; border-radius: 10px;
  width: fit-content; max-width: 100%; overflow-x: auto;
}
.subtab {
  padding: 8px 16px; background: transparent; border-radius: 7px;
  font-size: 13px; font-weight: 600; color: var(--vw-grey-4);
  white-space: nowrap; transition: all 0.15s;
}
.subtab.active { background: white; color: var(--vw-blue); box-shadow: var(--shadow); }
.subpanel { display: none; }
.subpanel.active { display: block; }

/* ===== Cronograma de guardias ===== */
.guardias-bar {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; flex-wrap: wrap; margin-bottom: 14px;
}
.guardias-bar .g-title { font-size: 15px; font-weight: 700; color: var(--vw-blue); }
.guardias-bar .g-sub { font-size: 12px; color: var(--vw-grey-4); margin-top: 2px; }
.guardias-bar select {
  font-family: var(--font); font-size: 13px; padding: 7px 12px;
  border-radius: 8px; border: 1px solid var(--vw-grey-2); background: white;
  color: var(--vw-black); cursor: pointer; outline: none;
}
.guardias-bar .g-status { font-size: 12px; color: var(--vw-grey-3); min-height: 16px; }

.guardias-legend {
  display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px;
  font-size: 12px; color: var(--vw-grey-4);
}
.guardias-legend .lg { display: inline-flex; align-items: center; gap: 6px; }
.guardias-legend .dot { width: 12px; height: 12px; border-radius: 3px; }

.gsuc-block {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden; margin-bottom: 16px;
}
.gsuc-head {
  padding: 12px 18px; background: var(--vw-blue); color: white;
  font-size: 13px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
}
.gtable-scroll { overflow-x: auto; }
table.gtable { width: 100%; border-collapse: collapse; font-size: 13px; }
table.gtable th, table.gtable td {
  padding: 8px 10px; text-align: center; border-bottom: 1px solid var(--vw-grey-2);
  white-space: nowrap;
}
table.gtable thead th {
  background: var(--vw-grey-1); color: var(--vw-grey-4);
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
  position: sticky; top: 0; z-index: 1;
}
table.gtable td.g-day {
  text-align: left; font-weight: 600; color: var(--vw-blue);
  white-space: nowrap; position: sticky; left: 0; background: white; z-index: 1;
}
table.gtable td.g-day .g-dow { color: var(--vw-grey-3); font-weight: 500; margin-right: 6px; text-transform: capitalize; }
table.gtable tr.g-weekend td.g-day { color: var(--vw-grey-4); }
table.gtable tr.g-weekend { background: var(--vw-grey-1); }

.g-cell { padding: 4px 6px; }
.g-chip {
  display: inline-block; min-width: 58px; padding: 5px 8px; border-radius: 7px;

}
.g-chip.editable { cursor: pointer; }
.g-chip.editable:hover { filter: brightness(0.94); }
.g-chip.trabaja    { background: var(--green-soft);  color: #065F46; }
.g-chip.franco     { background: var(--vw-grey-2);   color: var(--vw-grey-4); }
.g-chip.vacaciones { background: #DBEAFE;            color: #1E40AF; }
.g-chip.curso      { background: var(--orange-soft); color: #92400E; }
.g-chip.falta      { background: var(--red-soft);    color: #991B1B; }
.g-chip.reemplazo  { background: #EDE9FE;            color: #5B21B6; }
.g-chip.compensa   { background: #CFFAFE;            color: #155E75; }
.dot.trabaja    { background: var(--green-soft);  border: 1px solid #6EE7B7; }
.dot.franco     { background: var(--vw-grey-2); }
.dot.vacaciones { background: #DBEAFE;            border: 1px solid #93C5FD; }
.dot.curso      { background: var(--orange-soft); border: 1px solid #FCD34D; }
.dot.falta      { background: var(--red-soft);    border: 1px solid #FCA5A5; }
.dot.reemplazo  { background: #EDE9FE;            border: 1px solid #C4B5FD; }
.dot.compensa   { background: #CFFAFE;            border: 1px solid #67E8F9; }

/* Balance de créditos de reemplazo */
.guardias-balance {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  margin-bottom: 14px; font-size: 12px; color: var(--vw-grey-4);
}
.guardias-balance .gb-lbl { font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; font-size: 11px; }
.gb-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 100px; font-size: 12px; font-weight: 700;
  background: var(--vw-grey-1); color: var(--vw-grey-4); border: 1px solid var(--vw-grey-2);
}
.gb-chip.pos { background: var(--green-soft); color: #065F46; border-color: #6EE7B7; }
.gb-chip.neg { background: var(--red-soft);   color: #991B1B; border-color: #FCA5A5; }

/* Popover selector de estado */
.g-pop-overlay { position: fixed; inset: 0; z-index: 200; }
.g-pop {
  position: absolute; z-index: 201; background: white;
  border-radius: 10px; box-shadow: var(--shadow-lg);
  border: 1px solid var(--vw-grey-2); padding: 6px; min-width: 150px;
}
.g-pop .g-pop-opt {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 8px 10px; border-radius: 7px; background: transparent;
  font-size: 13px; font-weight: 600; color: var(--vw-black); text-align: left;
}
.g-pop .g-pop-opt:hover { background: var(--vw-grey-1); }
.g-pop .g-pop-opt .dot { width: 12px; height: 12px; border-radius: 3px; }
.g-pop .g-pop-opt.current { outline: 2px solid var(--vw-blue); outline-offset: -2px; }

/* Popover-formulario (estado + motivo + llegada tarde) */
.g-pop.g-pop-wide { min-width: 240px; max-width: 280px; padding: 12px; max-height: 80vh; overflow-y: auto; }
.g-pop-head { font-size: 14px; font-weight: 700; color: var(--vw-blue); margin-bottom: 8px; }
.g-pop-head .g-pop-sub { font-size: 11px; font-weight: 500; color: var(--vw-grey-4); text-transform: capitalize; }
.g-pop-sec { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--vw-grey-3); margin: 10px 0 5px; }
.g-estados { display: flex; flex-direction: column; gap: 3px; }
.g-est { display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 7px; background: var(--vw-grey-1); font-size: 13px; font-weight: 600; color: var(--vw-black); text-align: left; }
.g-est:hover { background: var(--vw-grey-2); }
.g-est.sel { outline: 2px solid var(--vw-blue); outline-offset: -2px; background: white; }
.g-est .dot { width: 12px; height: 12px; border-radius: 3px; }
.g-motivo-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
.g-motivo-chip { font-size: 11px; padding: 4px 9px; border-radius: 100px; background: var(--vw-grey-1); color: var(--vw-grey-4); font-weight: 600; border: 1px solid var(--vw-grey-2); }
.g-motivo-chip:hover { background: var(--vw-grey-2); }
.g-motivo-chip.sel { background: var(--red-soft); color: #991B1B; border-color: #FCA5A5; }
.g-motivo-chips.reempl .g-motivo-chip.sel { background: #EDE9FE; color: #5B21B6; border-color: #C4B5FD; }
.g-pop-input { width: 100%; font-family: var(--font); font-size: 13px; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--vw-grey-2); outline: none; }
.g-pop-input:focus { border-color: var(--vw-blue); }
.g-tarde-row { display: flex; align-items: center; gap: 8px; }
.g-time { width: auto; flex: 1; }
.g-tarde-clear { font-size: 12px; color: var(--vw-grey-4); padding: 6px 8px; border-radius: 6px; background: var(--vw-grey-1); }
.g-tarde-clear:hover { color: var(--red); }
.g-pop-hint { font-size: 11px; color: var(--vw-grey-3); margin-top: 5px; }
.g-pop-err { font-size: 12px; color: var(--red); font-weight: 600; min-height: 0; margin-top: 6px; }
.g-pop-err:empty { display: none; }
.g-pop-actions { display: flex; gap: 8px; margin-top: 12px; }
.g-btn { flex: 1; padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 700; }
.g-btn.primary { background: var(--vw-blue); color: white; }
.g-btn.primary:hover { background: var(--vw-blue-light); }
.g-btn.ghost { background: var(--vw-grey-1); color: var(--vw-grey-4); }
.g-btn.ghost:hover { background: var(--vw-grey-2); }

/* Llegada tarde en el chip del calendario */
.gname-tarde { font-weight: 700; }
.gname.trabaja .gname-tarde { color: #92400E; }

/* Novedades derivadas de guardias */
.personal-item.nov-hoy { background: #E0F2FE; }
.nov-ico { margin-right: 2px; }

/* ===== Historial (etiquetas de área Ventas/General) ===== */
.rep-area { display: inline-block; font-size: 9px; font-weight: 700; padding: 1px 7px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.3px; vertical-align: middle; }
.rep-area.ventas  { background: #DBEAFE; color: #1E40AF; }
.rep-area.general { background: var(--vw-grey-2); color: var(--vw-grey-4); }

/* ===== Calendario / agenda de guardias ===== */
.gcal-month {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden; margin-bottom: 16px;
}
.gcal-month-head {
  padding: 12px 18px; background: var(--vw-blue); color: white;
  font-size: 13px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
}
.gcal-scroll { overflow-x: auto; }
.gcal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); min-width: 720px; }
.gcal-dow {
  text-align: center; padding: 8px 4px; font-size: 12px; font-weight: 700;
  color: var(--vw-grey-4); background: var(--vw-grey-1); text-transform: uppercase;
  border-bottom: 1px solid var(--vw-grey-2); border-right: 1px solid var(--vw-grey-2);
}
.gcal-dow.we { color: var(--vw-grey-3); }
.gcal-cell {
  min-height: 120px; padding: 6px 6px 9px;
  border-right: 1px solid var(--vw-grey-2); border-bottom: 1px solid var(--vw-grey-2);
  overflow: hidden;
}
.gcal-cell.empty { background: var(--vw-grey-1); min-height: 0; }
.gcal-cell.we { background: #FAFAFA; }
.gcal-cell.hoy { background: #E0F2FE; box-shadow: inset 0 0 0 2px #38BDF8; }
.gcal-daynum {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 14px; font-weight: 700; color: var(--vw-blue); margin-bottom: 5px;
}
.gcal-cell.we .gcal-daynum { color: var(--vw-grey-4); }
.gcal-hoy-badge {
  font-size: 9px; background: #0EA5E9; color: white;
  padding: 1px 7px; border-radius: 100px; font-weight: 700; letter-spacing: 0.5px;
}
.gcal-suc { margin-bottom: 5px; }
.gcal-suc-lbl {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.3px; color: var(--vw-grey-3); margin-bottom: 2px;
}
.gcal-names { display: flex; flex-wrap: wrap; gap: 3px; }
.gname {
  font-size: 10px; padding: 2px 6px; border-radius: 5px;
  font-weight: 600; white-space: nowrap;
}
.gname.editable { cursor: pointer; }
.gname.editable:hover { filter: brightness(0.93); }
.gname.trabaja    { background: var(--green-soft);  color: #065F46; }
.gname.franco     { background: var(--vw-grey-1);   color: var(--vw-grey-3); text-decoration: line-through; }
.gname.vacaciones { background: #DBEAFE;            color: #1E40AF; }
.gname.curso      { background: var(--orange-soft); color: #92400E; }
.gname.falta      { background: var(--red-soft);    color: #991B1B; }
.gname.reemplazo  { background: #EDE9FE;            color: #5B21B6; }
.gname.compensa   { background: #CFFAFE;            color: #155E75; }

.guardias-ausentes {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden; margin-bottom: 16px;
}
.guardias-ausentes .ga-head {
  padding: 12px 18px; border-bottom: 1px solid var(--vw-grey-2);
  font-size: 13px; font-weight: 700; color: var(--vw-blue);
}
.guardias-ausentes .ga-item {
  display: flex; justify-content: space-between; gap: 12px;
  padding: 10px 18px; font-size: 13px; border-bottom: 1px solid var(--vw-grey-2);
}
.guardias-ausentes .ga-item:last-child { border-bottom: none; }
.guardias-ausentes .ga-when { color: var(--vw-grey-4); white-space: nowrap; }
.guardias-ausentes .ga-tag {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px;
  text-transform: uppercase; letter-spacing: 0.4px;
}
.ga-tag.vacaciones { background: #DBEAFE; color: #1E40AF; }
.ga-tag.falta      { background: var(--red-soft); color: #991B1B; }
.ga-tag.curso      { background: var(--orange-soft); color: #92400E; }
.ga-tag.reemplazo  { background: #EDE9FE; color: #5B21B6; }
.ga-tag.compensa   { background: #CFFAFE; color: #155E75; }

/* ---- Bancos editable (tesorería) ---- */
.bancos-readonly { font-size: 12px; color: var(--vw-grey-4); margin: 4px 0 10px; }
.tes-inp {
  width: 100%; box-sizing: border-box; padding: 6px 8px; font-size: 13px;
  border: 1px solid var(--vw-grey-2, #d7dee5); border-radius: 6px; background: #fff; color: #111;
}
.tes-inp:focus { outline: none; border-color: var(--vw-blue); box-shadow: 0 0 0 2px rgba(0,30,80,.12); }
.tes-inp:disabled { background: #f6f8fa; color: #444; }
.tes-monto { text-align: right; }
.dispvw-inp {
  width: 100%; box-sizing: border-box; padding: 4px 8px; margin-top: 2px;
  font-size: 21px; font-weight: 700; color: var(--vw-blue); text-align: left;
  border: 1px solid var(--vw-grey-2, #d7dee5); border-radius: 6px; background: #fff;
}
.dispvw-inp:focus { outline: none; border-color: var(--vw-blue); box-shadow: 0 0 0 2px rgba(0,30,80,.12); }
.tes-moneda { width: auto; min-width: 56px; padding: 6px 4px; }
td .tes-concepto { min-width: 180px; }
td .tes-fecha { min-width: 90px; }
td .tes-nota { min-width: 90px; }
.tes-del {
  border: none; background: transparent; color: #b91c1c; cursor: pointer;
  font-size: 14px; font-weight: 700; padding: 2px 6px; border-radius: 6px; line-height: 1;
}
.tes-del:hover { background: var(--red-soft, #fee2e2); }
.tes-add {
  margin: 8px 0 2px; padding: 6px 12px; font-size: 13px; font-weight: 600; cursor: pointer;
  border: 1px dashed var(--vw-blue); border-radius: 8px; background: #fff; color: var(--vw-blue);
}
.tes-add:hover { background: rgba(0,30,80,.06); }
.card.bad .value { color: #b91c1c; }
.card.good .value { color: #047857; }

/* ---- Personal · form de carga de novedades ---- */
.nov-form {
  border: 1px solid var(--vw-grey-2, #d7dee5); border-radius: 10px; padding: 12px;
  margin-bottom: 14px; background: #fff;
}
.nov-form-title { font-size: 14px; font-weight: 700; color: var(--vw-blue); margin-bottom: 8px; }
.nov-form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.nov-form-row input, .nov-form-row select {
  padding: 7px 9px; font-size: 13px; border: 1px solid var(--vw-grey-2, #d7dee5);
  border-radius: 7px; background: #fff; color: #111;
}
.nov-form-row input:focus, .nov-form-row select:focus { outline: none; border-color: var(--vw-blue); }
.nov-form-row #novPersona { flex: 1; min-width: 140px; }
.nov-form-row #novDetalle { flex: 1; min-width: 140px; }
.nov-add {
  padding: 7px 16px; font-size: 13px; font-weight: 700; cursor: pointer; color: #fff;
  background: var(--vw-blue); border: none; border-radius: 7px;
}
.nov-add:hover { background: var(--vw-blue-light); }

/* Compras VW — en celular la grilla se vuelve tarjetas (usa los data-label) */
@media (max-width: 600px) {
  table.responsive-cards { min-width: 0 !important; }
  table.responsive-cards thead { display: none; }
  table.responsive-cards, table.responsive-cards tbody { display: block; width: 100%; }
  table.responsive-cards tr.cvw-sum {
    display: block; border: 1px solid var(--vw-grey-2); border-radius: 10px;
    margin: 10px 0; padding: 10px 12px; background: #fff; box-shadow: 0 1px 4px rgba(0,30,80,0.05);
  }
  table.responsive-cards tr.cvw-sum td {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; border: none; text-align: right !important; gap: 12px; white-space: normal;
  }
  table.responsive-cards tr.cvw-sum td::before {
    content: attr(data-label); font-size: 10.5px; font-weight: 600; color: var(--vw-grey-3);
    text-transform: uppercase; letter-spacing: .4px; flex: 0 0 auto; text-align: left;
  }
  table.responsive-cards tr.cvw-sum td[data-label=""]::before,
  table.responsive-cards tr.cvw-sum td[data-label="✓"]::before { content: ""; }
  table.responsive-cards tr.cvw-sum td[data-label="Serie"] {
    padding-top: 0; padding-bottom: 8px; margin-bottom: 6px;
    border-bottom: 1px dashed var(--vw-grey-2); font-size: 14px;
  }
  table.responsive-cards tr.cvw-sum td[data-label="Serie"]::before { display: none; }
  /* el detalle desplegable se muestra como bloque normal, no como tarjeta */
  table.responsive-cards tr.cvw-det { display: block; }
  table.responsive-cards tr.cvw-det td { display: block; text-align: left !important; }
  .cards { grid-template-columns: 1fr 1fr; }
  /* en celular se desactiva el scroll fijo / columnas fijas (vista de tarjetas) */
  .cvw-box { max-height: none !important; overflow: visible !important; box-shadow: none !important; }
  .cvw-topscroll { display: none !important; }
  table.responsive-cards td.cvw-stick { position: static !important; }
}

/* Compras VW — grilla con scroll propio: título fijo arriba y solo la Serie fija al costado */
.cvw-box {
  background: white;
  overflow: visible;   /* la tabla fluye con la página (scroll del navegador), no en una caja */
}
/* Tarjetas Floor Plan compactas: las 4 en un renglón, chicas, para que la tabla
   arranque más arriba. */
.cvw-cards {
  grid-template-columns: repeat(4, 1fr);
  gap: 8px; margin-bottom: 12px;
}
.cvw-cards .card { padding: 8px 12px; }
.cvw-cards .card .label { font-size: 9.5px; margin-bottom: 2px; letter-spacing: .4px; }
.cvw-cards .card .value { font-size: 15px; }
.cvw-cards .card .sub { display: none; }
.cvw-cards .dispvw-inp { font-size: 15px; }
@media (max-width: 600px) { .cvw-cards { grid-template-columns: 1fr 1fr; } }
/* La barra horizontal duplicada ya no se usa: la tabla fluye con la página. */
.cvw-topscroll { display: none; }
@media (min-width: 601px) {
  /* Títulos CONGELADOS al viewport (tipo Excel): al bajar la página, la fila de
     títulos queda fija justo debajo del header azul (~60px). */
  table.responsive-cards thead th { position: sticky; top: 60px; z-index: 3; background: #fff; box-shadow: inset 0 -1px 0 var(--vw-grey-2); }
  /* La columna Serie queda fija al costado (freeze pane) al scrollear horizontal. */
  table.responsive-cards td.cvw-stick { position: sticky; left: 0; z-index: 2; background: var(--row-bg, #fff); box-shadow: 4px 0 5px -3px rgba(0,30,80,.18); }
  table.responsive-cards thead th.cvw-stick { left: 0; top: 60px; z-index: 5; background: #fff; }
  table.responsive-cards td.cvw-stick, table.responsive-cards th.cvw-stick { min-width: 150px; }
}
</style>
</head>
<body>

<!-- ==================== GATE ==================== -->
<div id="gateScreen" class="gate hidden">
  <div class="gate-box">
    <div class="logo">Compras y Saldos</div>
    <div class="msg" id="gateMsg">Esta vista es privada.</div>
    <a class="btn" href="https://titogonzalez.online">← Volver al portal</a>
  </div>
</div>

<!-- ==================== APP ==================== -->
<div id="appScreen" class="hidden">
  <header class="app-header">
    <div class="brand">💰 Compras y Saldos</div>
    <div class="user-info">
      <span class="user-name" id="userName"></span>
      <button onclick="window.location.href='https://titogonzalez.online'">← Portal</button>
      <button onclick="logout()">Salir</button>
    </div>
  </header>

  <main class="wrap">
    <h2>Resumen financiero</h2>
    <p class="lead">Seguimiento de unidades VW por estado de pago, saldos de bancos, fondos y personal.</p>

    <div class="tabs">
      <button class="tab active" data-tab="compras" onclick="setTab('compras')">Compras VW</button>
      <button class="tab" data-tab="flujo" onclick="setTab('flujo')">Flujo financiero</button>
      <button class="tab" data-tab="bancos" onclick="setTab('bancos')">Bancos</button>
      <button class="tab" data-tab="personal" onclick="setTab('personal')">Personal</button>
    </div>

    <!-- =================== PANEL COMPRAS =================== -->
    <section class="panel active" id="panelCompras">
      <div class="toolbar">
        <div class="updated" id="updatedAtComprasVW">—</div>
        <button class="refresh" id="btnRefresh" onclick="loadComprasVW(true)">Actualizar</button>
      </div>

      <div id="comprasVWContent"></div>
    </section>

    <!-- =================== PANEL FLUJO FINANCIERO =================== -->
    <section class="panel" id="panelFlujo">
      <div class="toolbar">
        <div class="updated" id="updatedAtFlujo">—</div>
        <button class="refresh" id="btnRefreshFlujo" onclick="loadFlujoSaldos(true)">Actualizar</button>
      </div>
      <div id="flujoContent"></div>
    </section>

    <!-- =================== PANEL BANCOS =================== -->
    <section class="panel" id="panelBancos">
      <div class="toolbar">
        <div class="updated" id="updatedAtInforme">—</div>
        <button class="refresh" id="btnRefreshInforme" onclick="loadBancos(true)">Actualizar</button>
      </div>
      <div id="bancosContent"></div>
    </section>

    <!-- =================== PANEL PERSONAL =================== -->
    <section class="panel" id="panelPersonal">
      <div class="subtabs">
        <button class="subtab active" data-sub="novedades" onclick="setPersonalSub('novedades')">Novedades</button>
        <button class="subtab" data-sub="guardias" onclick="setPersonalSub('guardias')">Guardias Ventas</button>
        <button class="subtab" data-sub="historial" id="subtabHistorial" onclick="setPersonalSub('historial')">Historial</button>
      </div>
      <div class="subpanel active" id="subNovedades">
        <div id="personalContent"></div>
      </div>
      <div class="subpanel" id="subGuardias">
        <div id="guardiasContent"></div>
      </div>
      <div class="subpanel" id="subHistorial">
        <div id="historialContent"></div>
      </div>
    </section>

  </main>
</div>

<script>
// =======================================================================
// CONFIG
// =======================================================================
const SHARED_COOKIE = 'tga_session';
const SHARED_DOMAIN = '.titogonzalez.online';
const USUARIOS_PERMITIDOS = ['fngonzalez', 'fgonzalez', 'cgonzalez', 'marianom', 'vreyna'];

// Quién ve todo el sitio (admins) y qué solapas ve cada usuario restringido.
// Un usuario que NO esté en ADMIN_USERS sólo ve las solapas de TAB_ACCESS.
const ADMIN_USERS = ['fngonzalez', 'fgonzalez', 'cgonzalez', 'vreyna'];   // vreyna (Valeria): ve todo
const TAB_ACCESS = {
  marianom: ['personal'],   // MarianoM (carga las guardias): sólo Personal
};
// Quién puede editar la carga de Bancos (tesorería) — los mismos que la ven.
const BANCOS_EDITORES = ['fngonzalez', 'fgonzalez', 'cgonzalez', 'vreyna'];
// Quién puede editar el cronograma de guardias
const GUARDIAS_EDITORES = ['fngonzalez', 'fgonzalez', 'marianom'];

function getSharedCookie() {
  const m = document.cookie.match(new RegExp('(?:^|;\\s*)' + SHARED_COOKIE + '=([^;]+)'));
  if (!m) return null;
  try { return JSON.parse(decodeURIComponent(m[1])); } catch { return null; }
}
function clearSharedCookie() {
  document.cookie = SHARED_COOKIE + '=; path=/; domain=' + SHARED_DOMAIN + '; max-age=0; Secure; SameSite=Lax';
}

function setTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const map = {
    compras:  'panelCompras',
    flujo:    'panelFlujo',
    bancos:   'panelBancos',
    personal: 'panelPersonal',
  };
  const el = document.getElementById(map[tab]);
  if (el) el.classList.add('active');
  if (tab === 'compras' && !comprasVWData) loadComprasVW();
  if (tab === 'flujo') loadFlujoSaldos();
  if (tab === 'bancos')   loadBancos();
  if (tab === 'personal') {
    const sub = document.querySelector('.subtab.active')?.dataset.sub || 'novedades';
    setPersonalSub(sub);
  }
}

// Sub-pestañas dentro de Personal: Novedades / Guardias Ventas / Historial
function setPersonalSub(sub) {
  document.querySelectorAll('.subtab').forEach(t => t.classList.toggle('active', t.dataset.sub === sub));
  document.querySelectorAll('.subpanel').forEach(p => p.classList.remove('active'));
  const map = { novedades: 'subNovedades', guardias: 'subGuardias', historial: 'subHistorial' };

  if (el) el.classList.add('active');

}

// INFORME · fetch (lazy, una vez)
// =======================================================================
async function loadInforme(forzar) {
  const btn = document.getElementById('btnRefreshInforme');
  if (btn) { btn.disabled = true; btn.textContent = 'Cargando...'; }
  try {
    const url = APPS_SCRIPT_URL + '?token=' + encodeURIComponent(APPS_SCRIPT_TOKEN) + '&tipo=informe';
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data && data.error) throw new Error(data.error);
    lastInforme = data;
    // Acumular las novedades del personal general (Sheet) en Supabase (dedup).
    snapshotNovedadesGenerales(data.personal);
    const upd = document.getElementById('updatedAtInforme');
    if (upd && data.updatedAt) upd.textContent = 'Actualizado: ' + new Date(data.updatedAt).toLocaleString('es-AR');
    // re-renderizar la solapa activa si aplica
    const active = document.querySelector('.tab.active')?.dataset.tab;
    if (active === 'bancos')   renderBancos();
    if (active === 'personal') renderPersonal();
    return data;
  } catch (e) {
    console.error(e);
    const msg = `<div class="errbox"><div class="ico">⚠️</div>
      <div class="ttl">No se pudo cargar el INFORME</div>
      <div class="det">${escapeHtml(e.message || String(e))}</div></div>`;
    const wrap = document.getElementById('bancosContent');
    if (wrap) wrap.innerHTML = msg;
    const wrap2 = document.getElementById('personalContent');
    if (wrap2) wrap2.innerHTML = msg;
    throw e;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Actualizar'; }
  }
}

function ensureInforme(cb) {
  if (lastInforme) { cb(); return; }
  const wrap = document.getElementById('bancosContent');
  if (wrap) wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando INFORME...</div></div>';
  const wrap2 = document.getElementById('personalContent');
  if (wrap2) wrap2.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando INFORME...</div></div>';
  loadInforme().then(() => cb()).catch(() => {});
}

function _fechaDMA(iso) {
  const s = String(iso || '').slice(0, 10);
  if (!/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const p = s.split('-');
  return p[2] + '/' + p[1] + '/' + p[0].slice(2);
}
const _MESES_NOMBRES_LARGOS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function _mesLabelLargo(mesKey) {
  const m = (mesKey || '').match(/^(\d{4})-(\d{2})/);
  if (!m) return mesKey;
  return _MESES_NOMBRES_LARGOS[parseInt(m[2], 10) - 1];
}

let comprasVWData = null, comprasVWBusca = '', comprasVWFiltro = 'todas', comprasVWMes = '__todos__', comprasVWAbierta = '', comprasVWVence = '__todas__';
let comprasVWSel = new Set();   // series seleccionadas para sumar deuda a VW
let comprasVWPagando = '';      // serie con el pago inline abierto
let comprasVWImpagas = true, comprasVWVendidas = false;   // toggles combinables (en saldos arranca filtrando impagas)

const _CVW_MESNUM = { enero: 1, febrero: 2, marzo: 3, abril: 4, mayo: 5, junio: 6, julio: 7, agosto: 8, septiembre: 9, setiembre: 9, octubre: 10, noviembre: 11, diciembre: 12 };
function _cvwMesKey(mes) {
  const p = String(mes || '').toLowerCase().split('-');
  const n = _CVW_MESNUM[(p[0] || '').trim()] || 0;
  const y = Number((p[1] || '').trim()) || 0;
  return y * 100 + n;
}
// vto "26-mar" / "08-ene" → clave ordenable (mes*100+día). Sin fecha → al final.
const _CVW_MESAB = { ene: 1, feb: 2, mar: 3, abr: 4, may: 5, jun: 6, jul: 7, ago: 8, sep: 9, set: 9, oct: 10, nov: 11, dic: 12 };
function _cvwVenceKey(v) {
  const iso = _cvwToISO(v);
  return iso ? Number(iso.replace(/-/g, '')) : 999999999;   // yyyymmdd: ordena bien y entre años
}
// Mes actual en formato "junio-26" (para precargar la carga de Valeria; al cambiar
// de mes toma el nuevo solo, porque se evalúa con new Date() en cada render).
function _cvwMesActual() {
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const d = new Date();
  return meses[d.getMonth()] + '-' + String(d.getFullYear()).slice(-2);
}
// Normaliza una fecha guardada (ISO yyyy-mm-dd ó vieja "DD-mmm[-AA]") a ISO.
// Las viejas sin año se asumen 2026 (toda la data migrada es de 2026).
function _cvwToISO(v) {
  const s = String(v || '').trim();
  if (!s) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const p = s.toLowerCase().split('-');
  if (p.length < 2) return '';
  const d = parseInt(p[0], 10), m = _CVW_MESAB[(p[1] || '').slice(0, 3)];
  if (!d || !m) return '';
  const y = p[2] ? (p[2].length === 2 ? 2000 + parseInt(p[2], 10) : parseInt(p[2], 10)) : 2026;
  const pad = n => String(n).padStart(2, '0');
  return y + '-' + pad(m) + '-' + pad(d);
}
// ISO (ó DD-mmm) → "DD/MM/AA" legible para la grilla.
function _cvwFechaDisp(v) {
  const iso = _cvwToISO(v);
  const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? (m[3] + '/' + m[2] + '/' + m[1].slice(-2)) : String(v || '');
}
function _cvwMesLabel(mesKey) { const m = String(mesKey || '').match(/^(\d{4})-(\d{2})/); return m ? (_mesLabelLargo(mesKey) + ' ' + m[1]) : String(mesKey || ''); }
function _cvwHoyISO() { const d = new Date(); const p = n => String(n).padStart(2, '0'); return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()); }
function _cvwISOtoDDmmm(iso) { const ab = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic']; const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/); return m ? (String(parseInt(m[3], 10)) + '-' + ab[parseInt(m[2], 10) - 1]) : String(iso); }
function _cvwIva(modelo) {
  const m = String(modelo || '').toUpperCase();
  return (m.indexOf('AMAROK') >= 0 || m.indexOf('SAVEIRO') >= 0) ? 0.105 : 0.21;
}
// BRUTO de la unidad (total con impuestos) = lo que Valeria carga / lo que se le
// debe a VW. Se guarda en importe_saldo. Para filas viejas que solo tienen el
// neto gravado, lo reconstruyo (neto × (1+IVA+IIBB)) como fallback.
function _cvwBruto(c) {
  const s = Number(c.importe_saldo) || 0;
  if (s > 0) return s;
  const neto = Number(c.neto) || 0;
  if (!neto) return 0;
  const rate = (c.iva_rate != null && c.iva_rate !== '') ? Number(c.iva_rate) : _cvwIva(c.modeloOficial || c.modelo_valeria);
  return Math.round(neto * (1 + rate + 0.0005 + 0.0002) * 100) / 100;
}
// Lo que se le DEBE a VW por esa unidad: el bruto si está impaga; 0 si está paga.
function _cvwDebe(c) {
  return c.impaga ? _cvwBruto(c) : 0;
}
// El TOTAL de la factura (importe_saldo) y el desglose (neto gravado, IVA, IIBB
// Entre Ríos / CABA / Bs As) los carga Valeria A MANO. La suma del desglose tiene
// que dar el total; si difiere, se marca el descuadre. Para filas viejas sin
// desglose manual, neto/IVA se derivan del bruto como fallback (solo lectura).
function _cvwCalc(c) {
  const rate = (c.iva_rate != null && c.iva_rate !== '') ? Number(c.iva_rate) : _cvwIva(c.modeloOficial || c.modelo_valeria);
  const bruto = _cvwBruto(c);   // = total factura (importe_saldo) o fallback
  c.brutoCalc = Math.round(bruto * 100) / 100;
  c.ivaRate = rate;
  const netoMan = (c.neto != null && c.neto !== '') ? Number(c.neto) : null;
  const ivaMan = (c.iva_monto != null && c.iva_monto !== '') ? Number(c.iva_monto) : null;
  c.iibbEr = Number(c.iibb_er) || 0;
  c.iibbCaba = Number(c.iibb_caba) || 0;
  c.iibbBsas = Number(c.iibb_bsas) || 0;
  c.netoGravado = (netoMan != null) ? Math.round(netoMan * 100) / 100 : Math.round((bruto / (1 + rate)) * 100) / 100;
  c.iva = (ivaMan != null) ? Math.round(ivaMan * 100) / 100 : Math.round((bruto - c.netoGravado) * 100) / 100;
  // ¿cargó algún componente a mano? entonces validamos que cuadre con el total.
  c.tieneDesglose = (netoMan != null) || (ivaMan != null) || !!c.iibbEr || !!c.iibbCaba || !!c.iibbBsas;
  c.sumDesglose = Math.round((c.netoGravado + c.iva + c.iibbEr + c.iibbCaba + c.iibbBsas) * 100) / 100;
  c.descuadre = Math.round((bruto - c.sumDesglose) * 100) / 100;   // total − suma (≈0 = cuadra)
  c.control = c.brutoCalc;   // "Control" pasa a ser el total (== suma del desglose si cuadra)
}

async function loadComprasVW(forzar) {
  // tocar afuera de la grilla cierra el detalle desplegado (una sola vez)
  if (!window._cvwOutsideBound) {
    window._cvwOutsideBound = true;
    document.addEventListener('click', function (e) {
      if (!comprasVWAbierta && !comprasVWPagando) return;
      // si el target se desconectó por un re-render (ej. tocar otro renglón), ignorar
      if (e.target && e.target.isConnected === false) return;
      const cont = document.getElementById('comprasVWContent');
      if (cont && !cont.contains(e.target)) { comprasVWAbierta = ''; comprasVWPagando = ''; renderComprasVW(); }
    });
  }
  const cont = document.getElementById('comprasVWContent');

  // Primer pintado INSTANTÁNEO con lo último guardado en este navegador; después se
  // refresca en background (stale-while-revalidate). Así no esperás cada vez.
  if (!comprasVWData && !forzar) {
    const cached = _cvwCacheGet();
    if (cached && cached.d) {
      comprasVWData = cached.d;
      if (cached.disp != null) comprasDispVW = cached.disp;
      (comprasVWData.compras || []).forEach(_cvwCalc);
      renderComprasVW();
      _cvwFetch(true, true);      // en background, sin spinner; muestra "Actualizando…"
      return;
    }
  }

  if (cont && !comprasVWData) cont.innerHTML = '<div class="empty">Cargando facturas…</div>';
  // 1ra vez sin cache: usa el cache del backend (más rápido). "Actualizar" pide fresco.
  await _cvwFetch(!!comprasVWData, !!forzar);
}

function _cvwEstado(txt) {
  const up = document.getElementById('updatedAtComprasVW');
  if (up) up.textContent = txt;
}
function _cvwCacheGet() {
  try { const r = localStorage.getItem('saldos_cvw_cache'); return r ? JSON.parse(r) : null; } catch { return null; }
}
function _cvwCacheSet() {
  try { localStorage.setItem('saldos_cvw_cache', JSON.stringify({ d: comprasVWData, disp: comprasDispVW })); } catch {}
}
// Trae compras_vw del backend de Gestión y repinta. silent = si falla, deja lo que
// ya se ve (no rompe). fresh = pide datos frescos (saltea el cache del Apps Script)
// para detectar cambios. El campo cargable es el BRUTO (total c/imp.): _cvwCalc
// recalcula neto/IVA hacia atrás en cada fila para que el desglose sea consistente.
async function _cvwFetch(silent, fresh) {
  _cvwEstado('Actualizando…');
  const btn = document.getElementById('btnRefresh');
  if (btn) btn.disabled = true;
  try {
    const url = GESTION_URL + '?token=' + encodeURIComponent(GESTION_TOKEN) + '&tipo=comprasvw' + (fresh ? '&fresh=1' : '');
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    comprasVWData = data;
    (comprasVWData.compras || []).forEach(_cvwCalc);
    comprasDispVW = await _loadDispVW();
    _cvwCacheSet();
    renderComprasVW();
    const hora = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    _cvwEstado('Actualizado ' + hora + (data.total != null ? ' · ' + data.total + ' facturas' : ''));
  } catch (e) {
    console.error('loadComprasVW:', e);
    const cont = document.getElementById('comprasVWContent');
    if (!silent && !comprasVWData) { if (cont) cont.innerHTML = '<div class="empty">Error cargando: ' + escapeHtml(e.message) + '</div>'; }
    else _cvwEstado('Sin conexión · mostrando lo último guardado');
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function _postCompraVW(obj) {
  const body = new URLSearchParams();
  body.set('payload', JSON.stringify(Object.assign({ token: GESTION_TOKEN, usuario: window._tgaUser || '' }, obj)));
  const res = await fetch(GESTION_URL, { method: 'POST', body: body });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

async function guardarChasisManual(serie, k) {
  const el = document.getElementById('cvwchasis_' + k);

  if (!chasis) { alert('Escribí el chasis (o el VIN completo)'); return; }
  try {

// Sincroniza la barra horizontal superior con el scroll del box (y viceversa),
// y ajusta su ancho al de la tabla, para poder ir izquierda/derecha sin bajar.
// La tabla fluye con la página (scroll del navegador), sin scroll interno ni barra

function _cvwSyncTopScroll() { /* no-op */ }
// Recalcula en vivo el cuadre del desglose de la factura (total = neto + IVA + IIBB…).
function _cvwRecalcUI(k) {
  const el = document.getElementById('cvwrec_' + k);
  if (!el) return;
  const g = id => { const e = document.getElementById('cvw_' + id + '_' + k); return e ? (parseFloat(e.value) || 0) : 0; };
  const total = g('importe_saldo');
  const sum = g('neto') + g('iva_monto') + g('iibb_er') + g('iibb_caba') + g('iibb_bsas');
  const diff = Math.round((total - sum) * 100) / 100;
  const ar = n => Math.round(n).toLocaleString('es-AR');
  if (!total && !sum) { el.innerHTML = '<span style="color:var(--vw-grey-3)">Cargá el total y el desglose para validar que cuadre.</span>'; return; }
  if (Math.abs(diff) < 1) {
    el.innerHTML = '<span style="color:#0a7a30;font-weight:700">✓ Cuadra</span> <span style="color:var(--vw-grey-3)">— neto + impuestos = total ($' + ar(sum) + ')</span>';
  } else {
    el.innerHTML = '<span style="color:#cc3300;font-weight:700">⚠ Descuadre: $' + ar(Math.abs(diff)) + '</span> '
      + '<span style="color:var(--vw-grey-3)">— suma del desglose $' + ar(sum) + ' ' + (diff > 0 ? 'es menor que' : 'supera al') + ' total $' + ar(total) + '</span>';
  }
}

async function guardarCompraVW(serie) {
  const k = serie.replace(/[^A-Za-z0-9]/g, '_');
  const c = (comprasVWData.compras || []).find(x => x.serie === serie); if (!c) return;
  const campos = {};
  const NUM = ['importe_saldo', 'neto', 'iva_monto', 'iibb_er', 'iibb_caba', 'iibb_bsas'];
  for (const f of ['mes', 'modelo_valeria', 'color', 'fc_numero', 'fecha_fc', 'vence', 'fecha_pago_vw', 'importe_saldo', 'neto', 'iva_monto', 'iibb_er', 'iibb_caba', 'iibb_bsas']) {
    const el = document.getElementById('cvw_' + f + '_' + k);
    if (el) { campos[f] = el.value.trim(); c[f] = NUM.indexOf(f) >= 0 ? (el.value.trim() === '' ? null : Number(el.value)) : el.value.trim(); }
  }
  _cvwCalc(c); renderComprasVW();
  try { const r = await _postCompraVW({ accion: 'setcompravw', serie: serie, campos: campos }); if (r && r.error) throw new Error(r.error); }
  catch (e) { alert('No se pudo guardar ' + serie + ': ' + e.message); }
}
async function nuevaCompraVW() {
  const g = id => ((document.getElementById(id) || {}).value || '').trim();
  const serie = g('nuevo_serie').toUpperCase();
  if (!serie) { alert('Falta la serie'); return; }
  const campos = { mes: g('nuevo_mes'), modelo_valeria: g('nuevo_modelo'), color: g('nuevo_color'), fc_numero: g('nuevo_fc'), fecha_fc: g('nuevo_fechafc'), vence: g('nuevo_vence'), importe_saldo: g('nuevo_neto'), fecha_pago_vw: g('nuevo_fechapago') };
  try { const r = await _postCompraVW({ accion: 'setcompravw', serie: serie, campos: campos }); if (r && r.error) throw new Error(r.error); }
  catch (e) { alert('No se pudo agregar: ' + e.message); return; }
  await loadComprasVW(true);
}
function iniciarPagoInline(serie) { comprasVWPagando = serie; renderComprasVW(); }
function cancelarPagoInline() { comprasVWPagando = ''; renderComprasVW(); }
async function pagarCompraVW(serie) {
  const k = serie.replace(/[^A-Za-z0-9]/g, '_');
  const el = document.getElementById('cvwpagoinline_' + k) || document.getElementById('cvwpagofecha_' + k);
  const fecha = (el && el.value) ? el.value : _cvwHoyISO();   // ISO yyyy-mm-dd
  const c = (comprasVWData.compras || []).find(x => x.serie === serie); if (!c) return;
  c.fecha_pago_vw = fecha; c.impaga = false; comprasVWPagando = ''; renderComprasVW();
  try { const r = await _postCompraVW({ accion: 'setcompravw', serie: serie, campos: { fecha_pago_vw: fecha } }); if (r && r.error) throw new Error(r.error); }
  catch (e) { alert('No se pudo registrar el pago: ' + e.message); }
}
async function deshacerPagoCompraVW(serie) {
  const c = (comprasVWData.compras || []).find(x => x.serie === serie); if (!c) return;
  if (!confirm('¿Deshacer el pago de la serie ' + serie + '?\nVuelve a quedar IMPAGA (suma a la deuda con VW).')) return;
  const prevFecha = c.fecha_pago_vw, prevImpaga = c.impaga;
  c.fecha_pago_vw = ''; c.impaga = true; renderComprasVW();
  try { const r = await _postCompraVW({ accion: 'setcompravw', serie: serie, campos: { fecha_pago_vw: '' } }); if (r && r.error) throw new Error(r.error); }
  catch (e) { c.fecha_pago_vw = prevFecha; c.impaga = prevImpaga; renderComprasVW(); alert('No se pudo deshacer el pago: ' + e.message); }
}
async function pagarSeleccionadasCompraVW() {
  const el = document.getElementById('cvwbulkfecha');
  const fecha = (el && el.value) ? el.value : _cvwHoyISO();   // ISO yyyy-mm-dd
  const series = [];
  for (const c of (comprasVWData.compras || [])) if (comprasVWSel.has(c.serie) && c.impaga) series.push(c.serie);
  if (!series.length) { alert('No hay impagas seleccionadas para pagar.'); return; }
  if (!confirm('¿Marcar como pagadas ' + series.length + ' unidad(es) con fecha ' + _cvwFechaDisp(fecha) + '?')) return;
  for (const c of comprasVWData.compras) if (series.indexOf(c.serie) >= 0) { c.fecha_pago_vw = fecha; c.impaga = false; }
  renderComprasVW();
  const results = await Promise.all(series.map(s =>
    _postCompraVW({ accion: 'setcompravw', serie: s, campos: { fecha_pago_vw: fecha } }).then(r => (r && r.error) ? s : null).catch(() => s)));
  const errs = results.filter(Boolean);
  if (errs.length) alert('No se pudieron guardar ' + errs.length + ' (' + errs.join(', ') + '). Reintentá.');
}
async function conciliarCompraVW(serie) {
  try { const r = await _postCompraVW({ accion: 'setcompravw', serie: serie, campos: { conciliado: true } }); if (r && r.error) throw new Error(r.error); }
  catch (e) { alert('No se pudo conciliar: ' + e.message); return; }
  await loadComprasVW(true);
}
async function borrarCompraVW(serie) {
  if (!confirm('¿Estás seguro de ELIMINAR la factura de compra de la serie ' + serie + '?\n\nEsta acción no se puede deshacer.')) return;
  try { const r = await _postCompraVW({ accion: 'delcompravw', serie: serie }); if (r && r.error) throw new Error(r.error); }
  catch (e) { alert('No se pudo eliminar: ' + e.message); return; }
  await loadComprasVW(true);
}

function renderCompras(data) {
  const wrap = document.getElementById('comprasContent');
  const unidades = Array.isArray(data.unidades) ? data.unidades : [];
  const floorPlan           = Number(data.floorPlan) || 0;
  const deudaFloorPlan      = Number(data.deudaFloorPlan) || 0;
  const disponibleFloorPlan = Number(data.disponibleFloorPlan) || 0;
  const disponibleVW        = Number(data.disponibleVW) || 0;

  const impagas = unidades.filter(u => u.impaga);
  const pagadas = unidades.filter(u => !u.impaga && u.fechaPago);

  const cards = `
    <div class="cards">
      <div class="card">
        <div class="label">Floor Plan</div>
        <div class="value">${fmtMoney(floorPlan)}</div>
        <div class="sub">Línea de crédito con VW (fijo)</div>
      </div>
      <div class="card warn">
        <div class="label">Deuda Floor Plan</div>
        <div class="value">${fmtMoney(deudaFloorPlan)}</div>
        <div class="sub">${impagas.length} unidad${impagas.length === 1 ? '' : 'es'} impaga${impagas.length === 1 ? '' : 's'} (lo que debemos a VW)</div>
      </div>
      <div class="card ${disponibleFloorPlan >= 0 ? 'good' : 'bad'}">
        <div class="label">Disponible Floor Plan</div>
        <div class="value">${fmtMoney(disponibleFloorPlan)}</div>
        <div class="sub">Floor Plan − deuda</div>
      </div>
      <div class="card good">
        <div class="label">Disponible para pagar VW</div>
        ${BANCOS_EDITORES.includes((getSharedCookie() || {}).usuario)
          ? `<input type="text" class="dispvw-inp" value="${disponibleVW || ''}" placeholder="0" onchange="guardarDispVW(this)">`
          : `<div class="value">${fmtMoney(disponibleVW)}</div>`}
        <div class="sub">manual · se conectará con Bancos</div>
      </div>
    </div>
  `;

  const filtros = `
    <div class="filters">
      <button class="filter-btn ${filterStatus === 'impagas' ? 'active' : ''}" onclick="setFilterStatus('impagas')">Solo impagas (${impagas.length})</button>
      <button class="filter-btn ${filterStatus === 'todas' ? 'active' : ''}" onclick="setFilterStatus('todas')">Todas (${unidades.length})</button>
      <button class="filter-btn ${filterStatus === 'pagadas' ? 'active' : ''}" onclick="setFilterStatus('pagadas')">Pagadas (${pagadas.length})</button>
    </div>
  `;

  // Select de fecha de vencimiento (sólo fechas de impagas — las únicas con vencimiento relevante)
  const vencesSet = new Map(); // key → {label, date}
  unidades.filter(u => u.impaga).forEach(u => {
    const d = parseFechaCorta(u.vence);
    const key = d ? fmtDateKey(d) : (u.vence ? '' : 'sin');
    if (!key) return;
    if (!vencesSet.has(key)) {
      vencesSet.set(key, { label: d ? fmtFechaLarga(d) : 'Sin fecha', date: d });
    }
  });
  const vencesArr = Array.from(vencesSet.entries()).sort((a, b) => {
    if (!a[1].date && !b[1].date) return 0;
    if (!a[1].date) return 1;
    if (!b[1].date) return -1;
    return a[1].date - b[1].date;
  });
  const vencesOpts = vencesArr.map(([k, v]) =>
    `<option value="${escapeHtml(k)}" ${k === colVence ? 'selected' : ''}>${escapeHtml(v.label)}</option>`
  ).join('');

  const colFiltros = `
    <div class="col-filters">
      <input type="search" placeholder="Buscar serie, preventa, modelo..." value="${escapeHtml(colSearch)}" oninput="setColSearch(this.value)">
      <select onchange="setColVence(this.value)">
        <option value="">Vence (todas)</option>${vencesOpts}
      </select>
      ${(colSearch || colVence) ? '<button class="clear-btn" onclick="clearColFilters()">✕ Limpiar</button>' : ''}
    </div>
  `;

  const tableHtml = renderTablaUnidades(unidades);

  wrap.innerHTML = cards + filtros + colFiltros + renderSelectionBar() + tableHtml;
  syncHeadCheck();

  // Updated at
  if (data.updatedAt) {
    document.getElementById('updatedAt').textContent = 'Actualizado: ' + new Date(data.updatedAt).toLocaleString('es-AR');
  }
}
