function clearColFilters() {
  colSearch = ''; colVence = '';
  if (lastCompras) renderCompras(lastCompras);
}

// Selección de filas
function toggleComprasSelect(rowKey) {
  if (comprasSelected.has(rowKey)) comprasSelected.delete(rowKey);
  else comprasSelected.add(rowKey);
  rerenderComprasInner();
}
function clearComprasSelection() {
  comprasSelected.clear();
  rerenderComprasInner();
}
function seleccionarVendidasVisibles() {
  const filas = getFilasVisibles().filter(u => u.impaga && esVendida(u));
  const yaTodasTildadas = filas.length > 0 && filas.every(u => comprasSelected.has(filaKey(u)));
  if (yaTodasTildadas) {
    // Toggle: si ya están todas, las deselecciona
    filas.forEach(u => comprasSelected.delete(filaKey(u)));
  } else {
    filas.forEach(u => comprasSelected.add(filaKey(u)));
  }
  rerenderComprasInner();
}

function toggleSelectAllVisible(cb) {
  const visibles = getFilasVisibles().filter(u => u.impaga);
  if (cb.checked) {
    visibles.forEach(u => comprasSelected.add(filaKey(u)));
  } else {
    visibles.forEach(u => comprasSelected.delete(filaKey(u)));
  }
  rerenderComprasInner();
}

function syncHeadCheck() {
  const head = document.getElementById('headCheck');
  if (!head) return;
  const visibles = getFilasVisibles().filter(u => u.impaga);
  if (!visibles.length) {
    head.checked = false; head.indeterminate = false; return;
  }
  const tildadas = visibles.filter(u => comprasSelected.has(filaKey(u))).length;
  if (tildadas === 0) { head.checked = false; head.indeterminate = false; }
  else if (tildadas === visibles.length) { head.checked = true; head.indeterminate = false; }
  else { head.checked = false; head.indeterminate = true; }
}

function rerenderComprasInner() {
  if (!lastCompras) return;
  const wrap = document.getElementById('comprasContent');
  // Reemplazar tabla y barra de selección sin tocar cards/filtros (para no perder foco del input)
  const tableWrap = wrap.querySelector('.table-wrap');
  const emptyTbl = wrap.querySelector('.table-wrap + .empty, .col-filters ~ .empty:not(.cards .empty)');
  const selBar = wrap.querySelector('.selection-bar');

  const nuevoSel = renderSelectionBar();
  const nuevaTabla = renderTablaUnidades(lastCompras.unidades || []);

  if (selBar) {
    const tmp = document.createElement('div');
    tmp.innerHTML = nuevoSel;
    if (tmp.firstElementChild) selBar.replaceWith(tmp.firstElementChild);
  }
  const targetTable = tableWrap || emptyTbl;
  if (targetTable) {
    const tmp2 = document.createElement('div');
    tmp2.innerHTML = nuevaTabla;
    if (tmp2.firstElementChild) targetTable.replaceWith(tmp2.firstElementChild);
  } else {
    renderCompras(lastCompras);
    return;
  }

  // Mostrar/ocultar el botón limpiar
  const wantClear = !!(colSearch || colVence);
  const cf = wrap.querySelector('.col-filters');
  if (cf) {
    let btn = cf.querySelector('.clear-btn');
    if (wantClear && !btn) {
      btn = document.createElement('button');
      btn.className = 'clear-btn';
      btn.textContent = '✕ Limpiar';
      btn.onclick = clearColFilters;
      cf.appendChild(btn);
    } else if (!wantClear && btn) {
      btn.remove();
    }
  }
  syncHeadCheck();
}

function renderTablaUnidades(unidades) {
  let filas;
  if (filterStatus === 'impagas') filas = unidades.filter(u => u.impaga);
  else if (filterStatus === 'pagadas') filas = unidades.filter(u => !u.impaga && u.fechaPago);
  else filas = unidades.slice();

  // Filtro por fecha de vencimiento
  if (colVence) {
    filas = filas.filter(u => {
      const d = parseFechaCorta(u.vence);
      const key = d ? fmtDateKey(d) : (u.vence ? '' : 'sin');
      return key === colVence;
    });
  }
  if (colSearch) {
    const q = colSearch.trim().toLowerCase();
    filas = filas.filter(u => {
      const blob = [u.serie, u.preventa, u.modelo, u.color, u.mes, u.fc, u.fechaVta, u.vence, u.localidad]
        .map(x => String(x || '').toLowerCase()).join(' ');
      return blob.indexOf(q) > -1;
    });
  }

  // Ordenar por fecha de vencimiento (más próxima primero)
  filas.sort((a, b) => {
    const da = parseFechaCorta(a.vence);
    const db = parseFechaCorta(b.vence);
    if (!da && !db) return 0;
    if (!da) return 1;
    if (!db) return -1;
    return da - db;
  });

  if (!filas.length) {
    return '<div class="empty"><div class="ico">✅</div><div style="font-size:15px; color:var(--vw-grey-4); font-weight:600">Sin unidades en esta vista</div></div>';
  }

  const hoy = new Date(); hoy.setHours(0,0,0,0);

  const rows = filas.map(u => {
    const vence = parseFechaCorta(u.vence);
    let pill = '';
    if (u.impaga) {
      if (vence && vence < hoy) pill = '<span class="pill vencida">Vencida</span>';
      else pill = '<span class="pill impaga">Impaga</span>';
    } else if (u.fechaPago) {
      pill = '<span class="pill pagada">Pagada</span>';
    }
    const importeMostrar = u.impaga ? u.importe : u.total;
    const rowKey = filaKey(u);
    const checked = comprasSelected.has(rowKey);
    const checkbox = u.impaga
      ? `<input type="checkbox" class="row-check" ${checked ? 'checked' : ''} onchange="toggleComprasSelect('${escapeHtml(rowKey)}')">`
      : '';
    return `
      <tr class="${checked ? 'row-selected' : ''}">
        <td>${checkbox}</td>
        <td>${pill}</td>
        <td class="vence">${escapeHtml(u.vence || '—')}</td>
        <td>${escapeHtml(u.fechaFc || '—')}</td>
        <td class="serie">${escapeHtml(u.serie || '')}</td>
        <td>${escapeHtml(u.modelo || '')}</td>
        <td>${escapeHtml(u.color || '')}</td>
        <td>${escapeHtml(dash(u.preventa))}</td>
        <td>${escapeHtml(dash(u.fechaVta))}</td>
        <td class="num importe">${fmtMoney(importeMostrar)}</td>
        <td>${escapeHtml(u.fechaPago || '—')}</td>
      </tr>
    `;
  }).join('');

  const totalCol = filas.reduce((acc, u) => acc + (Number(u.impaga ? u.importe : u.total) || 0), 0);

  return `
    <div class="table-wrap">
      <div class="table-head">
        <h3>Unidades</h3>
        <span class="count">${filas.length} fila${filas.length === 1 ? '' : 's'} · ordenadas por vencimiento</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th style="width:32px"><input type="checkbox" class="row-check head-check" id="headCheck" onchange="toggleSelectAllVisible(this)" title="Tildar todas las visibles"></th>
              <th>Estado</th>
              <th>Vence</th>
              <th>Fecha Fc</th>
              <th>Serie</th>
              <th>Modelo</th>
              <th>Color</th>
              <th>Preventa</th>
              <th>Fecha venta</th>
              <th class="num">Importe</th>
              <th>Fecha pago</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
          <tfoot>
            <tr>
              <td colspan="9" style="text-align:right">Total visible</td>
              <td class="num">${fmtMoney(totalCol)}</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  `;
}

function filaKey(u) {
  // Identifica una fila aunque cambie de orden
  return String(u.idx || '') + ':' + String(u.serie || '') + ':' + String(u.preventa || '');
}

function getFilasVisibles() {
  if (!lastCompras) return [];
  const unidades = Array.isArray(lastCompras.unidades) ? lastCompras.unidades : [];
  let filas;
  if (filterStatus === 'impagas') filas = unidades.filter(u => u.impaga);
  else if (filterStatus === 'pagadas') filas = unidades.filter(u => !u.impaga && u.fechaPago);
  else filas = unidades.slice();
  if (colVence) {
    filas = filas.filter(u => {
      const d = parseFechaCorta(u.vence);
      const key = d ? fmtDateKey(d) : (u.vence ? '' : 'sin');
      return key === colVence;
    });
  }
  if (colSearch) {
    const q = colSearch.trim().toLowerCase();
    filas = filas.filter(u => {
      const blob = [u.serie, u.preventa, u.modelo, u.color, u.mes, u.fc, u.fechaVta, u.vence, u.localidad]
        .map(x => String(x || '').toLowerCase()).join(' ');
      return blob.indexOf(q) > -1;
    });
  }
  return filas;
}

function renderSelectionBar() {
  if (!lastCompras) return '';
  const unidades = lastCompras.unidades || [];
  const map = new Map(unidades.map(u => [filaKey(u), u]));
  const seleccionadas = Array.from(comprasSelected).map(k => map.get(k)).filter(Boolean);
  const total = seleccionadas.reduce((acc, u) => acc + (Number(u.importe) || 0), 0);
  const cnt = seleccionadas.length;
  const filasVisibles = getFilasVisibles();
  const vendidasImpagasVisibles = filasVisibles.filter(u => u.impaga && esVendida(u));
  const yaTodasVendidasTildadas = vendidasImpagasVisibles.length > 0
    && vendidasImpagasVisibles.every(u => comprasSelected.has(filaKey(u)));

  return `
    <div class="selection-bar">
      <div class="sel-info">
        <div class="sel-lbl">${cnt ? 'Deuda seleccionada' : 'Tildá filas para sumar deuda'}</div>
        ${cnt ? `<div class="sel-val">${fmtMoney(total)}</div>` : ''}
        ${cnt ? `<div class="sel-sub">${cnt} unidad${cnt === 1 ? '' : 'es'} tildada${cnt === 1 ? '' : 's'}</div>` : ''}
      </div>
      <div class="sel-actions">
        <button class="sel-btn" onclick="seleccionarVendidasVisibles()">
          ${yaTodasVendidasTildadas ? '✓ Vendidas tildadas' : '+ Seleccionar vendidas'}
          ${vendidasImpagasVisibles.length ? `<span class="cnt-tag">${vendidasImpagasVisibles.length}</span>` : ''}
        </button>
        ${cnt ? '<button class="sel-btn ghost" onclick="clearComprasSelection()">Limpiar</button>' : ''}
      </div>
    </div>
  `;
}

// =======================================================================
// PRÓXIMOS VENCIMIENTOS
// =======================================================================
function renderProxVtos() {
  const wrap = document.getElementById('proxVtosContent');
  if (!lastCompras) {
    wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando datos...</div></div>';
    if (!document.getElementById('btnRefresh').disabled) loadCompras().then(() => {
      if (document.querySelector('.tab.active')?.dataset.tab === 'proxvtos') renderProxVtos();
    });
    return;
  }
  const unidades = Array.isArray(lastCompras.unidades) ? lastCompras.unidades : [];
  // Sólo impagas (los vencimientos relevantes son los que aún se deben).
  let impagas = unidades.filter(u => u.impaga);
  // Filtro vendida/no vendida
  if (proxVtoFilter === 'novendidas') impagas = impagas.filter(u => !esVendida(u));
  else if (proxVtoFilter === 'vendidas') impagas = impagas.filter(u => esVendida(u));

  // Agrupar por fecha de vencimiento
  const grupos = new Map(); // key (yyyy-mm-dd o 'sin') → { date|null, key, items: [], total: 0 }
  impagas.forEach(u => {
    const d = parseFechaCorta(u.vence);
    const key = d ? fmtDateKey(d) : 'sin';
    if (!grupos.has(key)) grupos.set(key, { date: d, key, items: [], total: 0 });
    const g = grupos.get(key);
    g.items.push(u);
    g.total += Number(u.importe) || 0;
  });
  const arr = Array.from(grupos.values()).sort((a, b) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return a.date - b.date;
  });

  // Limpiar selecciones de grupos que ya no están visibles
  const visibles = new Set(arr.map(g => g.key));
  Array.from(proxVtoSelected).forEach(k => { if (!visibles.has(k)) proxVtoSelected.delete(k); });

  // Total a mostrar: si hay seleccion, sólo seleccionados; si no, todos los visibles
  const haySel = proxVtoSelected.size > 0;
  const totalArr = haySel ? arr.filter(g => proxVtoSelected.has(g.key)) : arr;
  const totalDeuda = totalArr.reduce((acc, g) => acc + g.total, 0);
  const totalUnidades = totalArr.reduce((acc, g) => acc + g.items.length, 0);
  const totalGrupos = totalArr.length;

  const filtroLbl = proxVtoFilter === 'vendidas' ? 'vendidas' : (proxVtoFilter === 'novendidas' ? 'no vendidas' : 'todas');

  if (!arr.length) {
    wrap.innerHTML = `
      ${renderProxVtosControls()}
      <div class="empty"><div class="ico">✅</div><div style="font-size:15px; color:var(--vw-grey-4); font-weight:600">Sin vencimientos pendientes (${filtroLbl})</div></div>
    `;
    return;
  }

  const totalBar = `
    <div class="vtos-totalbar">
      <div>
        <div class="lbl">${haySel ? 'Deuda seleccionada' : 'Deuda total visible'}</div>
        <div class="val">${fmtMoney(totalDeuda)}</div>
        <div class="sub">${totalUnidades} unidad${totalUnidades === 1 ? '' : 'es'} · ${totalGrupos} grupo${totalGrupos === 1 ? '' : 's'} de fecha · filtro: ${filtroLbl}</div>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap">
        ${haySel ? '<button onclick="clearProxVtoSelection()">Limpiar selección</button>' : '<button onclick="selectAllProxVtos()">Seleccionar todos</button>'}
      </div>
    </div>
  `;

  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const groupsHtml = arr.map(g => renderProxVtoGroup(g, hoy)).join('');

  wrap.innerHTML = renderProxVtosControls() + totalBar + groupsHtml;
}

function renderProxVtosControls() {
  return `
    <div class="vtos-controls">
      <div class="group">
        <span style="font-size:13px; color:var(--vw-grey-4); font-weight:600">Filtrar:</span>
        <button class="filter-btn ${proxVtoFilter === 'all' ? 'active' : ''}" onclick="setProxVtoFilter('all')">Todas</button>
        <button class="filter-btn ${proxVtoFilter === 'novendidas' ? 'active' : ''}" onclick="setProxVtoFilter('novendidas')">Solo no vendidas</button>
        <button class="filter-btn ${proxVtoFilter === 'vendidas' ? 'active' : ''}" onclick="setProxVtoFilter('vendidas')">Solo vendidas</button>
      </div>
    </div>
  `;
}

function renderProxVtoGroup(g, hoy) {
  const sel = proxVtoSelected.has(g.key);
  const open = proxVtoOpen.has(g.key);
  let rel = '', relClass = '';
  let label = g.date ? fmtFechaLarga(g.date) : 'Sin fecha de vencimiento';
  if (g.date) {
    const diff = Math.round((g.date - hoy) / 86400000);
    if (diff < 0) { rel = `Vencida hace ${Math.abs(diff)} d`; relClass = 'urgente'; }
    else if (diff === 0) { rel = 'Hoy'; relClass = 'urgente'; }
    else if (diff === 1) { rel = 'Mañana'; relClass = 'pronto'; }
    else if (diff <= 7) { rel = `En ${diff} d`; relClass = 'pronto'; }
    else { rel = `En ${diff} d`; }
  }
  const filas = g.items.slice().sort((a, b) => {
    const sa = String(a.serie || '').localeCompare(String(b.serie || ''));
    return sa;
  }).map(u => `
    <tr>
      <td class="serie">${escapeHtml(u.serie || '')}</td>
      <td>${escapeHtml(u.modelo || '')}</td>
      <td>${escapeHtml(u.color || '')}</td>
      <td>${escapeHtml(dash(u.preventa))}</td>
      <td>${escapeHtml(dash(u.fechaVta))}</td>
      <td>${esVendida(u) ? '<span class="vendida-tag">Vendida</span>' : '<span style="font-size:11px;color:var(--vw-grey-3)">Sin venta</span>'}</td>
      <td class="num importe">${fmtMoney(u.importe)}</td>
    </tr>
  `).join('');
  return `
    <div class="vto-group ${sel ? 'selected' : ''} ${relClass === 'urgente' ? 'vencida' : ''} ${open ? 'open' : ''}" data-key="${escapeHtml(g.key)}">
      <div class="vto-group-head" onclick="toggleProxVtoOpen(event, '${escapeHtml(g.key)}')">
        <input type="checkbox" ${sel ? 'checked' : ''} onclick="event.stopPropagation()" onchange="toggleProxVtoSelect('${escapeHtml(g.key)}')">
        <div class="date-label">
          <span>${escapeHtml(label)}</span>
          ${rel ? `<span class="date-rel ${relClass}">${escapeHtml(rel)}</span>` : ''}
        </div>
        <div class="stats">
          <span class="cnt">${g.items.length} u.</span>
          <span class="amt">${fmtMoney(g.total)}</span>
          <span class="toggle">${open ? '▲' : '▼'}</span>
        </div>
      </div>
      <div class="vto-group-body">
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Serie</th>
                <th>Modelo</th>
                <th>Color</th>
                <th>Preventa</th>
                <th>Fecha venta</th>
                <th>Estado venta</th>
                <th class="num">Importe</th>
              </tr>
            </thead>
            <tbody>${filas}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function setProxVtoFilter(f) {
  proxVtoFilter = f;
  proxVtoSelected.clear();
  renderProxVtos();
}
function toggleProxVtoSelect(key) {
  if (proxVtoSelected.has(key)) proxVtoSelected.delete(key);
  else proxVtoSelected.add(key);
  renderProxVtos();
}
function toggleProxVtoOpen(ev, key) {
  if (ev && ev.target && (ev.target.tagName === 'INPUT')) return;
  if (proxVtoOpen.has(key)) proxVtoOpen.delete(key);
  else proxVtoOpen.add(key);
  renderProxVtos();
}
function clearProxVtoSelection() {
  proxVtoSelected.clear();
  renderProxVtos();
}
function selectAllProxVtos() {
  const unidades = (lastCompras && lastCompras.unidades) || [];
  let impagas = unidades.filter(u => u.impaga);
  if (proxVtoFilter === 'novendidas') impagas = impagas.filter(u => !esVendida(u));
  else if (proxVtoFilter === 'vendidas') impagas = impagas.filter(u => esVendida(u));
  impagas.forEach(u => {
    const d = parseFechaCorta(u.vence);
    proxVtoSelected.add(d ? fmtDateKey(d) : 'sin');
  });
  renderProxVtos();
}

// =======================================================================
// BANCOS · render — agrupa filas por sección detectada en el Apps Script.
// Renderiza cada sección como su propia card; preserva headers, subtotales
// y filas regulares con estilos diferenciados. NO inventa un total general.
// =======================================================================
function renderBancos() {
  const wrap = document.getElementById('bancosContent');
  if (!wrap) return;
  const data = lastInforme;
  if (!data) {
    wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando INFORME...</div></div>';
    return;
  }
  const rows = Array.isArray(data.rows) ? data.rows : [];
  const dispVW = Number(data.disponibleVW) || 0;

  if (!rows.length && !dispVW) {
    wrap.innerHTML = '<div class="empty"><div class="ico">🏦</div><div style="font-size:15px; color:var(--vw-grey-4); font-weight:600">Sin datos en la hoja INFORME</div></div>';
    return;
  }

  // Agrupar por sección: cada header inicia una sección; los `sep` se ignoran salvo para cortar visualmente.
  const secciones = [];
  let actual = null;
  rows.forEach(r => {
    if (r.tipo === 'header') {
      actual = {
        titulo: r.concepto || '',
        valorHeaderD: Number(r.d) || 0,
        valorHeaderE: Number(r.e) || 0,
        items: [],
      };
      secciones.push(actual);
    } else if (r.tipo === 'sep') {
      if (actual && actual.items.length) actual.items.push({ tipo: 'sep' });
    } else {
      if (!actual) {
        actual = { titulo: '', valorHeaderD: 0, valorHeaderE: 0, items: [] };
        secciones.push(actual);
      }
      actual.items.push(r);
    }
  });

  const dispCard = dispVW ? `
    <div class="cards" style="grid-template-columns: 1fr;">
      <div class="card good" style="background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);">
        <div class="label">Disponible para aplicar en VW</div>
        <div class="value">${fmtMoney(dispVW)}</div>
        <div class="sub">INFORME · "Saldos disponibles VW"</div>
      </div>
    </div>
  ` : '';

  const seccionesHtml = secciones.map(sec => renderSeccionBanco(sec)).join('');
  const fondosHtml = renderSeccionFondos(data.fondos || []);

  wrap.innerHTML = dispCard + seccionesHtml + fondosHtml;
  // Acumulado mensual: guarda hoy en Supabase y refresca el total
  sincronizarAcumuladoFondos();
}

// Limpia cualquier resto de fórmula rota de Sheets (#VALUE!, #¡DIV/0!, #N/A, etc.) → "—"
function limpioStr(s) {
  const v = String(s == null ? '' : s).trim();
  if (!v) return '—';
  if (/^#/.test(v)) return '—';
  return v;
}

// Calcula sumas de Total fondo y Ganancia día ignorando errores/NaN.
function calcSumasFondos(fondos) {
  // La fila "0" es el subtotal roto de la planilla → la salteo del cálculo
  const reales = fondos.filter(f => String(f.fecha || '').trim() !== '0');
  let sumaTotal = 0, sumaGanancia = 0;
  reales.forEach(f => {
    const t = Number(f.total);
    const g = Number(f.ganancia);
    if (!isNaN(t) && isFinite(t)) sumaTotal += t;
    if (!isNaN(g) && isFinite(g)) sumaGanancia += g;
  });
  return { sumaTotal, sumaGanancia, filasReales: reales };
}

function renderSeccionFondos(fondos) {
  if (!fondos.length) return '';
  const { sumaTotal, sumaGanancia, filasReales } = calcSumasFondos(fondos);

  const filas = filasReales.map(f => {
    const totalShow    = (f.total && !isNaN(f.total))       ? fmtMoney(f.total)    : limpioStr(f.totalStr);
    const gananciaShow = (f.ganancia && !isNaN(f.ganancia)) ? fmtMoney(f.ganancia) : limpioStr(f.gananciaStr);
    return `<tr>
      <td>${escapeHtml(f.fecha || '—')}</td>
      <td class="num importe">${totalShow}</td>
      <td class="num importe">${gananciaShow}</td>
      <td class="num">${escapeHtml(limpioStr(f.diario))}</td>
      <td class="num">${escapeHtml(limpioStr(f.anual))}</td>
      <td class="num">${escapeHtml(limpioStr(f.mensual))}</td>
    </tr>`;
  }).join('');

  const filaTotal = `<tr class="total-row">
    <td>Total día</td>
    <td class="num importe">${fmtMoney(sumaTotal)}</td>

// SUPABASE · acumulado mensual de la ganancia de fondos
// =======================================================================
async function sbFetch(path, opts) {
  opts = opts || {};
  const url = SUPABASE_URL + '/rest/v1/' + path;
  const headers = Object.assign({
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Accept': 'application/json',
  }, opts.headers || {});
  const res = await fetch(url, Object.assign({}, opts, { headers }));
  if (!res.ok) {
    const text = await res.text().catch(() => '');
    throw new Error('Supabase ' + res.status + ': ' + text);
  }
  // Algunas operaciones devuelven 204 sin contenido
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function fechaISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + dd;
}

// Parsea fechas tipo "11-may" o "11-may-26" (con o sin año) → Date
function parseFondoFecha(s) {
  if (!s) return null;
  const m = String(s).toLowerCase().match(/^(\d{1,2})-([a-zñ]{3})(?:-(\d{2,4}))?/);
  if (!m) return null;
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const mi = meses.indexOf(m[2]);
  if (mi < 0) return null;
  let y = m[3] ? Number(m[3]) : new Date().getFullYear();
  if (y < 100) y += 2000;
  return new Date(y, mi, Number(m[1]));
}

async function upsertGanancia(fechaSave, gananciaDia, totalFondos) {
  const body = JSON.stringify([{
    fecha: fechaSave,
    ganancia_dia: Number(gananciaDia) || 0,
    total_fondos: Number(totalFondos) || 0,
  }]);
  await sbFetch('saldos_fondos_diario?on_conflict=fecha', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: body,
  });
}

// Inserta un registro por cada día previo del mismo mes, mismo valor que el "real".
// Idempotente — ignore-duplicates no pisa los que ya existen.
async function backfillEstimadoMes(fechaReal, gananciaDia, totalFondos) {
  const dia = fechaReal.getDate();
  if (dia <= 1) return { inserted: 0, hasta: 0 };
  const filas = [];
  for (let d = 1; d < dia; d++) {
    filas.push({
      fecha: fechaISO(new Date(fechaReal.getFullYear(), fechaReal.getMonth(), d)),
      ganancia_dia: Number(gananciaDia) || 0,
      total_fondos: Number(totalFondos) || 0,
    });
  }
  await sbFetch('saldos_fondos_diario?on_conflict=fecha', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=ignore-duplicates,return=minimal' },
    body: JSON.stringify(filas),
  });
  return { inserted: filas.length, hasta: dia - 1 };
}

async function fetchAcumuladoMes() {
  const hoy = new Date();
  const inicio = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
  const inicioStr = inicio.toISOString().split('T')[0];
  const data = await sbFetch('saldos_fondos_diario?fecha=gte.' + inicioStr + '&select=fecha,ganancia_dia&order=fecha.asc');
  const acumulado = (data || []).reduce((acc, r) => acc + (Number(r.ganancia_dia) || 0), 0);
  return { acumulado, dias: (data || []).length, registros: data || [] };
}

// Trae todos los registros, agrupa por año-mes, devuelve los meses anteriores al actual.
async function fetchHistorialMeses() {
  const data = await sbFetch('saldos_fondos_diario?select=fecha,ganancia_dia&order=fecha.asc') || [];
  const hoy = new Date();
  const yMesActual = hoy.getFullYear() * 100 + (hoy.getMonth() + 1);
  const porMes = new Map(); // key "YYYY-MM" → { total, dias, ymKey }
  data.forEach(r => {
    if (!r.fecha) return;
    const ym = String(r.fecha).slice(0, 7);              // "2026-05"
    const y = Number(ym.split('-')[0]);
    const m = Number(ym.split('-')[1]);
    const ymKey = y * 100 + m;
    if (ymKey >= yMesActual) return;                     // sólo meses anteriores
    if (!porMes.has(ym)) porMes.set(ym, { total: 0, dias: 0, y, m });
    const g = porMes.get(ym);
    g.total += Number(r.ganancia_dia) || 0;
    g.dias += 1;
  });
  // Ordenar de más reciente a más antiguo
  return Array.from(porMes.values()).sort((a, b) => (b.y * 100 + b.m) - (a.y * 100 + a.m));
}

function _mesNombre(y, m) {
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return meses[m - 1] + ' ' + y;
}

async function sincronizarAcumuladoFondos() {
  const fondos = (lastInforme && lastInforme.fondos) || [];
  if (!fondos.length) return;
  const { sumaGanancia, sumaTotal, filasReales } = calcSumasFondos(fondos);

  // Determinar la fecha del resultado (lo que dice la planilla, ej "11-may")
  // Si no se pudiera parsear, caemos a "ayer" (la planilla siempre va con 1 día de lag).
  let fechaReal = filasReales.length ? parseFondoFecha(filasReales[0].fecha) : null;
  if (!fechaReal) {
    fechaReal = new Date();
    fechaReal.setDate(fechaReal.getDate() - 1);
  }
  const fechaSave = fechaISO(fechaReal);

  try {
    // 1. Guardar el resultado real con la fecha de la planilla
    await upsertGanancia(fechaSave, sumaGanancia, sumaTotal);

    // 2. Backfill estimado: días 1 a (fechaReal-1) con la misma ganancia (sólo inserta nuevos)
    const backfill = await backfillEstimadoMes(fechaReal, sumaGanancia, sumaTotal);

    // 3. Traer y mostrar acumulado del mes
    const { acumulado, dias } = await fetchAcumuladoMes();
    const valEl = document.getElementById('fondosAcumuladoVal');
    const subEl = document.getElementById('fondosAcumuladoSub');
    if (valEl) valEl.textContent = fmtMoney(acumulado);
    if (subEl) {
      const mesNombre = fechaReal.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });
      const diaReal = fechaReal.getDate();
      let txt = dias + ' día' + (dias === 1 ? '' : 's') + ' en ' + mesNombre;
      if (backfill.hasta > 0) {
        txt += ' · Días 1 al ' + backfill.hasta + ' estimados según el resultado del ' + diaReal;
      }
      subEl.textContent = txt;
    }

    // 4. Historial de meses anteriores
    const meses = await fetchHistorialMeses();
    const hist = document.getElementById('fondosHistorial');
    if (hist) {
      if (!meses.length) {
        hist.innerHTML = '';
      } else {
        const lis = meses.map(m => `
          <li>
            <span class="hist-mes">${escapeHtml(_mesNombre(m.y, m.m))}</span>
            <span class="hist-info">${m.dias} día${m.dias === 1 ? '' : 's'}</span>
            <span class="hist-val">${fmtMoney(m.total)}</span>
          </li>
        `).join('');
        hist.innerHTML = `
          <div class="hist-head">Meses anteriores</div>
          <ul class="hist-list">${lis}</ul>
        `;
      }
    }
  } catch (e) {
    console.error('Error acumulado fondos:', e);
    const valEl = document.getElementById('fondosAcumuladoVal');
    const subEl = document.getElementById('fondosAcumuladoSub');
    if (valEl) valEl.textContent = '—';
    if (subEl) subEl.textContent = 'Error: ' + (e.message || e);
  }
}

function renderSeccionBanco(sec) {
  const tituloUpper = (sec.titulo || '').toUpperCase();
  // DISP FUTURAS: dos columnas de valor — "Libre Disp" y "Técnico" definidas en el header
  const esDispFuturas = /\bDISP\s+FUTURAS\b/.test(tituloUpper);
  // SALDOS DISPONIBLES VW: la columna E lleva la sub-descripción (Deposito VWF, Certif AA, etc.)
  const esSaldosVW = /SALDOS\s+DISPONIBLES\s+VW/.test(tituloUpper);
  // DEUDAS EN FABRICA: los montos están en E
  const esDeudasFabrica = /DEUDAS\s+EN\s+FABRICA/.test(tituloUpper);

  const headerAmount = (Number(sec.valorHeaderD) || Number(sec.valorHeaderE) || 0);
  const headerStr = headerAmount ? `<span class="sec-amount">${fmtMoney(headerAmount)}</span>` : '';
  const titulo = sec.titulo
    ? `<div class="sec-head"><h3>${escapeHtml(sec.titulo)}</h3>${headerStr}</div>`
    : '';

  if (!sec.items.length) {
    if (!titulo) return '';
    return `<div class="bank-section">${titulo}</div>`;
  }

  // Sub-encabezados de columnas para DISP FUTURAS
  let thead = '';
  if (esDispFuturas) {
    thead = `<thead><tr>
      <th>Concepto</th>
      <th class="num">Libre Disp</th>
      <th class="num">Técnico</th>
    </tr></thead>`;
  }

  const filasHtml = sec.items.map(r => {
    if (r.tipo === 'sep') {
      const cols = esDispFuturas ? 3 : 2;
      return `<tr class="sep-row"><td colspan="${cols}"></td></tr>`;
    }
    const concepto = String(r.concepto || '').trim();
    const dNum = Number(r.d) || 0;
    const eNum = Number(r.e) || 0;
    const dStr = String(r.dStr || '').trim();
    const eStr = String(r.eStr || '').trim();
    const esFechaE = !!r.esFechaE;

    if (esDispFuturas) {
      const negD = dNum < 0;
      const negE = eNum < 0;
      const dShow = dNum !== 0 ? fmtMoney(dNum) : (dStr || '—');
      const eShow = eNum !== 0 ? fmtMoney(eNum) : (eStr || '—');
      const rowClass = r.tipo === 'total' ? 'total-row' : '';
      return `<tr class="${rowClass}">
        <td>${escapeHtml(concepto)}</td>
        <td class="num importe ${negD ? 'neg' : ''}">${dShow}</td>
        <td class="num importe ${negE ? 'neg' : ''}">${eShow}</td>
      </tr>`;
    }

    // Resto de secciones: una sola columna de valor.
    // Reglas:
    //   - Si D tiene valor numérico → ese es el valor
    //   - Si D es 0 / vacío y E tiene valor numérico → uso E
    //   - Si E es una fecha → la muestro como chip al lado del concepto
    //   - Si E es texto descriptivo (ej "Deposito VWF" en SALDOS VW) → lo muestro como subtítulo
    let valorPrincipal = '';
    let valorNegativo = false;
    let conceptoExtra = '';

    if (dNum !== 0) {
      valorPrincipal = fmtMoney(dNum);
      valorNegativo = dNum < 0;
    } else if (eNum !== 0) {
      valorPrincipal = fmtMoney(eNum);
      valorNegativo = eNum < 0;
    } else if (dStr) {
      valorPrincipal = escapeHtml(dStr);
      valorNegativo = /^-/.test(dStr);
    } else {
      valorPrincipal = '—';
    }

    if (esFechaE && eStr) {
      conceptoExtra = `<span class="venc-chip">venc. ${escapeHtml(eStr)}</span>`;
    } else if (eStr && eNum === 0 && !esFechaE && (esSaldosVW || /vw\s+credit/i.test(concepto))) {
      // En SALDOS VW, col E es la sub-descripción (Deposito VWF, Certif AA, etc.)
      conceptoExtra = `<span class="sub-desc">${escapeHtml(eStr)}</span>`;
    }

    const rowClass = r.tipo === 'total' ? 'total-row' : '';
    const negClass = valorNegativo ? 'neg' : '';
    return `<tr class="${rowClass} ${valorNegativo ? 'neg' : ''}">
      <td>${escapeHtml(concepto)}${conceptoExtra}</td>
      <td class="num importe ${negClass}">${valorPrincipal}</td>
    </tr>`;
  }).join('');

  return `
    <div class="bank-section">
      ${titulo}
      <div class="table-scroll">
        <table>${thead}<tbody>${filasHtml}</tbody></table>
      </div>
    </div>
  `;
}

// FLUJO FINANCIERO · se trae del backend de GESTIÓN (tipo=flujo): cobros
// pendientes de ventas (ingresos) vs pagos a VW impagos (egresos), por semana.
// =======================================================================
let flujoData = null, flujoAbiertas = new Set();
function _saldosFechaDisp(v) { return _cvwFechaDisp(v); }
function _flujoToISO(v) {
  const d = parseFechaCorta(v); if (!d) return null;
  const p = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
}
function _flujoSemanaKey(iso) {
  const m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return null;
  const d = new Date(+m[1], +m[2] - 1, +m[3]);
  if (isNaN(d.getTime())) return null;
  const dow = (d.getDay() + 6) % 7;   // 0 = lunes
  d.setDate(d.getDate() - dow);
  const p = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
}
function _flujoSemLabel(iso) {
  const m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? ('Semana del ' + m[3] + '/' + m[2]) : 'Sin fecha';
}
function _flujoCard(titulo, monto, color) {
  return '<div style="flex:1;min-width:150px;background:#fff;border:1px solid var(--vw-grey-2);border-radius:12px;padding:12px 14px">'
    + '<div style="font-size:12px;color:var(--vw-grey-4)">' + titulo + '</div>'
    + '<div style="font-size:20px;font-weight:800;color:' + color + ';margin-top:4px">' + fmtMoney(monto) + '</div></div>';
}
function toggleFlujoSem(key) { if (flujoAbiertas.has(key)) flujoAbiertas.delete(key); else flujoAbiertas.add(key); renderFlujoSaldos(); }
async function loadFlujoSaldos(forzar) {
  const cont = document.getElementById('flujoContent');
  const btn = document.getElementById('btnRefreshFlujo');
  if (btn) { btn.disabled = true; btn.textContent = 'Cargando...'; }
  if (cont && (forzar || !flujoData)) cont.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando flujo…</div></div>';
  try {
    const url = GESTION_URL + '?token=' + encodeURIComponent(GESTION_TOKEN) + '&tipo=flujo' + (forzar ? '&fresh=1' : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data && data.error) throw new Error(data.error);
    flujoData = data;
    const upd = document.getElementById('updatedAtFlujo');
    if (upd) upd.textContent = 'Actualizado: ' + new Date().toLocaleString('es-AR');
    renderFlujoSaldos();
  } catch (e) {
    console.error(e);
    if (cont) cont.innerHTML = '<div class="errbox"><div class="ico">⚠️</div><div class="ttl">No se pudo cargar el flujo</div><div class="det">' + escapeHtml(e.message || String(e)) + '</div></div>';
  } finally { if (btn) { btn.disabled = false; btn.textContent = 'Actualizar'; } }
}
function renderFlujoSaldos() {
  const cont = document.getElementById('flujoContent');
  if (!cont) return;
  if (!flujoData) { cont.innerHTML = '<div class="empty">Sin datos.</div>'; return; }
  const ing = flujoData.ingresos || [], egr = flujoData.egresos || [];
  const totIng = ing.reduce((a, x) => a + (x.monto || 0), 0);
  const totEgr = egr.reduce((a, x) => a + (x.monto || 0), 0);
  const sem = {};
  const add = (key, tipo, monto, item) => { const k = key || '__sin__'; if (!sem[k]) sem[k] = { ing: 0, egr: 0, items: [] }; sem[k][tipo] += monto; sem[k].items.push(item); };
  for (const x of ing) add(_flujoSemanaKey(x.fecha), 'ing', x.monto, { tipo: 'ing', monto: x.monto, desc: 'PV ' + x.pv + ' · ' + x.concepto + (x.cliente ? ' · ' + x.cliente : '') });
  for (const x of egr) add(_flujoSemanaKey(_flujoToISO(x.vence)), 'egr', x.monto, { tipo: 'egr', monto: x.monto, desc: x.serie + ' · ' + (x.modelo || '') + (x.vence ? ' · vto ' + _saldosFechaDisp(x.vence) : '') });
  const keys = Object.keys(sem).sort((a, b) => (a === '__sin__' ? '9999' : a).localeCompare(b === '__sin__' ? '9999' : b));
  let h = '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px">'
    + _flujoCard('💚 A cobrar (clientes)', totIng, '#0a7a30')
    + _flujoCard('🔴 A pagar a VW', totEgr, '#cc3300')
    + _flujoCard('⚖️ Neto', totIng - totEgr, (totIng - totEgr) >= 0 ? '#0a7a30' : '#cc3300')
    + '</div>';
  h += '<div class="table-wrap"><div class="table-scroll"><table style="width:100%;border-collapse:collapse;font-size:13px;min-width:680px">';
  h += '<thead><tr><th style="text-align:left">Semana</th><th style="text-align:right">💚 Ingresos</th><th style="text-align:right">🔴 Egresos</th><th style="text-align:right">Neto</th><th style="text-align:right">Acumulado</th><th></th></tr></thead><tbody>';
  let acum = 0;
  for (const k of keys) {
    const s = sem[k]; const neto = s.ing - s.egr; acum += neto;
    const abierta = flujoAbiertas.has(k);
    h += '<tr onclick="toggleFlujoSem(\'' + k + '\')" style="cursor:pointer' + (abierta ? ';background:#eef5ff' : '') + '">'
      + '<td>' + (k === '__sin__' ? 'Sin fecha' : _flujoSemLabel(k)) + '</td>'
      + '<td style="text-align:right;color:#0a7a30">' + (s.ing ? fmtMoney(s.ing) : '—') + '</td>'
      + '<td style="text-align:right;color:#cc3300">' + (s.egr ? fmtMoney(s.egr) : '—') + '</td>'
      + '<td style="text-align:right;font-weight:700;color:' + (neto >= 0 ? '#0a7a30' : '#cc3300') + '">' + fmtMoney(neto) + '</td>'
      + '<td style="text-align:right;font-weight:700;color:' + (acum >= 0 ? '#0a7a30' : '#cc3300') + '">' + fmtMoney(acum) + '</td>'
      + '<td style="text-align:center;color:var(--vw-grey-3)">' + (abierta ? '▲' : '▼') + '</td></tr>';
    if (abierta) {
      const its = s.items.slice().sort((a, b) => (a.tipo === b.tipo ? 0 : (a.tipo === 'ing' ? -1 : 1)));
      let det = '<table style="width:100%;border-collapse:collapse;font-size:12px">';
      for (const it of its) det += '<tr style="border-top:1px solid #e3ecf5"><td style="padding:2px 6px">' + (it.tipo === 'ing' ? '💚' : '🔴') + ' ' + escapeHtml(it.desc) + '</td><td style="text-align:right;padding:2px 6px;color:' + (it.tipo === 'ing' ? '#0a7a30' : '#cc3300') + '">' + (it.tipo === 'ing' ? '+' : '-') + fmtMoney(it.monto) + '</td></tr>';
      det += '</table>';
      h += '<tr><td colspan="6" style="background:#f7faff;border-left:3px solid var(--vw-blue);padding:8px 14px">' + det + '</td></tr>';
    }
  }
  h += '</tbody></table></div></div>';
  h += '<div style="font-size:11px;color:var(--vw-grey-4);margin-top:10px">💚 Ingresos = cobros pendientes de las ventas vigentes (por vencimiento). 🔴 Egresos = facturas impagas a VW (por vencimiento). "Acumulado" = neto sumado semana a semana. Tocá una semana para ver el detalle.</div>';
  cont.innerHTML = h;
}

// pago). Mismo número que la planilla "DEUDAS EN FABRICA · Volkswagen (unidades)".
async function bancosFetchDeudaVW() {
  try {
    const rows = await sbFetch('compras_vw?select=importe_saldo&fecha_pago_vw=is.null') || [];
    return rows.reduce((acc, r) => acc + (Number(r.importe_saldo) || 0), 0);
  } catch (e) { return null; }
}

function parseMonto(v) {
  if (v === '' || v == null) return null;
  if (typeof v === 'number') return v;
  let s = String(v).trim().replace(/[^\d.,-]/g, '');
  if (!s) return null;
  const hasC = s.indexOf(',') > -1, hasD = s.indexOf('.') > -1;
  if (hasC && hasD) s = s.replace(/\./g, '').replace(',', '.');
  else if (hasC) s = s.replace(',', '.');
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

// Totales que dependen sólo del estado en memoria (para refrescar sin re-render).
function bancosTotales() {
  const items = tesoreriaItems || [];
  const sumSec = (code, mon) => items
    .filter(r => r.seccion === code && (mon ? r.moneda === mon : r.moneda !== 'USD'))
    .reduce((a, r) => a + (Number(r.monto) || 0), 0);
  const dispARS = sumSec('DISPONIBILIDADES');
  const dispUSD = sumSec('DISPONIBILIDADES', 'USD');
  const dispVW  = sumSec('DISP_VW');
  const deudaVW = Number(bancosDeudaVW) || 0;
  return { dispARS, dispUSD, dispVW, deudaVW, netoVW: dispVW - deudaVW };
}

  set('bk-dispARS', fmtMoney(t.dispARS));

async function tesSave(id, campo, el) {
  if (!bancosPuedeEditar()) return;
  let valor = el.value;
  if (campo === 'monto') valor = parseMonto(valor);
  else valor = (valor === '' ? null : valor);
  const s = getSharedCookie() || {};
  const body = { updated_at: new Date().toISOString(), updated_by: s.usuario || '' };
  body[campo] = valor;
  try {
    await sbFetch('tesoreria_items?id=eq.' + id, { method: 'PATCH', headers: { 'Prefer': 'return=minimal' }, body: JSON.stringify(body) });
    const it = (tesoreriaItems || []).find(r => r.id === id);
    if (it) it[campo] = valor;
    bancosRefreshTotals();   // refresca totales sin perder el foco
  } catch (e) { alert('No se pudo guardar: ' + (e.message || e)); }
}

async function tesAdd(seccion) {
  if (!bancosPuedeEditar()) return;
  const s = getSharedCookie() || {};
  const maxOrden = (tesoreriaItems || []).filter(r => r.seccion === seccion).reduce((m, r) => Math.max(m, Number(r.orden) || 0), 0);
  try {
    const res = await sbFetch('tesoreria_items', { method: 'POST', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify([{ seccion, orden: maxOrden + 1, moneda: 'ARS', updated_by: s.usuario || '' }]) });
    if (res && res[0]) tesoreriaItems.push(res[0]);
    renderBancosUI();
  } catch (e) { alert('No se pudo agregar: ' + (e.message || e)); }
}

async function tesDel(id) {
  if (!bancosPuedeEditar()) return;
  if (!confirm('¿Estás seguro de borrar esta fila?\n\nEsta acción no se puede deshacer.')) return;
  try {
    await sbFetch('tesoreria_items?id=eq.' + id, { method: 'DELETE', headers: { 'Prefer': 'return=minimal' } });
    tesoreriaItems = (tesoreriaItems || []).filter(r => r.id !== id);
    renderBancosUI();
  } catch (e) { alert('No se pudo borrar: ' + (e.message || e)); }
}

// Novedades derivadas de las guardias: faltas (con motivo) y llegadas tarde.
// Sólo lo de HOY — los días anteriores quedan en la sub-pestaña Historial.
function renderNovedadesGuardias() {
  if (!guardiasOverrides || !guardiasOverrides.size) return '';
  const hoy = hoyISO();
  const items = [];
  guardiasOverrides.forEach((info, key) => {
    const parts = key.split('|');
    const fecha = parts[0], sucursal = parts[1], vendedor = parts[2];
    if (fecha !== hoy) return;
    if (info.estado === 'falta') {
      items.push({ fecha, tipo: 'falta', vendedor, sucursal,
        txt: `${cap(vendedor)} (${sucursal}) — Falta${info.motivo ? ': ' + info.motivo : ''}` });
    }
    if (info.estado === 'reemplazo' && info.cubiertoPor) {
      items.push({ fecha, tipo: 'reemplazo', vendedor, sucursal,
        txt: `${cap(info.cubiertoPor)} cubre a ${cap(vendedor)} (${sucursal})` });
    }
    if (info.estado === 'compensa') {
      items.push({ fecha, tipo: 'compensa', vendedor, sucursal,
        txt: `${cap(vendedor)} (${sucursal}) — Compensa (usa crédito de reemplazo)` });
    }
    if (info.llegadaTarde) {
      items.push({ fecha, tipo: 'tarde', vendedor, sucursal,
        txt: `${cap(vendedor)} (${sucursal}) — Llegó tarde ${info.llegadaTarde}` });
    }
  });
  if (!items.length) return '';
  items.sort((a, b) => b.fecha.localeCompare(a.fecha) || a.vendedor.localeCompare(b.vendedor));
  const NOV_ICONS = { falta: '⚠️', tarde: '⏰', reemplazo: '🔁', compensa: '🔄' };
  const rows = items.map(it => `
    <div class="personal-item ${it.fecha === hoy ? 'nov-hoy' : ''}">
      <span class="p-txt"><span class="nov-ico ${it.tipo}">${NOV_ICONS[it.tipo] || '📌'}</span> ${escapeHtml(it.txt)}</span>
      <span class="p-date">${dowName(it.fecha)} ${fechaDM(it.fecha)}${it.fecha === hoy ? ' · HOY' : ''}</span>
    </div>`).join('');
  return `<div class="personal-header-main">📋 Novedades de guardias de hoy</div>${rows}`;
}

function buildGuardiasBase() {
  if (guardiasBaseMap) return guardiasBaseMap;
  guardiasBaseMap = {};
  GUARDIAS_BASE_RAW.forEach(raw => {
    const parts = raw.split('|');
    const fecha = parts[0];
    const dia = {};
    GUARDIAS_SUCURSALES.forEach((suc, si) => {
      const codes = parts[1 + si] || '';
      const m = {};
      suc.vendedores.forEach((v, vi) => {
        m[v] = GUARDIAS_CODE2EST[codes[vi]] || 'franco';
      });
      dia[suc.nombre] = m;
    });
    guardiasBaseMap[fecha] = dia;
  });
  return guardiasBaseMap;
}

// Info completa de una celda: { estado, motivo, llegadaTarde, cubiertoPor }
function guardiaInfo(fecha, sucursal, vendedor) {
  const k = fecha + '|' + sucursal + '|' + vendedor;
  if (guardiasOverrides.has(k)) {
    const o = guardiasOverrides.get(k);
    return { estado: o.estado, motivo: o.motivo || '', llegadaTarde: o.llegadaTarde || '', cubiertoPor: o.cubiertoPor || '' };
  }
  const base = buildGuardiasBase()[fecha];
  const est = (base && base[sucursal] && base[sucursal][vendedor]) || 'franco';
  return { estado: est, motivo: '', llegadaTarde: '', cubiertoPor: '' };
}
function guardiaEstado(fecha, sucursal, vendedor) {
  return guardiaInfo(fecha, sucursal, vendedor).estado;
}

// Balance de créditos de reemplazo por vendedor (sale solo de los overrides):
//   +1 cubrir la guardia de otro (figura como cubierto_por de un Reemplazo)
//   +1 trabajar un día que en la base le tocaba franco (día extra propio)
//   −1 cada "Compensa" (franco compensatorio usando ese crédito)
function guardiasBalance() {
  const bal = {};
  const add = (v, n) => { v = String(v || '').toUpperCase(); if (v) bal[v] = (bal[v] || 0) + n; };
  guardiasOverrides.forEach((info, key) => {
    const parts = key.split('|');
    const fecha = parts[0], sucursal = parts[1], vendedor = parts[2];
    if (info.estado === 'reemplazo' && info.cubiertoPor) add(info.cubiertoPor, +1);
    if (info.estado === 'compensa') add(vendedor, -1);
    if (info.estado === 'trabaja') {
      const base = buildGuardiasBase()[fecha];
      const baseEst = base && base[sucursal] && base[sucursal][vendedor];
      if (baseEst === 'franco') add(vendedor, +1);
    }
  });
  return bal;
}

function renderGuardiasBalance() {
  const bal = guardiasBalance();
  const entries = Object.entries(bal).filter(([, n]) => n !== 0)
    .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
  if (!entries.length) return '';
  const chips = entries.map(([v, n]) =>
    `<span class="gb-chip ${n > 0 ? 'pos' : 'neg'}">${escapeHtml(cap(v))} ${n > 0 ? '+' + n : n}</span>`).join('');
  return `<div class="guardias-balance"><span class="gb-lbl">Créditos de reemplazo:</span>${chips}</div>`;
}

    wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando guardias...</div></div>';
    try {
      await loadGuardiasOverrides();
      guardiasSinTabla = false;
    } catch (e) {
      console.error('Guardias:', e);
      const msg = String(e && e.message || e);
      // Tabla aún no creada → modo solo lectura sobre la base (no romper la vista).
      if (/PGRST205|Could not find the table|42P01|does not exist/i.test(msg)) {
        guardiasSinTabla = true;
        guardiasOverrides = new Map();
        drawGuardias();
        return;
      }
      wrap.innerHTML = `<div class="errbox"><div class="ico">⚠️</div>
        <div class="ttl">No se pudieron cargar las guardias</div>
        <div class="det">${escapeHtml(msg)}</div></div>`;
      return;
    }
  }
  drawGuardias();
}

function guardiasFechas() {
  const set = new Set(Object.keys(buildGuardiasBase()));
  guardiasOverrides.forEach((v, k) => set.add(k.split('|')[0]));
  return Array.from(set).sort();
}

function drawGuardias() {
  const wrap = document.getElementById('guardiasContent');
  if (!wrap) return;
  const editable = puedeEditarGuardias() && !guardiasSinTabla;
  const fechas = guardiasFechas();
  const meses = Array.from(new Set(fechas.map(f => f.slice(0, 7)))).sort();
  // Arrancar enfocado en el mes actual (si está en los datos)
  if (!guardiasMesInit) {
    guardiasMesInit = true;
    const hm = hoyISO().slice(0, 7);
    if (meses.includes(hm)) guardiasMesFiltro = hm;
  }
  if (guardiasMesFiltro && !meses.includes(guardiasMesFiltro)) guardiasMesFiltro = '';
  const fechasVis = guardiasMesFiltro ? fechas.filter(f => f.slice(0, 7) === guardiasMesFiltro) : fechas;
  const mesesARender = guardiasMesFiltro ? [guardiasMesFiltro] : meses;

  const mesOpts = ['<option value="">Todos los meses</option>']
    .concat(meses.map(m => `<option value="${m}" ${m === guardiasMesFiltro ? 'selected' : ''}>${escapeHtml(mesLabel(m))}</option>`))
    .join('');

  const legend = Object.entries(GUARDIAS_ESTADOS).map(([est, v]) =>
    `<span class="lg"><span class="dot ${est}"></span>${escapeHtml(v.label)}</span>`).join('');

  const bloques = mesesARender.map(ym => renderGuardiaCalendario(ym, editable)).join('');
  const ausencias = renderGuardiaAusencias(fechasVis);

  const bannerSinTabla = guardiasSinTabla ? `
    <div class="errbox" style="text-align:left;padding:14px 16px;margin-bottom:14px">
      <div class="ttl" style="margin-bottom:4px">⚠️ Modo sólo lectura</div>
      <div style="font-size:13px;color:var(--vw-grey-4)">Estás viendo el cronograma base. Para poder <strong>editar y guardar</strong> falta crear la tabla en Supabase: corré una vez el archivo <code>supabase_guardias.sql</code> en Supabase → SQL Editor.</div>
    </div>` : '';

  wrap.innerHTML = `
    ${bannerSinTabla}
    <div class="guardias-bar">
      <div>
        <div class="g-title">Agenda de guardias · Ventas</div>
        <div class="g-sub">El día de hoy va resaltado en celeste. ${editable ? 'Tocá un nombre para cambiar su estado (se guarda solo).' : 'Vista de sólo lectura.'}</div>
      </div>
      <select onchange="setGuardiasMes(this.value)">${mesOpts}</select>
    </div>
    <div class="g-status" id="guardiasStatus"></div>
    <div class="guardias-legend">${legend}</div>
    ${renderGuardiasBalance()}
    ${ausencias}
    ${bloques}
  `;
}

// Un mes como calendario (semana D L M M J V S)
function renderGuardiaCalendario(ym, editable) {
  const p = ym.split('-').map(Number);
  const y = p[0], m = p[1];
  const diasEnMes = new Date(y, m, 0).getDate();
  const primerDow = new Date(y, m - 1, 1).getDay(); // 0=Dom
  const dows = ['D', 'L', 'M', 'M', 'J', 'V', 'S'];
  const dowNombres = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
  const header = dows.map((d, i) =>
    `<div class="gcal-dow ${(i === 0 || i === 6) ? 'we' : ''}" title="${dowNombres[i]}">${d}</div>`).join('');
  let cells = '';
  for (let i = 0; i < primerDow; i++) cells += '<div class="gcal-cell empty"></div>';
  for (let d = 1; d <= diasEnMes; d++) {
    cells += renderGuardiaDiaCell(ym + '-' + String(d).padStart(2, '0'), d, editable);
  }
  const resto = (7 - ((primerDow + diasEnMes) % 7)) % 7;
  for (let i = 0; i < resto; i++) cells += '<div class="gcal-cell empty"></div>';
  return `
    <div class="gcal-month">
      <div class="gcal-month-head">${escapeHtml(mesLabel(ym))}</div>
      <div class="gcal-scroll"><div class="gcal-grid">${header}${cells}</div></div>
    </div>
  `;
}

// Una celda-día: por cada salón, los nombres coloreados (verde=va, gris=franco, etc.)
function renderGuardiaDiaCell(fecha, dia, editable) {
  const dw = dowNum(fecha);
  const weekend = (dw === 0 || dw === 6);
  const esHoy = (fecha === hoyISO());
  const sucBlocks = GUARDIAS_SUCURSALES.map(suc => {
    const chips = suc.vendedores.map(v => {
      const info = guardiaInfo(fecha, suc.nombre, v);
      const meta = GUARDIAS_ESTADOS[info.estado] || GUARDIAS_ESTADOS.franco;
      let tip = cap(v) + ' · ' + meta.label;
      let nombre = escapeHtml(cap(v));
      if (info.estado === 'falta' && info.motivo) tip += ': ' + info.motivo;
      if (info.estado === 'reemplazo' && info.cubiertoPor) {
        tip = cap(info.cubiertoPor) + ' cubre a ' + cap(v);
        nombre = escapeHtml(cap(v)) + '→<strong>' + escapeHtml(cap(info.cubiertoPor)) + '</strong>';
      }
      if (info.estado === 'compensa') tip = cap(v) + ' · Compensa (usa crédito de reemplazo)';
      let extra = '';
      if (info.llegadaTarde) { tip += ' · llegó tarde ' + info.llegadaTarde; extra = ` <span class="gname-tarde">⏰${escapeHtml(info.llegadaTarde)}</span>`; }
      const cls = 'gname ' + info.estado + (editable ? ' editable' : '');
      const oc = editable ? `onclick="abrirGuardiaPop(event,'${fecha}','${escapeHtml(suc.nombre)}','${v}')"` : '';
      return `<span class="${cls}" ${oc} title="${escapeHtml(tip)}">${nombre}${extra}</span>`;
    }).join('');
    return `<div class="gcal-suc">
      <div class="gcal-suc-lbl">${escapeHtml(suc.nombre)}</div>
      <div class="gcal-names">${chips}</div>
    </div>`;
  }).join('');
  return `<div class="gcal-cell ${weekend ? 'we' : ''} ${esHoy ? 'hoy' : ''}">
    <div class="gcal-daynum"><span>${dia}</span>${esHoy ? '<span class="gcal-hoy-badge">HOY</span>' : ''}</div>
    ${sucBlocks}
  </div>`;
}

function renderGuardiaAusencias(fechas) {
  const raw = [];
  fechas.forEach(f => GUARDIAS_SUCURSALES.forEach(suc => suc.vendedores.forEach(v => {
    const info = guardiaInfo(f, suc.nombre, v);
    const est = info.estado;
    if (est === 'vacaciones' || est === 'falta' || est === 'curso' || est === 'reemplazo' || est === 'compensa') {
      raw.push({ fecha: f, vendedor: v, sucursal: suc.nombre, estado: est, cubierto: info.cubiertoPor || '', motivo: info.motivo || '' });
    }
  })));
  if (!raw.length) return '';
  raw.sort((a, b) =>
    (a.vendedor + a.sucursal + a.estado).localeCompare(b.vendedor + b.sucursal + b.estado) ||
    a.fecha.localeCompare(b.fecha));
  const groups = [];
  raw.forEach(it => {
    const last = groups[groups.length - 1];
    if (last && last.vendedor === it.vendedor && last.sucursal === it.sucursal &&
        last.estado === it.estado && diasConsecutivos(last.hasta, it.fecha)) {
      last.hasta = it.fecha;
      if (it.cubierto) last.cubierto = it.cubierto;
      if (it.motivo && last.motivos.indexOf(it.motivo) < 0) last.motivos.push(it.motivo);
    } else {
      groups.push({ vendedor: it.vendedor, sucursal: it.sucursal, estado: it.estado, desde: it.fecha, hasta: it.fecha, cubierto: it.cubierto || '', motivos: it.motivo ? [it.motivo] : [] });
    }
  });
  // Sólo lo vigente HOY: ni faltas de días anteriores ni vacaciones que todavía
  // no arrancaron (el resto se ve en el calendario / Historial).
  const hoy = hoyISO();
  const vigentes = groups.filter(g => g.desde <= hoy && g.hasta >= hoy);
  if (!vigentes.length) return '';
  const li = vigentes.map(g => {
    const rango = g.desde === g.hasta
      ? `${dowName(g.desde)} ${fechaDM(g.desde)}`
      : `${dowName(g.desde)} ${fechaDM(g.desde)} → ${dowName(g.hasta)} ${fechaDM(g.hasta)}`;
    const cubre = (g.estado === 'reemplazo' && g.cubierto)
      ? ` <span style="font-size:12px;color:var(--vw-grey-4)">· lo cubre <strong>${escapeHtml(cap(g.cubierto))}</strong></span>` : '';
    const causa = (g.estado === 'falta' && g.motivos.length)
      ? ` <span style="font-size:12px;color:var(--vw-grey-4)">· ${escapeHtml(g.motivos.join(', '))}</span>` : '';
    return `<div class="ga-item">
      <span><strong>${escapeHtml(cap(g.vendedor))}</strong> · ${escapeHtml(g.sucursal)}
        <span class="ga-tag ${g.estado}">${escapeHtml(GUARDIAS_ESTADOS[g.estado].label)}</span>${cubre}${causa}</span>
      <span class="ga-when">${rango}</span>
    </div>`;
  }).join('');
  return `<div class="guardias-ausentes">
    <div class="ga-head">Ausencias de hoy (${vigentes.length})</div>
    ${li}
  </div>`;
}

function setGuardiasMes(m) { guardiasMesFiltro = m || ''; drawGuardias(); }

function abrirGuardiaPop(ev, fecha, sucursal, vendedor) {
  ev.stopPropagation();
  cerrarGuardiaPop();
  const info = guardiaInfo(fecha, sucursal, vendedor);
  const overlay = document.createElement('div');
  overlay.className = 'g-pop-overlay';
  overlay.onclick = cerrarGuardiaPop;
  const pop = document.createElement('div');
  pop.className = 'g-pop g-pop-wide';
  pop.onclick = e => e.stopPropagation();
  document.body.appendChild(overlay);
  document.body.appendChild(pop);
  guardiasEditCell = {
    fecha, sucursal, vendedor,
    estado: info.estado, motivo: info.motivo, llegadaTarde: info.llegadaTarde,
    cubiertoPor: info.cubiertoPor,
    overlay, pop, anchorRect: ev.currentTarget.getBoundingClientRect(),
  };
  repintarPop();
}

function cerrarGuardiaPop() {
  if (guardiasEditCell) {
    if (guardiasEditCell.overlay) guardiasEditCell.overlay.remove();
    if (guardiasEditCell.pop) guardiasEditCell.pop.remove();
    guardiasEditCell = null;
  }
}

function repintarPop() {
  const e = guardiasEditCell;
  if (!e || !e.pop) return;
  e.pop.innerHTML = renderGuardiaPopBody();
  posicionarPop();
}

function posicionarPop() {
  const e = guardiasEditCell;
  if (!e || !e.pop) return;
  const r = e.anchorRect;
  e.pop.style.top = (r.bottom + window.scrollY + 4) + 'px';
  e.pop.style.left = (r.left + window.scrollX) + 'px';
  const pr = e.pop.getBoundingClientRect();
  if (pr.right > window.innerWidth - 8) {
    e.pop.style.left = (Math.max(8, window.innerWidth - pr.width - 8) + window.scrollX) + 'px';
  }
}

function renderGuardiaPopBody() {
  const e = guardiasEditCell;
  const estados = Object.entries(GUARDIAS_ESTADOS).map(([est, v]) =>
    `<button type="button" class="g-est ${est === e.estado ? 'sel' : ''}" onclick="setPopEstado('${est}')">
      <span class="dot ${est}"></span>${escapeHtml(v.label)}</button>`).join('');
  let extra = '';
  if (e.estado === 'falta') {
    const chips = GUARDIAS_MOTIVOS.map(m =>
      `<button type="button" class="g-motivo-chip ${e.motivo === m ? 'sel' : ''}" onclick="setPopMotivo('${escapeHtml(m)}')">${escapeHtml(m)}</button>`).join('');
    extra = `
      <div class="g-pop-sec">Motivo de la falta</div>
      <div class="g-motivo-chips">${chips}</div>
      <input class="g-pop-input" id="gMotivoInput" placeholder="o escribí otro motivo..." value="${escapeHtml(e.motivo)}" oninput="setPopMotivoInput(this.value)">`;
  } else if (e.estado === 'trabaja') {
    extra = `
      <div class="g-pop-sec">Llegada tarde (opcional)</div>
      <div class="g-tarde-row">
        <input type="time" class="g-pop-input g-time" id="gTardeInput" value="${escapeHtml(e.llegadaTarde)}" onchange="setPopTarde(this.value)">
        ${e.llegadaTarde ? '<button type="button" class="g-tarde-clear" onclick="setPopTarde(\'\')">Quitar</button>' : ''}
      </div>
      <div class="g-pop-hint">Si llegó tarde igual queda como "Trabaja".</div>`;
  } else if (e.estado === 'reemplazo') {
    const candidatos = GUARDIAS_VENDEDORES_ALL.filter(v => v !== e.vendedor);
    const chips = candidatos.map(v =>
      `<button type="button" class="g-motivo-chip ${e.cubiertoPor === v ? 'sel' : ''}" onclick="setPopCubierto('${v}')">${escapeHtml(cap(v))}</button>`).join('');
    extra = `
      <div class="g-pop-sec">¿Quién lo cubre?</div>
      <div class="g-motivo-chips reempl">${chips}</div>
      <div class="g-pop-hint">Puede ser de cualquier salón. El que cubre suma +1 crédito de reemplazo.</div>`;
  } else if (e.estado === 'compensa') {
    // Balance SIN contar esta celda (si ya estaba guardada como compensa, la neutralizo)
    let b = guardiasBalance()[String(e.vendedor).toUpperCase()] || 0;
    const k = e.fecha + '|' + e.sucursal + '|' + e.vendedor;
    const prev = guardiasOverrides.get(k);
    if (prev && prev.estado === 'compensa') b += 1;
    extra = b > 0
      ? `<div class="g-pop-hint">✓ ${escapeHtml(cap(e.vendedor))} tiene ${b} crédito${b === 1 ? '' : 's'} a favor. Este día usa 1 y no cuenta como falta.</div>`
      : `<div class="g-pop-hint" style="color:var(--orange);font-weight:600">⚠️ ${escapeHtml(cap(e.vendedor))} no tiene crédito a favor (balance ${b}). Se puede guardar igual, pero queda en negativo.</div>`;
  }
  return `
    <div class="g-pop-head">${escapeHtml(cap(e.vendedor))} · ${escapeHtml(e.sucursal)}
      <div class="g-pop-sub">${dowName(e.fecha)} ${fechaDM(e.fecha)}</div>
    </div>
    <div class="g-pop-sec">Estado del día</div>
    <div class="g-estados">${estados}</div>
    ${extra}
    <div class="g-pop-err" id="gPopErr"></div>
    <div class="g-pop-actions">
      <button type="button" class="g-btn ghost" onclick="cerrarGuardiaPop()">Cancelar</button>
      <button type="button" class="g-btn primary" onclick="guardarGuardia()">Guardar</button>
    </div>`;
}

function setPopEstado(est) {
  guardiasEditCell.estado = est;
  if (est !== 'falta') guardiasEditCell.motivo = '';
  if (est !== 'trabaja') guardiasEditCell.llegadaTarde = '';
  if (est !== 'reemplazo') guardiasEditCell.cubiertoPor = '';
  repintarPop();
}
function setPopMotivo(m) { guardiasEditCell.motivo = m; repintarPop(); }
function setPopMotivoInput(v) { guardiasEditCell.motivo = v; }  // sin repintar: conserva el foco
function setPopTarde(v) { guardiasEditCell.llegadaTarde = v; repintarPop(); }
function setPopCubierto(v) { guardiasEditCell.cubiertoPor = v; repintarPop(); }

async function guardarGuardia() {
  const e = guardiasEditCell;
  if (!e) return;
  const motivo = e.estado === 'falta' ? String(e.motivo || '').trim() : '';
  const llegada = e.estado === 'trabaja' ? String(e.llegadaTarde || '').trim() : '';
  const cubierto = e.estado === 'reemplazo' ? String(e.cubiertoPor || '').trim() : '';
  if (e.estado === 'falta' && !motivo) {
    const err = document.getElementById('gPopErr');
    if (err) err.textContent = 'Poné el motivo de la falta.';
    const inp = document.getElementById('gMotivoInput');
    if (inp) inp.focus();
    return;
  }
  if (e.estado === 'reemplazo' && !cubierto) {
    const err = document.getElementById('gPopErr');
    if (err) err.textContent = 'Elegí quién cubre la guardia.';
    return;
  }
  const fecha = e.fecha, sucursal = e.sucursal, vendedor = e.vendedor, estado = e.estado;
  const k = fecha + '|' + sucursal + '|' + vendedor;
  const prev = guardiasOverrides.has(k) ? guardiasOverrides.get(k) : undefined;
  guardiasOverrides.set(k, { estado, motivo, llegadaTarde: llegada, cubiertoPor: cubierto });
  cerrarGuardiaPop();
  drawGuardias();
  const status = document.getElementById('guardiasStatus');
  if (status) status.textContent = 'Guardando…';
  try {
    await saveGuardia(fecha, sucursal, vendedor, estado, motivo, llegada, cubierto);
    const st = document.getElementById('guardiasStatus');
    if (st) st.textContent = 'Guardado ✓ ' + new Date().toLocaleTimeString('es-AR');
  } catch (err2) {
    console.error('Guardar guardia:', err2);
    if (prev === undefined) guardiasOverrides.delete(k); else guardiasOverrides.set(k, prev);
    drawGuardias();
    const st = document.getElementById('guardiasStatus');
    if (st) st.textContent = '⚠️ No se pudo guardar: ' + (err2.message || err2);
  }
}

// Helpers de fecha para el cronograma
function cap(s) { s = String(s || '').toLowerCase(); return s.charAt(0).toUpperCase() + s.slice(1); }
function _gd(f) { const p = String(f).split('-').map(Number); return new Date(p[0], p[1] - 1, p[2]); }
function dowNum(f) { return _gd(f).getDay(); }
function dowName(f) { return ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'][_gd(f).getDay()]; }
function fechaDM(f) { const p = String(f).split('-'); return p[2] + '/' + p[1]; }
function mesLabel(ym) {
  const p = ym.split('-').map(Number);
  const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
  return meses[p[1] - 1] + ' ' + p[0];
}
function diasConsecutivos(a, b) { return (_gd(b) - _gd(a)) === 86400000; }
function hoyISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

// =======================================================================
// NOVEDADES · acumulación del personal general (Sheet) en Supabase
// =======================================================================
function clasificarTipoNovedad(seccion) {
  const s = String(seccion || '').toLowerCase();
  if (/tarde/.test(s)) return 'llegada_tarde';
  if (/ausent|falt/.test(s)) return 'falta';
  return 'otro';
}

// Parsea la lista `personal` (del Apps Script) en eventos {fecha, tipo, persona, detalle}
function parseNovedadesPersonal(personal) {
  const out = [];
  if (!Array.isArray(personal)) return out;
  let seccion = '';
  personal.forEach(r => {
    if (r.tipo === 'header')  { seccion = ''; return; }
    if (r.tipo === 'subhead') { seccion = String(r.texto || '').trim(); return; }
    if (r.tipo !== 'item') return;
    const texto = String(r.texto || '').trim();
    if (!texto) return;
    const d = parseFechaCorta(r.fecha);
    out.push({
      fecha: d ? fmtDateKey(d) : hoyISO(),
      tipo: clasificarTipoNovedad(seccion),
      persona: texto,
      detalle: String(r.fecha || '').trim(),
    });
  });
  return out;
}

// Acumula en Supabase lo que trae el Sheet (dedup) — de acá sale el Historial
// general día a día. No requiere tocar nada en Sheets; corre solo al abrir la app.
async function snapshotNovedadesGenerales(personal) {
  const parsed = parseNovedadesPersonal(personal);
  if (!parsed.length) return;
  const eventos = parsed.map(e => ({
    fecha: e.fecha, area: 'general', tipo: e.tipo, persona: e.persona,
    detalle: e.detalle || null, origen: 'sheet',
    dedup_key: [e.fecha, 'general', e.tipo, e.persona.toLowerCase()].join('|'),
  }));
  try {
    await sbFetch('saldos_novedades?on_conflict=dedup_key', {
      method: 'POST',
      headers: { 'Prefer': 'resolution=ignore-duplicates,return=minimal' },
      body: JSON.stringify(eventos),
    });
  } catch (e) { console.error('snapshot novedades:', e); }
}

// =======================================================================
// HISTORIAL · faltas y llegadas tarde acumuladas, mes a mes y día a día
// (ventas = guardias en Supabase · general = novedades del Sheet acumuladas
// día a día en saldos_novedades)
// =======================================================================
let historialGeneral = null;   // filas de saldos_novedades

async function renderHistorial() {
  const wrap = document.getElementById('historialContent');
  if (!wrap) return;
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando historial...</div></div>';
  // Ventas: las guardias cargadas (lo que la app sumó de los vendedores)
  if (!guardiasLoaded && !guardiasSinTabla) { try { await loadGuardiasOverrides(); } catch (e) {} }
  // General: acumulado día a día de las novedades del Sheet
  try {
    historialGeneral = await sbFetch('saldos_novedades?select=fecha,area,tipo,persona,detalle&order=fecha.desc');
  } catch (e) { console.error('historial general:', e); historialGeneral = []; }
  drawHistorial();
}

function historialEventos() {
  const evs = [];
  const hoy = hoyISO();
  // VENTAS: lo que la app sumó de los vendedores (guardias)
  if (guardiasOverrides) {
    guardiasOverrides.forEach((info, key) => {
      const parts = key.split('|');
      const fecha = parts[0], sucursal = parts[1], vendedor = parts[2];
      if (fecha > hoy) return;   // lo futuro no es historial
      if (info.estado === 'falta') {
        evs.push({ fecha, area: 'ventas', tipo: 'falta',
          txt: `${cap(vendedor)} (${sucursal}) — Falta${info.motivo ? ': ' + info.motivo : ''}` });
      }
      if (info.llegadaTarde) {
        evs.push({ fecha, area: 'ventas', tipo: 'llegada_tarde',
          txt: `${cap(vendedor)} (${sucursal}) — Llegó tarde ${info.llegadaTarde}` });
      }
      if (info.estado === 'reemplazo' && info.cubiertoPor) {
        evs.push({ fecha, area: 'ventas', tipo: 'reemplazo',
          txt: `${cap(info.cubiertoPor)} cubrió a ${cap(vendedor)} (${sucursal})` });
      }
      if (info.estado === 'compensa') {
        evs.push({ fecha, area: 'ventas', tipo: 'compensa',
          txt: `${cap(vendedor)} (${sucursal}) — Compensó con crédito de reemplazo` });
      }
    });
  }
  // GENERAL: lo acumulado del Sheet en Supabase
  (historialGeneral || []).forEach(r => {
    if (!r.fecha || r.fecha > hoy) return;
    const persona = String(r.persona || '').trim();
    if (!persona) return;
    const pre = r.tipo === 'falta' ? 'Falta: ' : (r.tipo === 'llegada_tarde' ? 'Tarde: ' : '');
    evs.push({ fecha: r.fecha, area: 'general', tipo: r.tipo, txt: pre + persona });
  });
  return evs;
}

function drawHistorial() {
  const wrap = document.getElementById('historialContent');
  if (!wrap) return;
  const evs = historialEventos();
  if (!evs.length) {
    wrap.innerHTML = `<div class="empty"><div class="ico">📚</div>
      <div style="font-size:15px; color:var(--vw-grey-4); font-weight:600">Sin historial todavía</div>
      <div style="font-size:12px;color:var(--vw-grey-3);margin-top:6px">Se va acumulando día a día con las guardias de ventas y las novedades del Sheet.</div></div>`;
    return;
  }

  // Agrupar por mes → día
  const porMes = new Map(); // 'YYYY-MM' → Map('YYYY-MM-DD' → [eventos])
  evs.forEach(e => {
    const ym = e.fecha.slice(0, 7);
    if (!porMes.has(ym)) porMes.set(ym, new Map());
    const dias = porMes.get(ym);
    if (!dias.has(e.fecha)) dias.set(e.fecha, []);
    dias.get(e.fecha).push(e);
  });

  const ordenTipo = { falta: 0, llegada_tarde: 1 };
  const ICONOS = { falta: '⚠️', llegada_tarde: '⏰', reemplazo: '🔁', compensa: '🔄' };
  const esRC = t => t === 'reemplazo' || t === 'compensa';

  const bloques = Array.from(porMes.keys()).sort().reverse().map(ym => {
    const dias = porMes.get(ym);
    let faltas = 0, tardes = 0;
    const rc = []; // reemplazos y compensaciones del mes (sección propia)
    dias.forEach(items => items.forEach(e => {
      if (e.tipo === 'falta') faltas++;
      else if (e.tipo === 'llegada_tarde') tardes++;
      else if (esRC(e.tipo)) rc.push(e);
    }));
    const cuerpo = Array.from(dias.keys()).sort().reverse().map(f => {
      const items = dias.get(f)
        .filter(e => !esRC(e.tipo))
        .sort((a, b) => (ordenTipo[a.tipo] ?? 9) - (ordenTipo[b.tipo] ?? 9) || a.area.localeCompare(b.area))
        .map(e => `
          <div class="personal-item">
            <span class="p-txt">${ICONOS[e.tipo] || '📌'} ${escapeHtml(e.txt)}
              <span class="rep-area ${e.area}">${e.area === 'ventas' ? 'Ventas' : 'General'}</span></span>
          </div>`).join('');
      if (!items) return '';
      return `<div class="personal-subhead">${dowName(f)} ${fechaDM(f)}</div>${items}`;
    }).join('');
    const rcHtml = !rc.length ? '' : `
      <div class="personal-subhead">🔁 Reemplazos y compensaciones</div>
      ${rc.sort((a, b) => b.fecha.localeCompare(a.fecha)).map(e => `
        <div class="personal-item">
          <span class="p-txt">${ICONOS[e.tipo]} ${escapeHtml(e.txt)}</span>
          <span class="p-date">${dowName(e.fecha)} ${fechaDM(e.fecha)}</span>
        </div>`).join('')}`;
    const partes = [`${faltas} falta${faltas === 1 ? '' : 's'}`, `${tardes} tarde${tardes === 1 ? '' : 's'}`];
    if (rc.length) partes.push(`${rc.length} reempl./comp.`);
    return `
      <div class="personal-wrap" style="margin-bottom:16px">
        <div class="personal-header-main">${escapeHtml(mesLabel(ym))} · ${partes.join(' · ')}</div>
        <div class="personal-body">${cuerpo}${rcHtml}</div>
      </div>`;
  }).join('');

  wrap.innerHTML = bloques;
}

function fmtDateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}
function fmtFechaLarga(d) {
  // "Jue 14/05/26"
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yy = String(d.getFullYear()).slice(-2);
  return `${dias[d.getDay()]} ${dd}/${mm}/${yy}`;
}

// =======================================================================
// HELPERS
// =======================================================================
function fmtMoney(n) {
  const num = Number(n) || 0;
  return '$ ' + Math.round(num).toLocaleString('es-AR');
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// "-" para valores vacíos / N/A / #N/A. Sino devuelve el valor tal cual.
function dash(s) {
  const v = String(s == null ? '' : s).trim();
  if (!v) return '-';
  const low = v.toLowerCase();
  if (low === 'n/a' || low === '#n/a' || low === '#n/a!' || low === '-') return '-';
  return v;
}

function esVendida(u) {
  // "Vendida" = tiene preventa o fecha de venta cargada (no vacío ni N/A)
  return dash(u.preventa) !== '-' || dash(u.fechaVta) !== '-';
}

// Acepta "yyyy-mm-dd" (ISO) o "26-mar" o "26/03/2026"
function parseFechaCorta(s) {
  if (!s) return null;
  s = String(s).trim();
  // ISO yyyy-mm-dd
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  // dd/mm/yyyy o dd/mm/yy
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m) {
    let y = +m[3]; if (y < 100) y += 2000;
    return new Date(y, +m[2]-1, +m[1]);
  }
  // "26-mar" (sin año) → asumimos año actual; si la fecha ya pasó hace mucho, asumimos año próximo
  m = s.toLowerCase().match(/^(\d{1,2})-([a-zñ]{3})/);
  if (m) {
    const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    const mi = meses.indexOf(m[2]);
    if (mi < 0) return null;
    const yNow = new Date().getFullYear();
    return new Date(yNow, mi, +m[1]);
  }
  return null;
}

  const session = getSharedCookie();
  if (!session || !session.usuario) {
    showGate('Necesitás iniciar sesión en el portal.');
    return;
  }
  // Sesión impersonada: se permite y se trata como el usuario impersonado
  // (la misma vista que vería esa persona). Quién puede impersonar a Mariano
  // queda restringido al owner desde el portal (IMPERSONAR_SOLO_OWNER).
  if (!USUARIOS_PERMITIDOS.includes(session.usuario)) {
    showGate('Tu usuario no tiene acceso a esta vista.');
    return;
  }
  enterApp(session);
})();
