<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compras y Saldos · TGA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --vw-blue: #001E50;
  --vw-blue-light: #00437A;
  --vw-white: #FFFFFF;
  --vw-grey-1: #F5F5F5;
  --vw-grey-2: #E5E5E5;
  --vw-grey-3: #999999;
  --vw-grey-4: #666666;
  --vw-black: #1A1A1A;
  --green: #10B981;
  --green-soft: #D1FAE5;
  --orange: #F59E0B;
  --orange-soft: #FEF3C7;
  --red: #EF4444;
  --red-soft: #FEE2E2;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,30,80,0.08);
  --shadow-lg: 0 8px 32px rgba(0,30,80,0.12);
  --font: 'DM Sans', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font); background: var(--vw-grey-1); color: var(--vw-black); min-height:100vh; -webkit-font-smoothing: antialiased; }
button { font-family: var(--font); cursor: pointer; border: none; }
a { color: inherit; text-decoration: none; }
.hidden { display: none !important; }

.app-header {
  background: var(--vw-blue);
  color: white;
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.app-header .brand { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.app-header .user-info { display: flex; align-items: center; gap: 12px; font-size: 13px; }
.app-header .user-name { opacity: 0.9; }
.app-header button {
  background: rgba(255,255,255,0.15);
  color: white; padding: 8px 14px;
  border-radius: 6px; font-size: 13px; font-weight: 500;
  transition: background 0.2s;
}
.app-header button:hover { background: rgba(255,255,255,0.25); }

.wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px 60px; }
h2 { font-size: 22px; font-weight: 700; color: var(--vw-blue); margin-bottom: 4px; }
.lead { font-size: 14px; color: var(--vw-grey-4); margin-bottom: 20px; }

.tabs {
  display: flex; gap: 4px; border-bottom: 2px solid var(--vw-grey-2);
  margin-bottom: 20px; overflow-x: auto;
}
.tab {
  padding: 12px 18px; background: transparent;
  font-size: 14px; font-weight: 600; color: var(--vw-grey-4);
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  white-space: nowrap; transition: all 0.15s;
}
.tab:hover { color: var(--vw-blue); }
.tab.active { color: var(--vw-blue); border-bottom-color: var(--vw-blue); }

.panel { display: none; }
.panel.active { display: block; }

.toolbar {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
}
.toolbar .updated { font-size: 12px; color: var(--vw-grey-3); }
.toolbar button.refresh {
  background: var(--vw-blue); color: white;
  padding: 8px 14px; border-radius: 6px;
  font-size: 13px; font-weight: 600;
}
.toolbar button.refresh:hover { background: var(--vw-blue-light); }
.toolbar button.refresh:disabled { opacity: 0.6; cursor: not-allowed; }

.filters {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
}
.filter-btn {
  padding: 7px 14px; background: white; color: var(--vw-grey-4);
  border: 1px solid var(--vw-grey-2); border-radius: 100px;
  font-size: 13px; font-weight: 500;
}
.filter-btn.active {
  background: var(--vw-blue); color: white; border-color: var(--vw-blue);
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px; margin-bottom: 22px;
}
.card {
  background: white; border-radius: var(--radius);
  padding: 18px 18px 16px; box-shadow: var(--shadow);
  position: relative;
}
.card .label {
  font-size: 11px; color: var(--vw-grey-3);
  text-transform: uppercase; letter-spacing: 0.6px;
  font-weight: 600; margin-bottom: 6px;
}
.card .value {
  font-size: 22px; font-weight: 700; color: var(--vw-blue);
  letter-spacing: -0.5px; line-height: 1.1;
}
.card .sub {
  font-size: 12px; color: var(--vw-grey-4); margin-top: 6px;
}
.card.warn .value { color: var(--orange); }
.card.bad .value { color: var(--red); }
.card.good .value { color: var(--green); }
.card.editable .edit {
  position: absolute; top: 12px; right: 12px;
  background: none; padding: 4px; border-radius: 4px;
  color: var(--vw-grey-3); font-size: 13px;
}
.card.editable .edit:hover { background: var(--vw-grey-1); color: var(--vw-blue); }

.table-wrap {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
}
.table-wrap .table-head {
  padding: 14px 18px; border-bottom: 1px solid var(--vw-grey-2);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
}
.table-wrap .table-head h3 {
  font-size: 14px; font-weight: 600; color: var(--vw-blue);
}
.table-wrap .table-head .count {
  font-size: 12px; color: var(--vw-grey-4);
}
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: var(--vw-grey-1); color: var(--vw-grey-4);
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 10px 12px; text-align: left;
  position: sticky; top: 0; z-index: 1;
  border-bottom: 1px solid var(--vw-grey-2);
  white-space: nowrap;
}
thead th.num, tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
tbody tr { border-bottom: 1px solid var(--vw-grey-2); }
tbody tr:hover { background: var(--vw-grey-1); }
tbody td { padding: 10px 12px; vertical-align: top; }
tbody td.serie { font-family: monospace; font-size: 12px; color: var(--vw-grey-4); }
tbody td.importe { font-weight: 600; color: var(--vw-blue); }
tbody td.vence { white-space: nowrap; }
tbody td .pill {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 100px;
  text-transform: uppercase; letter-spacing: 0.4px;
}
.pill.impaga { background: var(--orange-soft); color: #92400E; }
.pill.pagada { background: var(--green-soft); color: #065F46; }
.pill.vencida { background: var(--red-soft); color: #991B1B; }
tfoot td {
  padding: 12px; font-weight: 700; color: var(--vw-blue);
  border-top: 2px solid var(--vw-grey-2);
  background: var(--vw-grey-1);
}

.empty, .loading, .errbox {
  background: white; border-radius: var(--radius);
  padding: 48px 24px; text-align: center;
  box-shadow: var(--shadow);
  color: var(--vw-grey-3);
}
.empty .ico, .loading .ico, .errbox .ico {
  font-size: 36px; margin-bottom: 10px; opacity: 0.6;
}
.errbox { color: var(--red); }
.errbox .ttl { font-weight: 700; margin-bottom: 6px; }
.errbox .det { font-size: 12px; color: var(--vw-grey-4); margin-top: 8px; font-family: monospace; word-break: break-word; }
.loading .spinner {
  width: 28px; height: 28px; border-radius: 50%;
  border: 3px solid var(--vw-grey-2);
  border-top-color: var(--vw-blue);
  animation: spin 0.7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.gate {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--vw-blue) 0%, var(--vw-blue-light) 100%);
  padding: 20px;
}
.gate-box {
  background: white; border-radius: var(--radius);
  padding: 36px 28px; max-width: 380px; width: 100%;
  text-align: center; box-shadow: var(--shadow-lg);
}
.gate-box .logo { font-size: 24px; font-weight: 700; color: var(--vw-blue); margin-bottom: 6px; }
.gate-box .msg { font-size: 14px; color: var(--vw-grey-4); margin-bottom: 22px; }
.gate-box a.btn {
  display: inline-block; padding: 12px 22px;
  background: var(--vw-blue); color: white;
  border-radius: 8px; font-size: 14px; font-weight: 600;
}
.gate-box a.btn:hover { background: var(--vw-blue-light); }

.col-filters {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
  align-items: center;
}
.col-filters input[type="search"], .col-filters select {
  font-family: var(--font); font-size: 13px;
  padding: 7px 12px; border-radius: 8px;
  border: 1px solid var(--vw-grey-2); background: white;
  color: var(--vw-black); outline: none;
  min-width: 0;
}
.col-filters input[type="search"] { flex: 1 1 200px; max-width: 280px; }
.col-filters select { background: white; cursor: pointer; }
.col-filters input[type="search"]:focus, .col-filters select:focus {
  border-color: var(--vw-blue);
}
.col-filters .clear-btn {
  background: transparent; color: var(--vw-grey-4);
  font-size: 12px; padding: 6px 10px; border-radius: 6px;
}
.col-filters .clear-btn:hover { color: var(--red); background: var(--vw-grey-1); }

.selection-bar {
  background: linear-gradient(135deg, var(--vw-blue) 0%, var(--vw-blue-light) 100%);
  color: white; border-radius: var(--radius);
  padding: 14px 18px; margin-bottom: 14px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; flex-wrap: wrap;
  box-shadow: var(--shadow);
}
.selection-bar .sel-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.selection-bar .sel-lbl {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
  opacity: 0.8; font-weight: 600;
}
.selection-bar .sel-val { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.selection-bar .sel-sub { font-size: 12px; opacity: 0.85; }
.selection-bar .sel-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.sel-btn {
  background: rgba(255,255,255,0.18); color: white;
  padding: 9px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 7px;
  transition: background 0.15s;
}
.sel-btn:hover { background: rgba(255,255,255,0.28); }
.sel-btn.ghost { background: transparent; border: 1px solid rgba(255,255,255,0.4); }
.sel-btn.ghost:hover { background: rgba(255,255,255,0.12); }
.sel-btn .cnt-tag {
  background: white; color: var(--vw-blue);
  padding: 1px 7px; border-radius: 100px;
  font-size: 11px; font-weight: 700;
}

tbody tr.row-selected { background: rgba(0,30,80,0.06); }
tbody tr.row-selected:hover { background: rgba(0,30,80,0.10); }
.row-check { width: 16px; height: 16px; cursor: pointer; accent-color: var(--vw-blue); }

tbody tr.sep-row { background: transparent; border: none; }
tbody tr.sep-row td { padding: 4px 0; border: none; }
tbody tr.sep-row + tr td { border-top: none; }
tbody tr.total-row td {
  background: rgba(0,30,80,0.04); font-weight: 700; color: var(--vw-blue);
  border-top: 1px solid var(--vw-grey-2);
}
tbody tr.total-row.neg td { color: var(--red); background: rgba(239,68,68,0.06); }
td.num.neg, td.importe.neg { color: var(--red); }

.bank-section {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 14px;
  overflow: hidden;
}
.bank-section .sec-head {
  padding: 12px 18px; background: var(--vw-blue); color: white;
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px;
}
.bank-section .sec-head h3 {
  font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
  text-transform: uppercase; color: white;
}
.bank-section .sec-amount {
  font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums;
  color: white;
}
.bank-section table tbody tr:first-child td { border-top: none; }
.bank-section table tbody td:first-child { padding-left: 18px; }
.bank-section table tbody td:last-child  { padding-right: 18px; }
.bank-section thead th { padding-left: 18px; padding-right: 18px; }

.fondos-acumulado {
  padding: 18px 22px; background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
  border-top: 1px solid var(--vw-grey-2);
}
.fondos-acumulado .lbl {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
  font-weight: 700; color: #065F46; margin-bottom: 4px;
}
.fondos-acumulado .val {
  font-size: 26px; font-weight: 700; color: #065F46;
  letter-spacing: -0.5px; line-height: 1.1;
}
.fondos-acumulado .sub { font-size: 12px; color: var(--vw-grey-4); margin-top: 4px; }

.fondos-historial { padding: 0; }
.fondos-historial:empty { display: none; }
.fondos-historial .hist-head {
  padding: 14px 22px 8px; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.6px;
  font-weight: 700; color: var(--vw-grey-4);
  border-top: 1px solid var(--vw-grey-2);
  background: var(--vw-grey-1);
}
.fondos-historial .hist-list { list-style: none; padding: 0; margin: 0; }
.fondos-historial .hist-list li {
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: baseline; gap: 12px;
  padding: 10px 22px;
  border-top: 1px solid var(--vw-grey-2);
  font-size: 13px;
}
.fondos-historial .hist-mes { font-weight: 600; color: var(--vw-blue); text-transform: capitalize; }
.fondos-historial .hist-info { font-size: 12px; color: var(--vw-grey-4); }
.fondos-historial .hist-val { font-weight: 700; color: var(--vw-blue); font-variant-numeric: tabular-nums; }

.venc-chip {
  display: inline-block; margin-left: 8px;
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 100px;
  background: var(--vw-grey-1); color: var(--vw-grey-4);
  text-transform: uppercase; letter-spacing: 0.4px;
}
.sub-desc {
  display: inline-block; margin-left: 8px;
  font-size: 11px; color: var(--vw-grey-4); font-style: italic;
}
.personal-item .p-date {
  font-size: 12px; color: var(--vw-grey-3);
  margin-left: 12px; white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.personal-item { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }

.personal-wrap {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
}
.personal-body { padding: 0; }
.personal-header-main {
  padding: 16px 20px; background: var(--vw-blue); color: white;
  font-size: 15px; font-weight: 700; letter-spacing: 0.3px;
  text-transform: uppercase;
}
.personal-subhead {
  padding: 10px 20px 6px;
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--vw-grey-4);
  background: var(--vw-grey-1);
  border-top: 1px solid var(--vw-grey-2);
}
.personal-sep { height: 6px; }
.personal-item {
  padding: 10px 20px; font-size: 13px;
  border-bottom: 1px solid var(--vw-grey-2);
  color: var(--vw-black);
}
.personal-item:last-child { border-bottom: none; }

.vtos-controls {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
  align-items: center; justify-content: space-between;
}
.vtos-controls .group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.vtos-totalbar {
  background: var(--vw-blue); color: white;
  border-radius: var(--radius);
  padding: 16px 18px; margin-bottom: 18px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; flex-wrap: wrap;
  box-shadow: var(--shadow);
}
.vtos-totalbar .lbl {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
  opacity: 0.75; font-weight: 600;
}
.vtos-totalbar .val {
  font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-top: 2px;
}
.vtos-totalbar .sub { font-size: 12px; opacity: 0.8; margin-top: 4px; }
.vtos-totalbar button {
  background: rgba(255,255,255,0.15); color: white;
  padding: 8px 14px; border-radius: 6px;
  font-size: 13px; font-weight: 600;
}
.vtos-totalbar button:hover { background: rgba(255,255,255,0.28); }

.vto-group {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 10px; overflow: hidden;
  border-left: 4px solid var(--vw-grey-2);
  transition: border-color 0.15s;
}
.vto-group.selected { border-left-color: var(--vw-blue); }
.vto-group.vencida { border-left-color: var(--red); }
.vto-group-head {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer;
}
.vto-group-head:hover { background: var(--vw-grey-1); }
.vto-group-head input[type="checkbox"] {
  width: 18px; height: 18px; cursor: pointer; accent-color: var(--vw-blue);
}
.vto-group-head .date-label {
  font-size: 15px; font-weight: 700; color: var(--vw-blue);
  letter-spacing: -0.2px;
  display: flex; align-items: center; gap: 8px;
}
.vto-group-head .date-rel {
  font-size: 11px; padding: 2px 8px; border-radius: 100px;
  background: var(--vw-grey-1); color: var(--vw-grey-4);
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
}
.vto-group-head .date-rel.urgente { background: var(--red-soft); color: #991B1B; }
.vto-group-head .date-rel.pronto { background: var(--orange-soft); color: #92400E; }
.vto-group-head .stats {
  margin-left: auto; display: flex; gap: 18px; align-items: center;
  font-size: 13px;
}
.vto-group-head .stats .cnt { color: var(--vw-grey-4); }
.vto-group-head .stats .amt { font-weight: 700; color: var(--vw-blue); font-variant-numeric: tabular-nums; }
.vto-group-head .toggle { color: var(--vw-grey-3); font-size: 12px; }
.vto-group-body { display: none; border-top: 1px solid var(--vw-grey-2); }
.vto-group.open .vto-group-body { display: block; }
.vto-group-body table { width: 100%; }
.vto-group-body .vendida-tag {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 100px;
  background: var(--green-soft); color: #065F46;
  text-transform: uppercase; letter-spacing: 0.4px;
}

@media (max-width: 600px) {
  .wrap { padding: 16px 12px 40px; }
  .card .value { font-size: 18px; }
  thead th, tbody td { padding: 8px 10px; font-size: 12px; }
  .vto-group-head .stats { gap: 10px; font-size: 12px; }
}

/* ===== Sub-pestañas (dentro de Personal) ===== */
.subtabs {
  display: flex; gap: 4px; margin-bottom: 18px;
  background: var(--vw-grey-2); padding: 4px; border-radius: 10px;
  width: fit-content; max-width: 100%; overflow-x: auto;
}
.subtab {
  padding: 8px 16px; background: transparent; border-radius: 7px;
  font-size: 13px; font-weight: 600; color: var(--vw-grey-4);
  white-space: nowrap; transition: all 0.15s;
}
.subtab.active { background: white; color: var(--vw-blue); box-shadow: var(--shadow); }
.subpanel { display: none; }
.subpanel.active { display: block; }

/* ===== Cronograma de guardias ===== */
.guardias-bar {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; flex-wrap: wrap; margin-bottom: 14px;
}
.guardias-bar .g-title { font-size: 15px; font-weight: 700; color: var(--vw-blue); }
.guardias-bar .g-sub { font-size: 12px; color: var(--vw-grey-4); margin-top: 2px; }
.guardias-bar select {
  font-family: var(--font); font-size: 13px; padding: 7px 12px;
  border-radius: 8px; border: 1px solid var(--vw-grey-2); background: white;
  color: var(--vw-black); cursor: pointer; outline: none;
}
.guardias-bar .g-status { font-size: 12px; color: var(--vw-grey-3); min-height: 16px; }

.guardias-legend {
  display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px;
  font-size: 12px; color: var(--vw-grey-4);
}
.guardias-legend .lg { display: inline-flex; align-items: center; gap: 6px; }
.guardias-legend .dot { width: 12px; height: 12px; border-radius: 3px; }

.gsuc-block {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden; margin-bottom: 16px;
}
.gsuc-head {
  padding: 12px 18px; background: var(--vw-blue); color: white;
  font-size: 13px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
}
.gtable-scroll { overflow-x: auto; }
table.gtable { width: 100%; border-collapse: collapse; font-size: 13px; }
table.gtable th, table.gtable td {
  padding: 8px 10px; text-align: center; border-bottom: 1px solid var(--vw-grey-2);
  white-space: nowrap;
}
table.gtable thead th {
  background: var(--vw-grey-1); color: var(--vw-grey-4);
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
  position: sticky; top: 0; z-index: 1;
}
table.gtable td.g-day {

function getSharedCookie() {
  const m = document.cookie.match(new RegExp('(?:^|;\\s*)' + SHARED_COOKIE + '=([^;]+)'));
  if (!m) return null;
  try { return JSON.parse(decodeURIComponent(m[1])); } catch { return null; }
}
function clearSharedCookie() {
  document.cookie = SHARED_COOKIE + '=; path=/; domain=' + SHARED_DOMAIN + '; max-age=0; Secure; SameSite=Lax';
}

function showGate(msg) {
  document.getElementById('gateMsg').textContent = msg || 'Esta vista es privada.';

}
function tabsPermitidas(session) {
  if (ADMIN_USERS.includes(session.usuario)) return ['compras', 'proxvtos', 'bancos', 'personal'];
  return TAB_ACCESS[session.usuario] || [];
}
function enterApp(session) {
  document.getElementById('gateScreen').classList.add('hidden');

  document.getElementById('userName').textContent = session.nombre || session.usuario;

  // Mostrar sólo las solapas permitidas para este usuario
  const permitidas = tabsPermitidas(session);
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('hidden', !permitidas.includes(t.dataset.tab));

function setTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));

  const map = {
    compras:  'panelCompras',
    proxvtos: 'panelProxvtos',
    bancos:   'panelBancos',
    personal: 'panelPersonal',
  };
  const el = document.getElementById(map[tab]);
  if (el) el.classList.add('active');

  document.querySelectorAll('.subtab').forEach(t => t.classList.toggle('active', t.dataset.sub === sub));
  document.querySelectorAll('.subpanel').forEach(p => p.classList.remove('active'));
  const map = { novedades: 'subNovedades', guardias: 'subGuardias', historial: 'subHistorial' };
  const el = document.getElementById(map[sub]);
  if (el) el.classList.add('active');
  if (sub === 'novedades') ensureInforme(renderPersonal);
  if (sub === 'guardias')  renderGuardias();
  if (sub === 'historial') renderHistorial();
}

// =======================================================================
// INFORME · fetch (lazy, una vez)
// =======================================================================
async function loadInforme(forzar) {
  const btn = document.getElementById('btnRefreshInforme');
  if (btn) { btn.disabled = true; btn.textContent = 'Cargando...'; }
  try {
    const url = APPS_SCRIPT_URL + '?token=' + encodeURIComponent(APPS_SCRIPT_TOKEN) + '&tipo=informe';
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data && data.error) throw new Error(data.error);
    lastInforme = data;
    // Acumular las novedades del personal general (Sheet) en Supabase (dedup).
    snapshotNovedadesGenerales(data.personal);
    const upd = document.getElementById('updatedAtInforme');
    if (upd && data.updatedAt) upd.textContent = 'Actualizado: ' + new Date(data.updatedAt).toLocaleString('es-AR');
    // re-renderizar la solapa activa si aplica
    const active = document.querySelector('.tab.active')?.dataset.tab;
    if (active === 'bancos')   renderBancos();
    if (active === 'personal') renderPersonal();
    return data;
  } catch (e) {
    console.error(e);
    const msg = `<div class="errbox"><div class="ico">⚠️</div>
      <div class="ttl">No se pudo cargar el INFORME</div>
      <div class="det">${escapeHtml(e.message || String(e))}</div></div>`;
    const wrap = document.getElementById('bancosContent');
    if (wrap) wrap.innerHTML = msg;
    const wrap2 = document.getElementById('personalContent');
    if (wrap2) wrap2.innerHTML = msg;
    throw e;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Actualizar'; }
  }
}

function ensureInforme(cb) {
  if (lastInforme) { cb(); return; }
  const wrap = document.getElementById('bancosContent');
  if (wrap) wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando INFORME...</div></div>';
  const wrap2 = document.getElementById('personalContent');
  if (wrap2) wrap2.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando INFORME...</div></div>';
  loadInforme().then(() => cb()).catch(() => {});
}

// =======================================================================
// COMPRAS · fetch + render
// =======================================================================
async function loadCompras() {
  const wrap = document.getElementById('comprasContent');
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true; btn.textContent = 'Cargando...';
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando datos...</div></div>';

  if (APPS_SCRIPT_URL.indexOf('__APPS_SCRIPT_URL_PENDIENTE__') === 0) {
    wrap.innerHTML = '<div class="errbox"><div class="ico">⚙️</div>'
      + '<div class="ttl">Falta conectar la planilla</div>'
      + '<div>Pendiente: publicar el Apps Script y pegar la URL en <code>index.html</code>.</div></div>';
    btn.disabled = false; btn.textContent = 'Actualizar';
    return;
  }

  try {
    const url = APPS_SCRIPT_URL + '?token=' + encodeURIComponent(APPS_SCRIPT_TOKEN) + '&tipo=compras';
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data && data.error) throw new Error(data.error);
    lastCompras = data;
    renderCompras(data);
  } catch (e) {
    console.error(e);
    wrap.innerHTML = '<div class="errbox"><div class="ico">⚠️</div>'
      + '<div class="ttl">No se pudo cargar la planilla</div>'
      + '<div class="det">' + escapeHtml(e.message || String(e)) + '</div></div>';
  } finally {
    btn.disabled = false; btn.textContent = 'Actualizar';
  }
}

function renderCompras(data) {
  const wrap = document.getElementById('comprasContent');
  const unidades = Array.isArray(data.unidades) ? data.unidades : [];
  const floorPlan           = Number(data.floorPlan) || 0;
  const deudaFloorPlan      = Number(data.deudaFloorPlan) || 0;
  const disponibleFloorPlan = Number(data.disponibleFloorPlan) || 0;
  const disponibleVW        = Number(data.disponibleVW) || 0;

  const impagas = unidades.filter(u => u.impaga);
  const pagadas = unidades.filter(u => !u.impaga && u.fechaPago);

  const cards = `
    <div class="cards">
      <div class="card">
        <div class="label">Floor Plan</div>
        <div class="value">${fmtMoney(floorPlan)}</div>
        <div class="sub">Línea de crédito con VW</div>
      </div>
      <div class="card warn">
        <div class="label">Deuda Floor Plan</div>
        <div class="value">${fmtMoney(deudaFloorPlan)}</div>
        <div class="sub">${impagas.length} unidad${impagas.length === 1 ? '' : 'es'} impaga${impagas.length === 1 ? '' : 's'}</div>
      </div>
      <div class="card ${disponibleFloorPlan >= 0 ? 'good' : 'bad'}">
        <div class="label">Disponible Floor Plan</div>
        <div class="value">${fmtMoney(disponibleFloorPlan)}</div>
        <div class="sub">Floor Plan − deuda</div>
      </div>
      <div class="card good">
        <div class="label">Disponible para pagar VW</div>
        <div class="value">${fmtMoney(disponibleVW)}</div>
        <div class="sub">$ que figura en VW para aplicar</div>
      </div>
    </div>
  `;

  const filtros = `
    <div class="filters">
      <button class="filter-btn ${filterStatus === 'impagas' ? 'active' : ''}" onclick="setFilterStatus('impagas')">Solo impagas (${impagas.length})</button>
      <button class="filter-btn ${filterStatus === 'todas' ? 'active' : ''}" onclick="setFilterStatus('todas')">Todas (${unidades.length})</button>
      <button class="filter-btn ${filterStatus === 'pagadas' ? 'active' : ''}" onclick="setFilterStatus('pagadas')">Pagadas (${pagadas.length})</button>
    </div>
  `;

  // Select de fecha de vencimiento (sólo fechas de impagas — las únicas con vencimiento relevante)
  const vencesSet = new Map(); // key → {label, date}
  unidades.filter(u => u.impaga).forEach(u => {
    const d = parseFechaCorta(u.vence);
    const key = d ? fmtDateKey(d) : (u.vence ? '' : 'sin');
    if (!key) return;
    if (!vencesSet.has(key)) {
      vencesSet.set(key, { label: d ? fmtFechaLarga(d) : 'Sin fecha', date: d });
    }
  });
  const vencesArr = Array.from(vencesSet.entries()).sort((a, b) => {
    if (!a[1].date && !b[1].date) return 0;
    if (!a[1].date) return 1;
    if (!b[1].date) return -1;
    return a[1].date - b[1].date;
  });
  const vencesOpts = vencesArr.map(([k, v]) =>
    `<option value="${escapeHtml(k)}" ${k === colVence ? 'selected' : ''}>${escapeHtml(v.label)}</option>`
  ).join('');

  const colFiltros = `
    <div class="col-filters">
      <input type="search" placeholder="Buscar serie, preventa, modelo..." value="${escapeHtml(colSearch)}" oninput="setColSearch(this.value)">
      <select onchange="setColVence(this.value)">
        <option value="">Vence (todas)</option>${vencesOpts}
      </select>
      ${(colSearch || colVence) ? '<button class="clear-btn" onclick="clearColFilters()">✕ Limpiar</button>' : ''}
    </div>
  `;

  const tableHtml = renderTablaUnidades(unidades);

  wrap.innerHTML = cards + filtros + colFiltros + renderSelectionBar() + tableHtml;
  syncHeadCheck();

  // Updated at
  if (data.updatedAt) {
    document.getElementById('updatedAt').textContent = 'Actualizado: ' + new Date(data.updatedAt).toLocaleString('es-AR');
  }
}

function setFilterStatus(s) {
  filterStatus = s;
  if (lastCompras) renderCompras(lastCompras);
}

// Filtros de columna (sólo re-renderiza la tabla para no perder foco del input)
function setColSearch(v) {
  colSearch = v || '';
  rerenderComprasInner();
}
function setColVence(v) {
  colVence = v || '';
  rerenderComprasInner();
}
function clearColFilters() {
  colSearch = ''; colVence = '';
  if (lastCompras) renderCompras(lastCompras);
}

// Selección de filas
function toggleComprasSelect(rowKey) {
  if (comprasSelected.has(rowKey)) comprasSelected.delete(rowKey);
  else comprasSelected.add(rowKey);
  rerenderComprasInner();
}
function clearComprasSelection() {
  comprasSelected.clear();
  rerenderComprasInner();
}
function seleccionarVendidasVisibles() {
  const filas = getFilasVisibles().filter(u => u.impaga && esVendida(u));
  const yaTodasTildadas = filas.length > 0 && filas.every(u => comprasSelected.has(filaKey(u)));
  if (yaTodasTildadas) {
    // Toggle: si ya están todas, las deselecciona
    filas.forEach(u => comprasSelected.delete(filaKey(u)));
  } else {
    filas.forEach(u => comprasSelected.add(filaKey(u)));
  }
  rerenderComprasInner();
}

function toggleSelectAllVisible(cb) {
  const visibles = getFilasVisibles().filter(u => u.impaga);
  if (cb.checked) {
    visibles.forEach(u => comprasSelected.add(filaKey(u)));
  } else {
    visibles.forEach(u => comprasSelected.delete(filaKey(u)));
  }
  rerenderComprasInner();
}

function syncHeadCheck() {
  const head = document.getElementById('headCheck');
  if (!head) return;
  const visibles = getFilasVisibles().filter(u => u.impaga);
  if (!visibles.length) {
    head.checked = false; head.indeterminate = false; return;
  }
  const tildadas = visibles.filter(u => comprasSelected.has(filaKey(u))).length;
  if (tildadas === 0) { head.checked = false; head.indeterminate = false; }
  else if (tildadas === visibles.length) { head.checked = true; head.indeterminate = false; }
  else { head.checked = false; head.indeterminate = true; }
}

function rerenderComprasInner() {
  if (!lastCompras) return;
  const wrap = document.getElementById('comprasContent');
  // Reemplazar tabla y barra de selección sin tocar cards/filtros (para no perder foco del input)
  const tableWrap = wrap.querySelector('.table-wrap');
  const emptyTbl = wrap.querySelector('.table-wrap + .empty, .col-filters ~ .empty:not(.cards .empty)');
  const selBar = wrap.querySelector('.selection-bar');

  const nuevoSel = renderSelectionBar();
  const nuevaTabla = renderTablaUnidades(lastCompras.unidades || []);

  if (selBar) {
    const tmp = document.createElement('div');
    tmp.innerHTML = nuevoSel;
    if (tmp.firstElementChild) selBar.replaceWith(tmp.firstElementChild);
  }
  const targetTable = tableWrap || emptyTbl;
  if (targetTable) {
    const tmp2 = document.createElement('div');
    tmp2.innerHTML = nuevaTabla;
    if (tmp2.firstElementChild) targetTable.replaceWith(tmp2.firstElementChild);
  } else {
    renderCompras(lastCompras);
    return;
  }

  // Mostrar/ocultar el botón limpiar
  const wantClear = !!(colSearch || colVence);
  const cf = wrap.querySelector('.col-filters');
  if (cf) {
    let btn = cf.querySelector('.clear-btn');
    if (wantClear && !btn) {
      btn = document.createElement('button');
      btn.className = 'clear-btn';
      btn.textContent = '✕ Limpiar';
      btn.onclick = clearColFilters;
      cf.appendChild(btn);
    } else if (!wantClear && btn) {
      btn.remove();
    }
  }
  syncHeadCheck();
}

function renderTablaUnidades(unidades) {
  let filas;
  if (filterStatus === 'impagas') filas = unidades.filter(u => u.impaga);
  else if (filterStatus === 'pagadas') filas = unidades.filter(u => !u.impaga && u.fechaPago);
  else filas = unidades.slice();

  // Filtro por fecha de vencimiento
  if (colVence) {
    filas = filas.filter(u => {
      const d = parseFechaCorta(u.vence);
      const key = d ? fmtDateKey(d) : (u.vence ? '' : 'sin');
      return key === colVence;
    });
  }
  if (colSearch) {
    const q = colSearch.trim().toLowerCase();
    filas = filas.filter(u => {
      const blob = [u.serie, u.preventa, u.modelo, u.color, u.mes, u.fc, u.fechaVta, u.vence, u.localidad]
        .map(x => String(x || '').toLowerCase()).join(' ');
      return blob.indexOf(q) > -1;
    });
  }

  // Ordenar por fecha de vencimiento (más próxima primero)
  filas.sort((a, b) => {
    const da = parseFechaCorta(a.vence);
    const db = parseFechaCorta(b.vence);
    if (!da && !db) return 0;
    if (!da) return 1;
    if (!db) return -1;
    return da - db;
  });

  if (!filas.length) {
    return '<div class="empty"><div class="ico">✅</div><div style="font-size:15px; color:var(--vw-grey-4); font-weight:600">Sin unidades en esta vista</div></div>';
  }

  const hoy = new Date(); hoy.setHours(0,0,0,0);

  const rows = filas.map(u => {
    const vence = parseFechaCorta(u.vence);
    let pill = '';
    if (u.impaga) {
      if (vence && vence < hoy) pill = '<span class="pill vencida">Vencida</span>';
      else pill = '<span class="pill impaga">Impaga</span>';
    } else if (u.fechaPago) {
      pill = '<span class="pill pagada">Pagada</span>';
    }
    const importeMostrar = u.impaga ? u.importe : u.total;
    const rowKey = filaKey(u);
    const checked = comprasSelected.has(rowKey);
    const checkbox = u.impaga
      ? `<input type="checkbox" class="row-check" ${checked ? 'checked' : ''} onchange="toggleComprasSelect('${escapeHtml(rowKey)}')">`
      : '';
    return `
      <tr class="${checked ? 'row-selected' : ''}">
        <td>${checkbox}</td>
        <td>${pill}</td>
        <td class="vence">${escapeHtml(u.vence || '—')}</td>
        <td>${escapeHtml(u.fechaFc || '—')}</td>
        <td class="serie">${escapeHtml(u.serie || '')}</td>
        <td>${escapeHtml(u.modelo || '')}</td>
        <td>${escapeHtml(u.color || '')}</td>
        <td>${escapeHtml(dash(u.preventa))}</td>
        <td>${escapeHtml(dash(u.fechaVta))}</td>
        <td class="num importe">${fmtMoney(importeMostrar)}</td>
        <td>${escapeHtml(u.fechaPago || '—')}</td>
      </tr>
    `;
  }).join('');

  const totalCol = filas.reduce((acc, u) => acc + (Number(u.impaga ? u.importe : u.total) || 0), 0);

  return `
    <div class="table-wrap">
      <div class="table-head">
        <h3>Unidades</h3>
        <span class="count">${filas.length} fila${filas.length === 1 ? '' : 's'} · ordenadas por vencimiento</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th style="width:32px"><input type="checkbox" class="row-check head-check" id="headCheck" onchange="toggleSelectAllVisible(this)" title="Tildar todas las visibles"></th>
              <th>Estado</th>
              <th>Vence</th>
              <th>Fecha Fc</th>
              <th>Serie</th>
              <th>Modelo</th>
              <th>Color</th>
              <th>Preventa</th>
              <th>Fecha venta</th>
              <th class="num">Importe</th>
              <th>Fecha pago</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
          <tfoot>
            <tr>
              <td colspan="9" style="text-align:right">Total visible</td>
              <td class="num">${fmtMoney(totalCol)}</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  `;
}

function filaKey(u) {
  // Identifica una fila aunque cambie de orden
  return String(u.idx || '') + ':' + String(u.serie || '') + ':' + String(u.preventa || '');
}

function getFilasVisibles() {
  if (!lastCompras) return [];
  const unidades = Array.isArray(lastCompras.unidades) ? lastCompras.unidades : [];
  let filas;
  if (filterStatus === 'impagas') filas = unidades.filter(u => u.impaga);
  else if (filterStatus === 'pagadas') filas = unidades.filter(u => !u.impaga && u.fechaPago);
  else filas = unidades.slice();
  if (colVence) {
    filas = filas.filter(u => {
      const d = parseFechaCorta(u.vence);
      const key = d ? fmtDateKey(d) : (u.vence ? '' : 'sin');
      return key === colVence;
    });
  }
  if (colSearch) {
    const q = colSearch.trim().toLowerCase();
    filas = filas.filter(u => {
      const blob = [u.serie, u.preventa, u.modelo, u.color, u.mes, u.fc, u.fechaVta, u.vence, u.localidad]
        .map(x => String(x || '').toLowerCase()).join(' ');
      return blob.indexOf(q) > -1;
    });
  }
  return filas;
}

function renderSelectionBar() {
  if (!lastCompras) return '';
  const unidades = lastCompras.unidades || [];
  const map = new Map(unidades.map(u => [filaKey(u), u]));
  const seleccionadas = Array.from(comprasSelected).map(k => map.get(k)).filter(Boolean);
  const total = seleccionadas.reduce((acc, u) => acc + (Number(u.importe) || 0), 0);
  const cnt = seleccionadas.length;
  const filasVisibles = getFilasVisibles();
  const vendidasImpagasVisibles = filasVisibles.filter(u => u.impaga && esVendida(u));
  const yaTodasVendidasTildadas = vendidasImpagasVisibles.length > 0
    && vendidasImpagasVisibles.every(u => comprasSelected.has(filaKey(u)));

  return `
    <div class="selection-bar">
      <div class="sel-info">
        <div class="sel-lbl">${cnt ? 'Deuda seleccionada' : 'Tildá filas para sumar deuda'}</div>
        ${cnt ? `<div class="sel-val">${fmtMoney(total)}</div>` : ''}
        ${cnt ? `<div class="sel-sub">${cnt} unidad${cnt === 1 ? '' : 'es'} tildada${cnt === 1 ? '' : 's'}</div>` : ''}
      </div>
      <div class="sel-actions">
        <button class="sel-btn" onclick="seleccionarVendidasVisibles()">
          ${yaTodasVendidasTildadas ? '✓ Vendidas tildadas' : '+ Seleccionar vendidas'}
          ${vendidasImpagasVisibles.length ? `<span class="cnt-tag">${vendidasImpagasVisibles.length}</span>` : ''}
        </button>
        ${cnt ? '<button class="sel-btn ghost" onclick="clearComprasSelection()">Limpiar</button>' : ''}
      </div>
    </div>
  `;
}

// =======================================================================
// PRÓXIMOS VENCIMIENTOS
// =======================================================================
function renderProxVtos() {
  const wrap = document.getElementById('proxVtosContent');
  if (!lastCompras) {
    wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando datos...</div></div>';
    if (!document.getElementById('btnRefresh').disabled) loadCompras().then(() => {
      if (document.querySelector('.tab.active')?.dataset.tab === 'proxvtos') renderProxVtos();
    });
    return;
  }
  const unidades = Array.isArray(lastCompras.unidades) ? lastCompras.unidades : [];
  // Sólo impagas (los vencimientos relevantes son los que aún se deben).
  let impagas = unidades.filter(u => u.impaga);
  // Filtro vendida/no vendida
  if (proxVtoFilter === 'novendidas') impagas = impagas.filter(u => !esVendida(u));
  else if (proxVtoFilter === 'vendidas') impagas = impagas.filter(u => esVendida(u));

  // Agrupar por fecha de vencimiento
  const grupos = new Map(); // key (yyyy-mm-dd o 'sin') → { date|null, key, items: [], total: 0 }
  impagas.forEach(u => {
    const d = parseFechaCorta(u.vence);
    const key = d ? fmtDateKey(d) : 'sin';
    if (!grupos.has(key)) grupos.set(key, { date: d, key, items: [], total: 0 });
    const g = grupos.get(key);
    g.items.push(u);
    g.total += Number(u.importe) || 0;
  });
  const arr = Array.from(grupos.values()).sort((a, b) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return a.date - b.date;
  });

  // Limpiar selecciones de grupos que ya no están visibles
  const visibles = new Set(arr.map(g => g.key));
  Array.from(proxVtoSelected).forEach(k => { if (!visibles.has(k)) proxVtoSelected.delete(k); });

  // Total a mostrar: si hay seleccion, sólo seleccionados; si no, todos los visibles
  const haySel = proxVtoSelected.size > 0;
  const totalArr = haySel ? arr.filter(g => proxVtoSelected.has(g.key)) : arr;
  const totalDeuda = totalArr.reduce((acc, g) => acc + g.total, 0);
  const totalUnidades = totalArr.reduce((acc, g) => acc + g.items.length, 0);
  const totalGrupos = totalArr.length;

  const filtroLbl = proxVtoFilter === 'vendidas' ? 'vendidas' : (proxVtoFilter === 'novendidas' ? 'no vendidas' : 'todas');

  if (!arr.length) {
    wrap.innerHTML = `
      ${renderProxVtosControls()}
      <div class="empty"><div class="ico">✅</div><div style="font-size:15px; color:var(--vw-grey-4); font-weight:600">Sin vencimientos pendientes (${filtroLbl})</div></div>
    `;
    return;
  }

  const totalBar = `
    <div class="vtos-totalbar">
      <div>
        <div class="lbl">${haySel ? 'Deuda seleccionada' : 'Deuda total visible'}</div>
        <div class="val">${fmtMoney(totalDeuda)}</div>
        <div class="sub">${totalUnidades} unidad${totalUnidades === 1 ? '' : 'es'} · ${totalGrupos} grupo${totalGrupos === 1 ? '' : 's'} de fecha · filtro: ${filtroLbl}</div>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap">
        ${haySel ? '<button onclick="clearProxVtoSelection()">Limpiar selección</button>' : '<button onclick="selectAllProxVtos()">Seleccionar todos</button>'}
      </div>
    </div>
  `;

  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const groupsHtml = arr.map(g => renderProxVtoGroup(g, hoy)).join('');

  wrap.innerHTML = renderProxVtosControls() + totalBar + groupsHtml;
}

function renderProxVtosControls() {
  return `
    <div class="vtos-controls">
      <div class="group">
        <span style="font-size:13px; color:var(--vw-grey-4); font-weight:600">Filtrar:</span>
        <button class="filter-btn ${proxVtoFilter === 'all' ? 'active' : ''}" onclick="setProxVtoFilter('all')">Todas</button>
        <button class="filter-btn ${proxVtoFilter === 'novendidas' ? 'active' : ''}" onclick="setProxVtoFilter('novendidas')">Solo no vendidas</button>
        <button class="filter-btn ${proxVtoFilter === 'vendidas' ? 'active' : ''}" onclick="setProxVtoFilter('vendidas')">Solo vendidas</button>
      </div>
    </div>
  `;
}

function renderProxVtoGroup(g, hoy) {
  const sel = proxVtoSelected.has(g.key);
  const open = proxVtoOpen.has(g.key);
  let rel = '', relClass = '';
  let label = g.date ? fmtFechaLarga(g.date) : 'Sin fecha de vencimiento';
  if (g.date) {
    const diff = Math.round((g.date - hoy) / 86400000);
    if (diff < 0) { rel = `Vencida hace ${Math.abs(diff)} d`; relClass = 'urgente'; }
    else if (diff === 0) { rel = 'Hoy'; relClass = 'urgente'; }
    else if (diff === 1) { rel = 'Mañana'; relClass = 'pronto'; }
    else if (diff <= 7) { rel = `En ${diff} d`; relClass = 'pronto'; }
    else { rel = `En ${diff} d`; }
  }
  const filas = g.items.slice().sort((a, b) => {
    const sa = String(a.serie || '').localeCompare(String(b.serie || ''));
    return sa;
  }).map(u => `
    <tr>
      <td class="serie">${escapeHtml(u.serie || '')}</td>
      <td>${escapeHtml(u.modelo || '')}</td>
      <td>${escapeHtml(u.color || '')}</td>
      <td>${escapeHtml(dash(u.preventa))}</td>
      <td>${escapeHtml(dash(u.fechaVta))}</td>
      <td>${esVendida(u) ? '<span class="vendida-tag">Vendida</span>' : '<span style="font-size:11px;color:var(--vw-grey-3)">Sin venta</span>'}</td>
      <td class="num importe">${fmtMoney(u.importe)}</td>
    </tr>
  `).join('');
  return `
    <div class="vto-group ${sel ? 'selected' : ''} ${relClass === 'urgente' ? 'vencida' : ''} ${open ? 'open' : ''}" data-key="${escapeHtml(g.key)}">
      <div class="vto-group-head" onclick="toggleProxVtoOpen(event, '${escapeHtml(g.key)}')">
        <input type="checkbox" ${sel ? 'checked' : ''} onclick="event.stopPropagation()" onchange="toggleProxVtoSelect('${escapeHtml(g.key)}')">
        <div class="date-label">
          <span>${escapeHtml(label)}</span>
          ${rel ? `<span class="date-rel ${relClass}">${escapeHtml(rel)}</span>` : ''}
        </div>
        <div class="stats">
          <span class="cnt">${g.items.length} u.</span>
          <span class="amt">${fmtMoney(g.total)}</span>
          <span class="toggle">${open ? '▲' : '▼'}</span>
        </div>
      </div>
      <div class="vto-group-body">
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Serie</th>
                <th>Modelo</th>
                <th>Color</th>
                <th>Preventa</th>
                <th>Fecha venta</th>
                <th>Estado venta</th>
                <th class="num">Importe</th>
              </tr>
            </thead>
            <tbody>${filas}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function setProxVtoFilter(f) {
  proxVtoFilter = f;
  proxVtoSelected.clear();
  renderProxVtos();
}
function toggleProxVtoSelect(key) {
  if (proxVtoSelected.has(key)) proxVtoSelected.delete(key);
  else proxVtoSelected.add(key);
  renderProxVtos();
}
function toggleProxVtoOpen(ev, key) {
  if (ev && ev.target && (ev.target.tagName === 'INPUT')) return;
  if (proxVtoOpen.has(key)) proxVtoOpen.delete(key);
  else proxVtoOpen.add(key);
  renderProxVtos();
}
function clearProxVtoSelection() {
  proxVtoSelected.clear();
  renderProxVtos();
}
function selectAllProxVtos() {
  const unidades = (lastCompras && lastCompras.unidades) || [];
  let impagas = unidades.filter(u => u.impaga);
  if (proxVtoFilter === 'novendidas') impagas = impagas.filter(u => !esVendida(u));
  else if (proxVtoFilter === 'vendidas') impagas = impagas.filter(u => esVendida(u));
  impagas.forEach(u => {
    const d = parseFechaCorta(u.vence);
    proxVtoSelected.add(d ? fmtDateKey(d) : 'sin');
  });
  renderProxVtos();
}

// =======================================================================
// BANCOS · render — agrupa filas por sección detectada en el Apps Script.
// Renderiza cada sección como su propia card; preserva headers, subtotales
// y filas regulares con estilos diferenciados. NO inventa un total general.
// =======================================================================
function renderBancos() {
  const wrap = document.getElementById('bancosContent');
  if (!wrap) return;
  const data = lastInforme;
  if (!data) {
    wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando INFORME...</div></div>';
    return;
  }
  const rows = Array.isArray(data.rows) ? data.rows : [];
  const dispVW = Number(data.disponibleVW) || 0;

  if (!rows.length && !dispVW) {
    wrap.innerHTML = '<div class="empty"><div class="ico">🏦</div><div style="font-size:15px; color:var(--vw-grey-4); font-weight:600">Sin datos en la hoja INFORME</div></div>';
    return;
  }

  // Agrupar por sección: cada header inicia una sección; los `sep` se ignoran salvo para cortar visualmente.
  const secciones = [];
  let actual = null;
  rows.forEach(r => {
    if (r.tipo === 'header') {
      actual = {
        titulo: r.concepto || '',
        valorHeaderD: Number(r.d) || 0,
        valorHeaderE: Number(r.e) || 0,
        items: [],
      };
      secciones.push(actual);
    } else if (r.tipo === 'sep') {
      if (actual && actual.items.length) actual.items.push({ tipo: 'sep' });
    } else {
      if (!actual) {
        actual = { titulo: '', valorHeaderD: 0, valorHeaderE: 0, items: [] };
        secciones.push(actual);
      }
      actual.items.push(r);
    }
  });

  const dispCard = dispVW ? `
    <div class="cards" style="grid-template-columns: 1fr;">
      <div class="card good" style="background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);">
        <div class="label">Disponible para aplicar en VW</div>
        <div class="value">${fmtMoney(dispVW)}</div>
        <div class="sub">INFORME · "Saldos disponibles VW"</div>
      </div>
    </div>
  ` : '';

  const seccionesHtml = secciones.map(sec => renderSeccionBanco(sec)).join('');
  const fondosHtml = renderSeccionFondos(data.fondos || []);

  wrap.innerHTML = dispCard + seccionesHtml + fondosHtml;
  // Acumulado mensual: guarda hoy en Supabase y refresca el total
  sincronizarAcumuladoFondos();
}

// Limpia cualquier resto de fórmula rota de Sheets (#VALUE!, #¡DIV/0!, #N/A, etc.) → "—"
function limpioStr(s) {
  const v = String(s == null ? '' : s).trim();
  if (!v) return '—';
  if (/^#/.test(v)) return '—';
  return v;
}

// Calcula sumas de Total fondo y Ganancia día ignorando errores/NaN.
function calcSumasFondos(fondos) {
  // La fila "0" es el subtotal roto de la planilla → la salteo del cálculo
  const reales = fondos.filter(f => String(f.fecha || '').trim() !== '0');
  let sumaTotal = 0, sumaGanancia = 0;
  reales.forEach(f => {
    const t = Number(f.total);
    const g = Number(f.ganancia);
    if (!isNaN(t) && isFinite(t)) sumaTotal += t;
    if (!isNaN(g) && isFinite(g)) sumaGanancia += g;
  });
  return { sumaTotal, sumaGanancia, filasReales: reales };
}

function renderSeccionFondos(fondos) {
  if (!fondos.length) return '';
  const { sumaTotal, sumaGanancia, filasReales } = calcSumasFondos(fondos);

  const filas = filasReales.map(f => {
    const totalShow    = (f.total && !isNaN(f.total))       ? fmtMoney(f.total)    : limpioStr(f.totalStr);
    const gananciaShow = (f.ganancia && !isNaN(f.ganancia)) ? fmtMoney(f.ganancia) : limpioStr(f.gananciaStr);
    return `<tr>
      <td>${escapeHtml(f.fecha || '—')}</td>
      <td class="num importe">${totalShow}</td>
      <td class="num importe">${gananciaShow}</td>
      <td class="num">${escapeHtml(limpioStr(f.diario))}</td>
      <td class="num">${escapeHtml(limpioStr(f.anual))}</td>
      <td class="num">${escapeHtml(limpioStr(f.mensual))}</td>
    </tr>`;
  }).join('');

  const filaTotal = `<tr class="total-row">
    <td>Total día</td>
    <td class="num importe">${fmtMoney(sumaTotal)}</td>
    <td class="num importe">${fmtMoney(sumaGanancia)}</td>
    <td class="num">—</td>
    <td class="num">—</td>
    <td class="num">—</td>
  </tr>`;

  // Placeholder de acumulado del mes + historial — se reemplazan cuando vuelve Supabase
  const acumuladoSlot = `
    <div class="fondos-acumulado" id="fondosAcumulado">
      <div class="lbl">Acumulado del mes</div>
      <div class="val" id="fondosAcumuladoVal">cargando...</div>
      <div class="sub" id="fondosAcumuladoSub">Se actualiza con la ganancia día a día</div>
    </div>
    <div class="fondos-historial" id="fondosHistorial"></div>
  `;

  return `
    <div class="bank-section">
      <div class="sec-head"><h3>Rendimiento diario Fondos</h3></div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th class="num">Total fondo</th>
              <th class="num">Ganancia día</th>
              <th class="num">Diario %</th>
              <th class="num">Anual %</th>
              <th class="num">Mensual %</th>
            </tr>
          </thead>
          <tbody>${filas}${filaTotal}</tbody>
        </table>
      </div>
      ${acumuladoSlot}
    </div>
  `;
}

// =======================================================================
// SUPABASE · acumulado mensual de la ganancia de fondos
// =======================================================================
async function sbFetch(path, opts) {
  opts = opts || {};
  const url = SUPABASE_URL + '/rest/v1/' + path;
  const headers = Object.assign({
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Accept': 'application/json',
  }, opts.headers || {});
  const res = await fetch(url, Object.assign({}, opts, { headers }));
  if (!res.ok) {
    const text = await res.text().catch(() => '');
    throw new Error('Supabase ' + res.status + ': ' + text);
  }
  // Algunas operaciones devuelven 204 sin contenido
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function fechaISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + dd;
}

// Parsea fechas tipo "11-may" o "11-may-26" (con o sin año) → Date
function parseFondoFecha(s) {
  if (!s) return null;
  const m = String(s).toLowerCase().match(/^(\d{1,2})-([a-zñ]{3})(?:-(\d{2,4}))?/);
  if (!m) return null;
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const mi = meses.indexOf(m[2]);
  if (mi < 0) return null;
  let y = m[3] ? Number(m[3]) : new Date().getFullYear();
  if (y < 100) y += 2000;
  return new Date(y, mi, Number(m[1]));
}

async function upsertGanancia(fechaSave, gananciaDia, totalFondos) {
  const body = JSON.stringify([{
    fecha: fechaSave,
    ganancia_dia: Number(gananciaDia) || 0,
    total_fondos: Number(totalFondos) || 0,
  }]);
  await sbFetch('saldos_fondos_diario?on_conflict=fecha', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: body,
  });
}

// Inserta un registro por cada día previo del mismo mes, mismo valor que el "real".
// Idempotente — ignore-duplicates no pisa los que ya existen.
async function backfillEstimadoMes(fechaReal, gananciaDia, totalFondos) {
  const dia = fechaReal.getDate();
  if (dia <= 1) return { inserted: 0, hasta: 0 };
  const filas = [];
  for (let d = 1; d < dia; d++) {
    filas.push({
      fecha: fechaISO(new Date(fechaReal.getFullYear(), fechaReal.getMonth(), d)),
      ganancia_dia: Number(gananciaDia) || 0,
      total_fondos: Number(totalFondos) || 0,
    });
  }
  await sbFetch('saldos_fondos_diario?on_conflict=fecha', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=ignore-duplicates,return=minimal' },
    body: JSON.stringify(filas),
  });
  return { inserted: filas.length, hasta: dia - 1 };
}

async function fetchAcumuladoMes() {
  const hoy = new Date();
  const inicio = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
  const inicioStr = inicio.toISOString().split('T')[0];
  const data = await sbFetch('saldos_fondos_diario?fecha=gte.' + inicioStr + '&select=fecha,ganancia_dia&order=fecha.asc');
  const acumulado = (data || []).reduce((acc, r) => acc + (Number(r.ganancia_dia) || 0), 0);
  return { acumulado, dias: (data || []).length, registros: data || [] };
}

// Trae todos los registros, agrupa por año-mes, devuelve los meses anteriores al actual.
async function fetchHistorialMeses() {
  const data = await sbFetch('saldos_fondos_diario?select=fecha,ganancia_dia&order=fecha.asc') || [];
  const hoy = new Date();
  const yMesActual = hoy.getFullYear() * 100 + (hoy.getMonth() + 1);
  const porMes = new Map(); // key "YYYY-MM" → { total, dias, ymKey }
  data.forEach(r => {
    if (!r.fecha) return;
    const ym = String(r.fecha).slice(0, 7);              // "2026-05"
    const y = Number(ym.split('-')[0]);
    const m = Number(ym.split('-')[1]);
    const ymKey = y * 100 + m;
    if (ymKey >= yMesActual) return;                     // sólo meses anteriores
    if (!porMes.has(ym)) porMes.set(ym, { total: 0, dias: 0, y, m });
    const g = porMes.get(ym);
    g.total += Number(r.ganancia_dia) || 0;
    g.dias += 1;
  });
  // Ordenar de más reciente a más antiguo
  return Array.from(porMes.values()).sort((a, b) => (b.y * 100 + b.m) - (a.y * 100 + a.m));
}

function _mesNombre(y, m) {
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return meses[m - 1] + ' ' + y;
}

async function sincronizarAcumuladoFondos() {
  const fondos = (lastInforme && lastInforme.fondos) || [];
  if (!fondos.length) return;
  const { sumaGanancia, sumaTotal, filasReales } = calcSumasFondos(fondos);

  // Determinar la fecha del resultado (lo que dice la planilla, ej "11-may")
  // Si no se pudiera parsear, caemos a "ayer" (la planilla siempre va con 1 día de lag).
  let fechaReal = filasReales.length ? parseFondoFecha(filasReales[0].fecha) : null;
  if (!fechaReal) {
    fechaReal = new Date();
    fechaReal.setDate(fechaReal.getDate() - 1);
  }
  const fechaSave = fechaISO(fechaReal);

  try {
    // 1. Guardar el resultado real con la fecha de la planilla
    await upsertGanancia(fechaSave, sumaGanancia, sumaTotal);

    // 2. Backfill estimado: días 1 a (fechaReal-1) con la misma ganancia (sólo inserta nuevos)
    const backfill = await backfillEstimadoMes(fechaReal, sumaGanancia, sumaTotal);

    // 3. Traer y mostrar acumulado del mes
    const { acumulado, dias } = await fetchAcumuladoMes();
    const valEl = document.getElementById('fondosAcumuladoVal');
    const subEl = document.getElementById('fondosAcumuladoSub');
    if (valEl) valEl.textContent = fmtMoney(acumulado);
    if (subEl) {
      const mesNombre = fechaReal.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });
      const diaReal = fechaReal.getDate();
      let txt = dias + ' día' + (dias === 1 ? '' : 's') + ' en ' + mesNombre;
      if (backfill.hasta > 0) {
        txt += ' · Días 1 al ' + backfill.hasta + ' estimados según el resultado del ' + diaReal;
      }
      subEl.textContent = txt;
    }

    // 4. Historial de meses anteriores
    const meses = await fetchHistorialMeses();
    const hist = document.getElementById('fondosHistorial');
    if (hist) {
      if (!meses.length) {
        hist.innerHTML = '';
      } else {
        const lis = meses.map(m => `
          <li>
            <span class="hist-mes">${escapeHtml(_mesNombre(m.y, m.m))}</span>
            <span class="hist-info">${m.dias} día${m.dias === 1 ? '' : 's'}</span>
            <span class="hist-val">${fmtMoney(m.total)}</span>
          </li>
        `).join('');
        hist.innerHTML = `
          <div class="hist-head">Meses anteriores</div>
          <ul class="hist-list">${lis}</ul>
        `;
      }
    }
  } catch (e) {
    console.error('Error acumulado fondos:', e);
    const valEl = document.getElementById('fondosAcumuladoVal');
    const subEl = document.getElementById('fondosAcumuladoSub');
    if (valEl) valEl.textContent = '—';
    if (subEl) subEl.textContent = 'Error: ' + (e.message || e);
  }
}

function renderSeccionBanco(sec) {
  const tituloUpper = (sec.titulo || '').toUpperCase();
  // DISP FUTURAS: dos columnas de valor — "Libre Disp" y "Técnico" definidas en el header
  const esDispFuturas = /\bDISP\s+FUTURAS\b/.test(tituloUpper);
  // SALDOS DISPONIBLES VW: la columna E lleva la sub-descripción (Deposito VWF, Certif AA, etc.)
  const esSaldosVW = /SALDOS\s+DISPONIBLES\s+VW/.test(tituloUpper);
  // DEUDAS EN FABRICA: los montos están en E
  const esDeudasFabrica = /DEUDAS\s+EN\s+FABRICA/.test(tituloUpper);

  const headerAmount = (Number(sec.valorHeaderD) || Number(sec.valorHeaderE) || 0);
  const headerStr = headerAmount ? `<span class="sec-amount">${fmtMoney(headerAmount)}</span>` : '';
  const titulo = sec.titulo
    ? `<div class="sec-head"><h3>${escapeHtml(sec.titulo)}</h3>${headerStr}</div>`
    : '';

  if (!sec.items.length) {
    if (!titulo) return '';
    return `<div class="bank-section">${titulo}</div>`;
  }

  // Sub-encabezados de columnas para DISP FUTURAS
  let thead = '';
  if (esDispFuturas) {
    thead = `<thead><tr>
      <th>Concepto</th>
      <th class="num">Libre Disp</th>
      <th class="num">Técnico</th>
    </tr></thead>`;
  }

  const filasHtml = sec.items.map(r => {
    if (r.tipo === 'sep') {
      const cols = esDispFuturas ? 3 : 2;
      return `<tr class="sep-row"><td colspan="${cols}"></td></tr>`;
    }
    const concepto = String(r.concepto || '').trim();
    const dNum = Number(r.d) || 0;
    const eNum = Number(r.e) || 0;
    const dStr = String(r.dStr || '').trim();
    const eStr = String(r.eStr || '').trim();
    const esFechaE = !!r.esFechaE;

    if (esDispFuturas) {
      const negD = dNum < 0;
      const negE = eNum < 0;
      const dShow = dNum !== 0 ? fmtMoney(dNum) : (dStr || '—');
      const eShow = eNum !== 0 ? fmtMoney(eNum) : (eStr || '—');
      const rowClass = r.tipo === 'total' ? 'total-row' : '';
      return `<tr class="${rowClass}">
        <td>${escapeHtml(concepto)}</td>
        <td class="num importe ${negD ? 'neg' : ''}">${dShow}</td>
        <td class="num importe ${negE ? 'neg' : ''}">${eShow}</td>
      </tr>`;
    }

    // Resto de secciones: una sola columna de valor.
    // Reglas:
    //   - Si D tiene valor numérico → ese es el valor
    //   - Si D es 0 / vacío y E tiene valor numérico → uso E
    //   - Si E es una fecha → la muestro como chip al lado del concepto
    //   - Si E es texto descriptivo (ej "Deposito VWF" en SALDOS VW) → lo muestro como subtítulo
    let valorPrincipal = '';
    let valorNegativo = false;
    let conceptoExtra = '';

    if (dNum !== 0) {
      valorPrincipal = fmtMoney(dNum);
      valorNegativo = dNum < 0;
    } else if (eNum !== 0) {
      valorPrincipal = fmtMoney(eNum);
      valorNegativo = eNum < 0;
    } else if (dStr) {
      valorPrincipal = escapeHtml(dStr);
      valorNegativo = /^-/.test(dStr);
    } else {
      valorPrincipal = '—';
    }

    if (esFechaE && eStr) {
      conceptoExtra = `<span class="venc-chip">venc. ${escapeHtml(eStr)}</span>`;
    } else if (eStr && eNum === 0 && !esFechaE && (esSaldosVW || /vw\s+credit/i.test(concepto))) {
      // En SALDOS VW, col E es la sub-descripción (Deposito VWF, Certif AA, etc.)
      conceptoExtra = `<span class="sub-desc">${escapeHtml(eStr)}</span>`;
    }

    const rowClass = r.tipo === 'total' ? 'total-row' : '';
    const negClass = valorNegativo ? 'neg' : '';
    return `<tr class="${rowClass} ${valorNegativo ? 'neg' : ''}">
      <td>${escapeHtml(concepto)}${conceptoExtra}</td>
      <td class="num importe ${negClass}">${valorPrincipal}</td>
    </tr>`;
  }).join('');

  return `
    <div class="bank-section">
      ${titulo}
      <div class="table-scroll">
        <table>${thead}<tbody>${filasHtml}</tbody></table>
      </div>
    </div>
  `;
}

function renderPersonal() {

  const data = lastInforme;
  if (!data) {
    wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando INFORME...</div></div>';

  }
  // Asegurar que las guardias estén cargadas (para las novedades derivadas)
  if (!guardiasLoaded && !guardiasSinTabla && !guardiasNovedadesTried) {
    guardiasNovedadesTried = true;
    loadGuardiasOverrides().then(() => renderPersonal()).catch(() => {});
  }

  const guardiasHtml = renderNovedadesGuardias();
  const items = Array.isArray(data.personal) ? data.personal : [];

  const sheetHtml = items.map(r => {
    const t = String(r.texto || '').trim();
    const f = String(r.fecha || '').trim();
    if (r.tipo === 'header')   return `<div class="personal-header-main">${escapeHtml(t)}</div>`;
