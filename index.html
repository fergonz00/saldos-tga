      <span class="p-txt">${escapeHtml(t)}</span>
      ${f ? `<span class="p-date">${escapeHtml(f)}</span>` : ''}
    </div>`;
  }).join('');

  if (!guardiasHtml && !sheetHtml) {
    wrap.innerHTML = '<div class="empty"><div class="ico">👥</div><div style="font-size:15px; color:var(--vw-grey-4); font-weight:600">Sin novedades del personal</div></div>';
    return;
  }

  wrap.innerHTML = `<div class="personal-wrap"><div class="personal-body">${guardiasHtml}${sheetHtml}</div></div>`;
}

// Novedades derivadas de las guardias: faltas (con motivo) y llegadas tarde.
// Sólo lo de HOY — los días anteriores quedan en la sub-pestaña Historial.
function renderNovedadesGuardias() {
  if (!guardiasOverrides || !guardiasOverrides.size) return '';
  const hoy = hoyISO();
  const items = [];
  guardiasOverrides.forEach((info, key) => {
    const parts = key.split('|');
    const fecha = parts[0], sucursal = parts[1], vendedor = parts[2];
    if (fecha !== hoy) return;
    if (info.estado === 'falta') {
      items.push({ fecha, tipo: 'falta', vendedor, sucursal,
        txt: `${cap(vendedor)} (${sucursal}) — Falta${info.motivo ? ': ' + info.motivo : ''}` });
    }
    if (info.llegadaTarde) {
      items.push({ fecha, tipo: 'tarde', vendedor, sucursal,
        txt: `${cap(vendedor)} (${sucursal}) — Llegó tarde ${info.llegadaTarde}` });
    }
  });
  if (!items.length) return '';
  items.sort((a, b) => b.fecha.localeCompare(a.fecha) || a.vendedor.localeCompare(b.vendedor));
  const rows = items.map(it => `
    <div class="personal-item ${it.fecha === hoy ? 'nov-hoy' : ''}">
      <span class="p-txt"><span class="nov-ico ${it.tipo}">${it.tipo === 'falta' ? '⚠️' : '⏰'}</span> ${escapeHtml(it.txt)}</span>
      <span class="p-date">${dowName(it.fecha)} ${fechaDM(it.fecha)}${it.fecha === hoy ? ' · HOY' : ''}</span>
    </div>`).join('');
  return `<div class="personal-header-main">📋 Novedades de guardias de hoy</div>${rows}`;
}

// =======================================================================
// GUARDIAS VENTAS · cronograma editable (persistido en Supabase)
// =======================================================================
function buildGuardiasBase() {
  if (guardiasBaseMap) return guardiasBaseMap;
  guardiasBaseMap = {};
  GUARDIAS_BASE_RAW.forEach(raw => {
    const parts = raw.split('|');
    const fecha = parts[0];
    const dia = {};
    GUARDIAS_SUCURSALES.forEach((suc, si) => {
      const codes = parts[1 + si] || '';
      const m = {};
      suc.vendedores.forEach((v, vi) => {
        m[v] = GUARDIAS_CODE2EST[codes[vi]] || 'franco';
      });
      dia[suc.nombre] = m;
    });
    guardiasBaseMap[fecha] = dia;
  });
  return guardiasBaseMap;
}

// Info completa de una celda: { estado, motivo, llegadaTarde }
function guardiaInfo(fecha, sucursal, vendedor) {
  const k = fecha + '|' + sucursal + '|' + vendedor;
  if (guardiasOverrides.has(k)) {
    const o = guardiasOverrides.get(k);
    return { estado: o.estado, motivo: o.motivo || '', llegadaTarde: o.llegadaTarde || '' };
  }
  const base = buildGuardiasBase()[fecha];
  const est = (base && base[sucursal] && base[sucursal][vendedor]) || 'franco';
  return { estado: est, motivo: '', llegadaTarde: '' };
}
function guardiaEstado(fecha, sucursal, vendedor) {
  return guardiaInfo(fecha, sucursal, vendedor).estado;
}

function puedeEditarGuardias() {
  const s = getSharedCookie() || {};
  return GUARDIAS_EDITORES.includes(s.usuario);
}

async function loadGuardiasOverrides() {
  const data = await sbFetch('saldos_guardias?select=fecha,sucursal,vendedor,estado,motivo,llegada_tarde');
  guardiasOverrides = new Map();
  (data || []).forEach(r => {
    guardiasOverrides.set(r.fecha + '|' + r.sucursal + '|' + r.vendedor, {
      estado: r.estado, motivo: r.motivo || '', llegadaTarde: r.llegada_tarde || '',
    });
  });
  guardiasLoaded = true;
}

async function saveGuardia(fecha, sucursal, vendedor, estado, motivo, llegadaTarde) {
  const sess = getSharedCookie() || {};
  const body = JSON.stringify([{
    fecha, sucursal, vendedor, estado,
    motivo: motivo || null,
    llegada_tarde: llegadaTarde || null,
    updated_by: sess.usuario || '',
  }]);
  await sbFetch('saldos_guardias?on_conflict=fecha,sucursal,vendedor', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body,
  });
}

async function renderGuardias() {
  const wrap = document.getElementById('guardiasContent');
  if (!wrap) return;
  if (!guardiasLoaded) {
    wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando guardias...</div></div>';
    try {
      await loadGuardiasOverrides();
      guardiasSinTabla = false;
    } catch (e) {
      console.error('Guardias:', e);
      const msg = String(e && e.message || e);
      // Tabla aún no creada → modo solo lectura sobre la base (no romper la vista).
      if (/PGRST205|Could not find the table|42P01|does not exist/i.test(msg)) {
        guardiasSinTabla = true;
        guardiasOverrides = new Map();
        drawGuardias();
        return;
      }
      wrap.innerHTML = `<div class="errbox"><div class="ico">⚠️</div>
        <div class="ttl">No se pudieron cargar las guardias</div>
        <div class="det">${escapeHtml(msg)}</div></div>`;
      return;
    }
  }
  drawGuardias();
}

function guardiasFechas() {
  const set = new Set(Object.keys(buildGuardiasBase()));
  guardiasOverrides.forEach((v, k) => set.add(k.split('|')[0]));
  return Array.from(set).sort();
}

function drawGuardias() {
  const wrap = document.getElementById('guardiasContent');
  if (!wrap) return;
  const editable = puedeEditarGuardias() && !guardiasSinTabla;
  const fechas = guardiasFechas();
  const meses = Array.from(new Set(fechas.map(f => f.slice(0, 7)))).sort();
  // Arrancar enfocado en el mes actual (si está en los datos)
  if (!guardiasMesInit) {
    guardiasMesInit = true;
    const hm = hoyISO().slice(0, 7);
    if (meses.includes(hm)) guardiasMesFiltro = hm;
  }
  if (guardiasMesFiltro && !meses.includes(guardiasMesFiltro)) guardiasMesFiltro = '';
  const fechasVis = guardiasMesFiltro ? fechas.filter(f => f.slice(0, 7) === guardiasMesFiltro) : fechas;
  const mesesARender = guardiasMesFiltro ? [guardiasMesFiltro] : meses;

  const mesOpts = ['<option value="">Todos los meses</option>']
    .concat(meses.map(m => `<option value="${m}" ${m === guardiasMesFiltro ? 'selected' : ''}>${escapeHtml(mesLabel(m))}</option>`))
    .join('');

  const legend = Object.entries(GUARDIAS_ESTADOS).map(([est, v]) =>
    `<span class="lg"><span class="dot ${est}"></span>${escapeHtml(v.label)}</span>`).join('');

  const bloques = mesesARender.map(ym => renderGuardiaCalendario(ym, editable)).join('');
  const ausencias = renderGuardiaAusencias(fechasVis);

  const bannerSinTabla = guardiasSinTabla ? `
    <div class="errbox" style="text-align:left;padding:14px 16px;margin-bottom:14px">
      <div class="ttl" style="margin-bottom:4px">⚠️ Modo sólo lectura</div>
      <div style="font-size:13px;color:var(--vw-grey-4)">Estás viendo el cronograma base. Para poder <strong>editar y guardar</strong> falta crear la tabla en Supabase: corré una vez el archivo <code>supabase_guardias.sql</code> en Supabase → SQL Editor.</div>
    </div>` : '';

  wrap.innerHTML = `
    ${bannerSinTabla}
    <div class="guardias-bar">
      <div>
        <div class="g-title">Agenda de guardias · Ventas</div>
        <div class="g-sub">El día de hoy va resaltado en celeste. ${editable ? 'Tocá un nombre para cambiar su estado (se guarda solo).' : 'Vista de sólo lectura.'}</div>
      </div>
      <select onchange="setGuardiasMes(this.value)">${mesOpts}</select>
    </div>
    <div class="g-status" id="guardiasStatus"></div>
    <div class="guardias-legend">${legend}</div>
    ${ausencias}
    ${bloques}
  `;
}

// Un mes como calendario (semana D L M M J V S)
function renderGuardiaCalendario(ym, editable) {
  const p = ym.split('-').map(Number);
  const y = p[0], m = p[1];
  const diasEnMes = new Date(y, m, 0).getDate();
  const primerDow = new Date(y, m - 1, 1).getDay(); // 0=Dom
  const dows = ['D', 'L', 'M', 'M', 'J', 'V', 'S'];
  const dowNombres = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
  const header = dows.map((d, i) =>
    `<div class="gcal-dow ${(i === 0 || i === 6) ? 'we' : ''}" title="${dowNombres[i]}">${d}</div>`).join('');
  let cells = '';
  for (let i = 0; i < primerDow; i++) cells += '<div class="gcal-cell empty"></div>';
  for (let d = 1; d <= diasEnMes; d++) {
    cells += renderGuardiaDiaCell(ym + '-' + String(d).padStart(2, '0'), d, editable);
  }
  const resto = (7 - ((primerDow + diasEnMes) % 7)) % 7;
  for (let i = 0; i < resto; i++) cells += '<div class="gcal-cell empty"></div>';
  return `
    <div class="gcal-month">
      <div class="gcal-month-head">${escapeHtml(mesLabel(ym))}</div>
      <div class="gcal-scroll"><div class="gcal-grid">${header}${cells}</div></div>
    </div>
  `;
}

// Una celda-día: por cada salón, los nombres coloreados (verde=va, gris=franco, etc.)
function renderGuardiaDiaCell(fecha, dia, editable) {
  const dw = dowNum(fecha);
  const weekend = (dw === 0 || dw === 6);
  const esHoy = (fecha === hoyISO());
  const sucBlocks = GUARDIAS_SUCURSALES.map(suc => {
    const chips = suc.vendedores.map(v => {
      const info = guardiaInfo(fecha, suc.nombre, v);
      const meta = GUARDIAS_ESTADOS[info.estado] || GUARDIAS_ESTADOS.franco;
      let tip = cap(v) + ' · ' + meta.label;
      if (info.estado === 'falta' && info.motivo) tip += ': ' + info.motivo;
      let extra = '';
      if (info.llegadaTarde) { tip += ' · llegó tarde ' + info.llegadaTarde; extra = ` <span class="gname-tarde">⏰${escapeHtml(info.llegadaTarde)}</span>`; }
      const cls = 'gname ' + info.estado + (editable ? ' editable' : '');
      const oc = editable ? `onclick="abrirGuardiaPop(event,'${fecha}','${escapeHtml(suc.nombre)}','${v}')"` : '';
      return `<span class="${cls}" ${oc} title="${escapeHtml(tip)}">${escapeHtml(cap(v))}${extra}</span>`;
    }).join('');
    return `<div class="gcal-suc">
      <div class="gcal-suc-lbl">${escapeHtml(suc.nombre)}</div>
      <div class="gcal-names">${chips}</div>
    </div>`;
  }).join('');
  return `<div class="gcal-cell ${weekend ? 'we' : ''} ${esHoy ? 'hoy' : ''}">
    <div class="gcal-daynum"><span>${dia}</span>${esHoy ? '<span class="gcal-hoy-badge">HOY</span>' : ''}</div>
    ${sucBlocks}
  </div>`;
}

function renderGuardiaAusencias(fechas) {
  const raw = [];
  fechas.forEach(f => GUARDIAS_SUCURSALES.forEach(suc => suc.vendedores.forEach(v => {
    const est = guardiaEstado(f, suc.nombre, v);
    if (est === 'vacaciones' || est === 'falta' || est === 'curso') {
      raw.push({ fecha: f, vendedor: v, sucursal: suc.nombre, estado: est });
    }
  })));
  if (!raw.length) return '';
  raw.sort((a, b) =>
    (a.vendedor + a.sucursal + a.estado).localeCompare(b.vendedor + b.sucursal + b.estado) ||
    a.fecha.localeCompare(b.fecha));
  const groups = [];
  raw.forEach(it => {
    const last = groups[groups.length - 1];
    if (last && last.vendedor === it.vendedor && last.sucursal === it.sucursal &&
        last.estado === it.estado && diasConsecutivos(last.hasta, it.fecha)) {
      last.hasta = it.fecha;
    } else {
      groups.push({ vendedor: it.vendedor, sucursal: it.sucursal, estado: it.estado, desde: it.fecha, hasta: it.fecha });
    }
  });
  // Sólo lo vigente HOY: ni faltas de días anteriores ni vacaciones que todavía
  // no arrancaron (el resto se ve en el calendario / Historial).
  const hoy = hoyISO();
  const vigentes = groups.filter(g => g.desde <= hoy && g.hasta >= hoy);
  if (!vigentes.length) return '';
  const li = vigentes.map(g => {
    const rango = g.desde === g.hasta
      ? `${dowName(g.desde)} ${fechaDM(g.desde)}`
      : `${dowName(g.desde)} ${fechaDM(g.desde)} → ${dowName(g.hasta)} ${fechaDM(g.hasta)}`;
    return `<div class="ga-item">
      <span><strong>${escapeHtml(cap(g.vendedor))}</strong> · ${escapeHtml(g.sucursal)}
        <span class="ga-tag ${g.estado}">${escapeHtml(GUARDIAS_ESTADOS[g.estado].label)}</span></span>
      <span class="ga-when">${rango}</span>
    </div>`;
  }).join('');
  return `<div class="guardias-ausentes">
    <div class="ga-head">Ausencias de hoy (${vigentes.length})</div>
    ${li}
  </div>`;
}

function setGuardiasMes(m) { guardiasMesFiltro = m || ''; drawGuardias(); }

function abrirGuardiaPop(ev, fecha, sucursal, vendedor) {
  ev.stopPropagation();
  cerrarGuardiaPop();
  const info = guardiaInfo(fecha, sucursal, vendedor);
  const overlay = document.createElement('div');
  overlay.className = 'g-pop-overlay';
  overlay.onclick = cerrarGuardiaPop;
  const pop = document.createElement('div');
  pop.className = 'g-pop g-pop-wide';
  pop.onclick = e => e.stopPropagation();
  document.body.appendChild(overlay);
  document.body.appendChild(pop);
  guardiasEditCell = {
    fecha, sucursal, vendedor,
    estado: info.estado, motivo: info.motivo, llegadaTarde: info.llegadaTarde,
    overlay, pop, anchorRect: ev.currentTarget.getBoundingClientRect(),
  };
  repintarPop();
}

function cerrarGuardiaPop() {
  if (guardiasEditCell) {
    if (guardiasEditCell.overlay) guardiasEditCell.overlay.remove();
    if (guardiasEditCell.pop) guardiasEditCell.pop.remove();
    guardiasEditCell = null;
  }
}

function repintarPop() {
  const e = guardiasEditCell;
  if (!e || !e.pop) return;
  e.pop.innerHTML = renderGuardiaPopBody();
  posicionarPop();
}

function posicionarPop() {
  const e = guardiasEditCell;
  if (!e || !e.pop) return;
  const r = e.anchorRect;
  e.pop.style.top = (r.bottom + window.scrollY + 4) + 'px';
  e.pop.style.left = (r.left + window.scrollX) + 'px';
  const pr = e.pop.getBoundingClientRect();
  if (pr.right > window.innerWidth - 8) {
    e.pop.style.left = (Math.max(8, window.innerWidth - pr.width - 8) + window.scrollX) + 'px';
  }
}

function renderGuardiaPopBody() {
  const e = guardiasEditCell;
  const estados = Object.entries(GUARDIAS_ESTADOS).map(([est, v]) =>
    `<button type="button" class="g-est ${est === e.estado ? 'sel' : ''}" onclick="setPopEstado('${est}')">
      <span class="dot ${est}"></span>${escapeHtml(v.label)}</button>`).join('');
  let extra = '';
  if (e.estado === 'falta') {
    const chips = GUARDIAS_MOTIVOS.map(m =>
      `<button type="button" class="g-motivo-chip ${e.motivo === m ? 'sel' : ''}" onclick="setPopMotivo('${escapeHtml(m)}')">${escapeHtml(m)}</button>`).join('');
    extra = `
      <div class="g-pop-sec">Motivo de la falta</div>
      <div class="g-motivo-chips">${chips}</div>
      <input class="g-pop-input" id="gMotivoInput" placeholder="o escribí otro motivo..." value="${escapeHtml(e.motivo)}" oninput="setPopMotivoInput(this.value)">`;
  } else if (e.estado === 'trabaja') {
    extra = `
      <div class="g-pop-sec">Llegada tarde (opcional)</div>
      <div class="g-tarde-row">
        <input type="time" class="g-pop-input g-time" id="gTardeInput" value="${escapeHtml(e.llegadaTarde)}" onchange="setPopTarde(this.value)">
        ${e.llegadaTarde ? '<button type="button" class="g-tarde-clear" onclick="setPopTarde(\'\')">Quitar</button>' : ''}
      </div>
      <div class="g-pop-hint">Si llegó tarde igual queda como "Trabaja".</div>`;
  }
  return `
    <div class="g-pop-head">${escapeHtml(cap(e.vendedor))} · ${escapeHtml(e.sucursal)}
      <div class="g-pop-sub">${dowName(e.fecha)} ${fechaDM(e.fecha)}</div>
    </div>
    <div class="g-pop-sec">Estado del día</div>
    <div class="g-estados">${estados}</div>
    ${extra}
    <div class="g-pop-err" id="gPopErr"></div>
    <div class="g-pop-actions">
      <button type="button" class="g-btn ghost" onclick="cerrarGuardiaPop()">Cancelar</button>
      <button type="button" class="g-btn primary" onclick="guardarGuardia()">Guardar</button>
    </div>`;
}

function setPopEstado(est) {
  guardiasEditCell.estado = est;
  if (est !== 'falta') guardiasEditCell.motivo = '';
  if (est !== 'trabaja') guardiasEditCell.llegadaTarde = '';
  repintarPop();
}
function setPopMotivo(m) { guardiasEditCell.motivo = m; repintarPop(); }
function setPopMotivoInput(v) { guardiasEditCell.motivo = v; }  // sin repintar: conserva el foco
function setPopTarde(v) { guardiasEditCell.llegadaTarde = v; repintarPop(); }

async function guardarGuardia() {
  const e = guardiasEditCell;
  if (!e) return;
  const motivo = e.estado === 'falta' ? String(e.motivo || '').trim() : '';
  const llegada = e.estado === 'trabaja' ? String(e.llegadaTarde || '').trim() : '';
  if (e.estado === 'falta' && !motivo) {
    const err = document.getElementById('gPopErr');
    if (err) err.textContent = 'Poné el motivo de la falta.';
    const inp = document.getElementById('gMotivoInput');
    if (inp) inp.focus();
    return;
  }
  const fecha = e.fecha, sucursal = e.sucursal, vendedor = e.vendedor, estado = e.estado;
  const k = fecha + '|' + sucursal + '|' + vendedor;
  const prev = guardiasOverrides.has(k) ? guardiasOverrides.get(k) : undefined;
  guardiasOverrides.set(k, { estado, motivo, llegadaTarde: llegada });
  cerrarGuardiaPop();
  drawGuardias();
  const status = document.getElementById('guardiasStatus');
  if (status) status.textContent = 'Guardando…';
  try {
    await saveGuardia(fecha, sucursal, vendedor, estado, motivo, llegada);
    const st = document.getElementById('guardiasStatus');
    if (st) st.textContent = 'Guardado ✓ ' + new Date().toLocaleTimeString('es-AR');
  } catch (err2) {
    console.error('Guardar guardia:', err2);
    if (prev === undefined) guardiasOverrides.delete(k); else guardiasOverrides.set(k, prev);
    drawGuardias();
    const st = document.getElementById('guardiasStatus');
    if (st) st.textContent = '⚠️ No se pudo guardar: ' + (err2.message || err2);
  }
}

// Helpers de fecha para el cronograma
function cap(s) { s = String(s || '').toLowerCase(); return s.charAt(0).toUpperCase() + s.slice(1); }
function _gd(f) { const p = String(f).split('-').map(Number); return new Date(p[0], p[1] - 1, p[2]); }
function dowNum(f) { return _gd(f).getDay(); }
function dowName(f) { return ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'][_gd(f).getDay()]; }
function fechaDM(f) { const p = String(f).split('-'); return p[2] + '/' + p[1]; }
function mesLabel(ym) {
  const p = ym.split('-').map(Number);
  const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
  return meses[p[1] - 1] + ' ' + p[0];
}
function diasConsecutivos(a, b) { return (_gd(b) - _gd(a)) === 86400000; }
function hoyISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

// =======================================================================
// NOVEDADES · acumulación del personal general (Sheet) en Supabase
// =======================================================================
function clasificarTipoNovedad(seccion) {
  const s = String(seccion || '').toLowerCase();
  if (/tarde/.test(s)) return 'llegada_tarde';
  if (/ausent|falt/.test(s)) return 'falta';
  return 'otro';
}

// Parsea la lista `personal` (del Apps Script) en eventos {fecha, tipo, persona, detalle}
function parseNovedadesPersonal(personal) {
  const out = [];
  if (!Array.isArray(personal)) return out;
  let seccion = '';
  personal.forEach(r => {
    if (r.tipo === 'header')  { seccion = ''; return; }
    if (r.tipo === 'subhead') { seccion = String(r.texto || '').trim(); return; }
    if (r.tipo !== 'item') return;
    const texto = String(r.texto || '').trim();
    if (!texto) return;
    const d = parseFechaCorta(r.fecha);
    out.push({
      fecha: d ? fmtDateKey(d) : hoyISO(),
      tipo: clasificarTipoNovedad(seccion),
      persona: texto,
      detalle: String(r.fecha || '').trim(),
    });
  });
  return out;
}

// Acumula en Supabase lo que trae el Sheet (dedup) — de acá sale el Historial
// general día a día. No requiere tocar nada en Sheets; corre solo al abrir la app.
async function snapshotNovedadesGenerales(personal) {
  const parsed = parseNovedadesPersonal(personal);
  if (!parsed.length) return;
  const eventos = parsed.map(e => ({
    fecha: e.fecha, area: 'general', tipo: e.tipo, persona: e.persona,
    detalle: e.detalle || null, origen: 'sheet',
    dedup_key: [e.fecha, 'general', e.tipo, e.persona.toLowerCase()].join('|'),
  }));
  try {
    await sbFetch('saldos_novedades?on_conflict=dedup_key', {
      method: 'POST',
      headers: { 'Prefer': 'resolution=ignore-duplicates,return=minimal' },
      body: JSON.stringify(eventos),
    });
  } catch (e) { console.error('snapshot novedades:', e); }
}

// =======================================================================
// HISTORIAL · faltas y llegadas tarde acumuladas, mes a mes y día a día
// (ventas = guardias en Supabase · general = novedades del Sheet acumuladas
// día a día en saldos_novedades)
// =======================================================================
let historialGeneral = null;   // filas de saldos_novedades

async function renderHistorial() {
  const wrap = document.getElementById('historialContent');
  if (!wrap) return;
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando historial...</div></div>';
  // Ventas: las guardias cargadas (lo que la app sumó de los vendedores)
  if (!guardiasLoaded && !guardiasSinTabla) { try { await loadGuardiasOverrides(); } catch (e) {} }
  // General: acumulado día a día de las novedades del Sheet
  try {
    historialGeneral = await sbFetch('saldos_novedades?select=fecha,area,tipo,persona,detalle&order=fecha.desc');
  } catch (e) { console.error('historial general:', e); historialGeneral = []; }
  drawHistorial();
}

function historialEventos() {
  const evs = [];
  const hoy = hoyISO();
  // VENTAS: lo que la app sumó de los vendedores (guardias)
  if (guardiasOverrides) {
    guardiasOverrides.forEach((info, key) => {
      const parts = key.split('|');
      const fecha = parts[0], sucursal = parts[1], vendedor = parts[2];
      if (fecha > hoy) return;   // lo futuro no es historial
      if (info.estado === 'falta') {
        evs.push({ fecha, area: 'ventas', tipo: 'falta',
          txt: `${cap(vendedor)} (${sucursal}) — Falta${info.motivo ? ': ' + info.motivo : ''}` });
      }
      if (info.llegadaTarde) {
        evs.push({ fecha, area: 'ventas', tipo: 'llegada_tarde',
          txt: `${cap(vendedor)} (${sucursal}) — Llegó tarde ${info.llegadaTarde}` });
      }
    });
  }
  // GENERAL: lo acumulado del Sheet en Supabase
  (historialGeneral || []).forEach(r => {
    if (!r.fecha || r.fecha > hoy) return;
    const persona = String(r.persona || '').trim();
    if (!persona) return;
    const pre = r.tipo === 'falta' ? 'Falta: ' : (r.tipo === 'llegada_tarde' ? 'Tarde: ' : '');
    evs.push({ fecha: r.fecha, area: 'general', tipo: r.tipo, txt: pre + persona });
  });
  return evs;
}

function drawHistorial() {
  const wrap = document.getElementById('historialContent');
  if (!wrap) return;
  const evs = historialEventos();
  if (!evs.length) {
    wrap.innerHTML = `<div class="empty"><div class="ico">📚</div>
      <div style="font-size:15px; color:var(--vw-grey-4); font-weight:600">Sin historial todavía</div>
      <div style="font-size:12px;color:var(--vw-grey-3);margin-top:6px">Se va acumulando día a día con las guardias de ventas y las novedades del Sheet.</div></div>`;
    return;
  }

  // Agrupar por mes → día
  const porMes = new Map(); // 'YYYY-MM' → Map('YYYY-MM-DD' → [eventos])
  evs.forEach(e => {
    const ym = e.fecha.slice(0, 7);
    if (!porMes.has(ym)) porMes.set(ym, new Map());
    const dias = porMes.get(ym);
    if (!dias.has(e.fecha)) dias.set(e.fecha, []);
    dias.get(e.fecha).push(e);
  });

  const ordenTipo = { falta: 0, llegada_tarde: 1 };
  const icono = t => t === 'falta' ? '⚠️' : (t === 'llegada_tarde' ? '⏰' : '📌');

  const bloques = Array.from(porMes.keys()).sort().reverse().map(ym => {
    const dias = porMes.get(ym);
    let faltas = 0, tardes = 0;
    dias.forEach(items => items.forEach(e => {
      if (e.tipo === 'falta') faltas++;
      else if (e.tipo === 'llegada_tarde') tardes++;
    }));
    const cuerpo = Array.from(dias.keys()).sort().reverse().map(f => {
      const items = dias.get(f)
        .sort((a, b) => (ordenTipo[a.tipo] ?? 9) - (ordenTipo[b.tipo] ?? 9) || a.area.localeCompare(b.area))
        .map(e => `
          <div class="personal-item">
            <span class="p-txt">${icono(e.tipo)} ${escapeHtml(e.txt)}
              <span class="rep-area ${e.area}">${e.area === 'ventas' ? 'Ventas' : 'General'}</span></span>
          </div>`).join('');
      return `<div class="personal-subhead">${dowName(f)} ${fechaDM(f)}</div>${items}`;
    }).join('');
    return `
      <div class="personal-wrap" style="margin-bottom:16px">
        <div class="personal-header-main">${escapeHtml(mesLabel(ym))} · ${faltas} falta${faltas === 1 ? '' : 's'} · ${tardes} tarde${tardes === 1 ? '' : 's'}</div>
        <div class="personal-body">${cuerpo}</div>
      </div>`;
  }).join('');

  wrap.innerHTML = bloques;
}

function fmtDateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}
function fmtFechaLarga(d) {
  // "Jue 14/05/26"
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yy = String(d.getFullYear()).slice(-2);
  return `${dias[d.getDay()]} ${dd}/${mm}/${yy}`;
}

// =======================================================================
// HELPERS
// =======================================================================
function fmtMoney(n) {
  const num = Number(n) || 0;
  return '$ ' + Math.round(num).toLocaleString('es-AR');
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// "-" para valores vacíos / N/A / #N/A. Sino devuelve el valor tal cual.
function dash(s) {
  const v = String(s == null ? '' : s).trim();
  if (!v) return '-';
  const low = v.toLowerCase();
  if (low === 'n/a' || low === '#n/a' || low === '#n/a!' || low === '-') return '-';
  return v;
}

function esVendida(u) {
  // "Vendida" = tiene preventa o fecha de venta cargada (no vacío ni N/A)
  return dash(u.preventa) !== '-' || dash(u.fechaVta) !== '-';
}

// Acepta "yyyy-mm-dd" (ISO) o "26-mar" o "26/03/2026"
function parseFechaCorta(s) {
  if (!s) return null;
  s = String(s).trim();
  // ISO yyyy-mm-dd
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  // dd/mm/yyyy o dd/mm/yy
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m) {
    let y = +m[3]; if (y < 100) y += 2000;
    return new Date(y, +m[2]-1, +m[1]);
  }
  // "26-mar" (sin año) → asumimos año actual; si la fecha ya pasó hace mucho, asumimos año próximo
  m = s.toLowerCase().match(/^(\d{1,2})-([a-zñ]{3})/);
  if (m) {
    const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    const mi = meses.indexOf(m[2]);
    if (mi < 0) return null;
    const yNow = new Date().getFullYear();
    return new Date(yNow, mi, +m[1]);
  }
  return null;
}

// INIT
// =======================================================================
(function init() {
  const session = getSharedCookie();
  if (!session || !session.usuario) {
    showGate('Necesitás iniciar sesión en el portal.');
    return;
  }
  if (session._impersonatedBy) {
    showGate('Esta vista no permite sesiones impersonadas.');
    return;
  }
  if (!USUARIOS_PERMITIDOS.includes(session.usuario)) {
    showGate('Tu usuario no tiene acceso a esta vista.');
    return;
  }
  enterApp(session);
})();
